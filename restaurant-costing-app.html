    function recipeProfitTable() {
      return `
        <table>
          <thead><tr><th>Recipe</th><th>Category</th><th class="num">Cost</th><th class="num">Sell</th><th class="num">Food Cost</th><th class="num">Gross Profit</th></tr></thead>
          <tbody>
            ${state.recipes.map(r => {
              const cost = recipeCost(r);
              const pct = r.sellingPrice ? cost / r.sellingPrice * 100 : 0;
              return `<tr><td><strong>${escapeHtml(r.name)}</strong></td><td><span class="badge blue">${escapeHtml(recipeCategory(r))}</span></td><td class="num">${money(cost)}</td><td class="num">${money(r.sellingPrice)}</td><td class="num">${pct.toFixed(1)}%</td><td class="num">${money(r.sellingPrice - cost)}</td></tr>`;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function recipeCategory(recipe) {
      return normalizeRecipeCategory(recipe?.category, recipe?.name);
    }

    function normalizeRecipeCategory(category, recipeName = "") {
      const raw = String(category || "").replace(/\s+/g, " ").trim();
      const name = String(recipeName || "").toUpperCase();
      const categoryUpper = raw.toUpperCase();

      if (isPlatterRecipeName(name) || /^(BRENTON|GARDEN)$/.test(categoryUpper)) return "PLATTERS";
      if (/^(AVOCADO|VEG|VEGETARIAN)$/.test(categoryUpper)) return "AVO";
      if (raw) return categoryUpper;
      return inferRecipeCategory(recipeName);
    }

    function inferRecipeCategory(recipeName) {
      const name = String(recipeName || "").toUpperCase();
      if (isPlatterRecipeName(name)) return "PLATTERS";
      if (/^(AVO|AVOCADO|VEG|VEGETARIAN)\b/.test(name) || /\bVEG\b/.test(name)) return "AVO";
      if (/^SALMON\b/.test(name) || /\bSALMON\b/.test(name)) return "SALMON";
      if (/^TUNA\b/.test(name) || /\bTUNA\b/.test(name)) return "TUNA";
      if (/^PRAWN\b/.test(name) || /^PRAWNS\b/.test(name) || /\bPRAWN\b/.test(name)) return "PRAWN";
      if (/^HAMACHI\b/.test(name) || /\bHAMACHI\b/.test(name)) return "HAMACHI";
      if (/^SUNSET\b/.test(name)) return "SUNSET";
      const firstWord = name.split(/\s+/).find(Boolean);
      return firstWord || "RECIPE";
    }

    function isPlatterRecipeName(name) {
      return /\bPLATTER\b|\bPLATTERS\b|\bBRENTON\b|\bGARDEN OF EDEN\b|\bSPECIALITY\b/.test(String(name || "").toUpperCase());
    }

    function findStockItem(name) {
      const target = String(name || "").trim().toLowerCase();
      const linkedStockId = state.stockLinks?.[stockLinkKey(name)];
      if (linkedStockId) {
        const linked = state.stock.find(s => s.id === linkedStockId);
        if (linked) return linked;
      }
      return state.stock.find(s => s.name.toLowerCase() === target) || null;
    }

    function stockLinkKey(name) {
      return String(name || "").trim().toLowerCase();
    }

    function linkedStockForIngredient(name) {
      const linkedStockId = state.stockLinks?.[stockLinkKey(name)];
      return linkedStockId ? state.stock.find(s => s.id === linkedStockId) || null : null;
    }

    function linkedStockForInvoiceItem(name) {
      const linkedStockId = state.invoiceItemLinks?.[stockLinkKey(name)];
      return linkedStockId ? state.stock.find(s => s.id === linkedStockId) || null : null;
    }

    function linkedStockForCurrentInvoiceReview() {
      const context = pendingInvoiceReview ? findInvoiceReviewContext(pendingInvoiceReview.invoiceId, pendingInvoiceReview.rowIndex) : null;
      if (!context?.row?.stockId) return null;
      return state.stock.find(s => s.id === context.row.stockId) || null;
    }

    function invoiceReviewItems() {
      return state.invoices.flatMap(invoice =>
        invoiceLines(invoice).map((row, rowIndex) => ({ invoice, row, rowIndex }))
      ).filter(({ row }) => invoiceRowNeedsReview(row));
    }

    function invoiceRowNeedsReview(row) {
      return !!row && !!row.needsReview && !row.applied;
    }

    function findInvoiceReviewContext(invoiceId, rowIndex) {
      const invoice = state.invoices.find(item => item.id === invoiceId);
      const row = invoice ? invoiceLines(invoice)[Number(rowIndex)] : null;
      return invoice && row ? { invoice, row, rowIndex: Number(rowIndex) } : null;
    }

    function normaliseStockMatchText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function stockMatchTokens(value) {
      const stopWords = new Set(["and", "the", "with", "who", "kg", "g", "ml", "ltr", "lt", "each", "pkt", "pack", "bag", "box", "large", "medium", "small", "fresh", "direct", "item", "code", "whole"]);
      return normaliseStockMatchText(value)
        .split(" ")
        .filter(token => token.length >= 3 && !stopWords.has(token))
        .map(token => token.replace(/ies$/, "y").replace(/s$/, ""));
    }

    function invoiceAliasNames(name) {
      const text = normaliseStockMatchText(name);
      const aliases = [];
      if (/\bpatagonia\b|\bsquid\b|\bcalamari\b/.test(text)) aliases.push("calamari", "patagonia calamari", "squid");
      return aliases;
    }

    function findInvoiceStockMatch(row) {
      const name = String(row?.raw || row || "").trim();
      if (!name) return null;

      const linked = linkedStockForInvoiceItem(name);
      if (linked) return { stock: linked, type: "linked", needsReview: false, reason: "Previously linked" };

      const normalizedName = normaliseStockMatchText(name);
      const exact = state.stock.find(s => normaliseStockMatchText(s.name) === normalizedName);
      if (exact) return { stock: exact, type: "exact", needsReview: false, reason: "Exact stock name" };

      for (const alias of invoiceAliasNames(name)) {
        const aliasMatch = state.stock.find(s => {
          const stockText = normaliseStockMatchText(s.name);
          return stockText === alias || stockText.includes(alias) || alias.includes(stockText);
        });
        if (aliasMatch) {
          return { stock: aliasMatch, type: "suggested", needsReview: true, reason: `Possible same item as ${aliasMatch.name}` };
        }
      }

      const nameTokens = stockMatchTokens(name);
      if (!nameTokens.length) return null;
      const scored = state.stock.map(stock => {
        const stockTokens = stockMatchTokens(stock.name);
        if (!stockTokens.length) return { stock, score: 0 };
        const overlap = nameTokens.filter(token => stockTokens.includes(token)).length;
        const score = overlap ? (overlap / nameTokens.length * 0.7) + (overlap / stockTokens.length * 0.3) : 0;
        return { stock, score };
      }).sort((a, b) => b.score - a.score)[0];

      if (scored?.score >= 0.78) {
        return { stock: scored.stock, type: "suggested", needsReview: true, reason: `Possible match: ${scored.stock.name}` };
      }
      return null;
    }

    function findPrepItem(name) {
      const target = String(name || "").trim().toLowerCase();
      return state.prepItems.find(item => item.name.toLowerCase() === target) || null;
    }

    function findStockForCostingIngredient(ingredient) {
      return findStockItem(ingredient?.ingredient);
    }

    function findPrepForCostingIngredient(ingredient, stock = findStockForCostingIngredient(ingredient)) {
      const prep = findPrepItem(ingredient?.ingredient);
      if (!prep) return null;
      if (linkedStockForIngredient(ingredient?.ingredient)) return null;
      if (isLikelyRawStockIngredientName(ingredient?.ingredient)) return null;
      return prep;
    }

    function prepYieldUnitsForRecipeUnit(prepItem, recipeUnit) {
      const qty = Number(prepItem.yieldQty || 0);
      if (!qty) return 0;
      return qty * stockUnitsForRecipeUnit(prepItem.yieldUnit, recipeUnit);
    }

    function prepItemCost(prepItem, visitedPrepIds = new Set()) {
      if (!prepItem?.ingredients?.length) return null;
      let total = 0;
      for (const ingredient of prepItem.ingredients || []) {
        const cost = ingredientCostWithPrepContext(ingredient, visitedPrepIds);
        if (cost == null) return null;
        total += cost;
      }
      return total;
    }

    function stockInfoForIngredient(ingredient) {
      const ingredientUnit = resolveRecipeIngredientUnit(ingredient);
      if (isNoCostIngredient(ingredient?.ingredient)) {
        return {
          stock: null,
          bulkQty: 1,
          bulkUnit: ingredientUnit,
          pricePer: 0,
          itemCost: 0,
          missing: false,
          source: "Utilities"
        };
      }
      const stock = findStockForCostingIngredient(ingredient);
      const prep = findPrepForCostingIngredient(ingredient, stock);
      if (prep) {
        const batchCost = prepItemCost(prep, new Set([prep.id]));
        const bulkQty = prepYieldUnitsForRecipeUnit(prep, ingredientUnit);
        if (batchCost == null || !bulkQty) {
          return {
            prep,
            bulkQty: Number(prep.yieldQty || 1),
            bulkUnit: prep.yieldUnit,
            pricePer: 0,
            itemCost: 0,
            missing: true,
            source: "Prep item"
          };
        }
        return {
          prep,
          bulkQty,
          bulkUnit: ingredientUnit,
          pricePer: batchCost / bulkQty,
          itemCost: unitCost(ingredient) || 0,
          missing: false,
          source: "Prep item"
        };
      }

      if (!stock || !Number(stock.unitPrice)) {
        return {
          stock,
          bulkQty: 1,
          bulkUnit: ingredientUnit,
          pricePer: 0,
          itemCost: 0,
          missing: true,
          source: "Stock"
        };
      }

      const bulkQty = stockUnitsForCostingIngredient(stock, ingredientUnit, ingredient?.ingredient);
      if (!bulkQty) {
        return {
          stock,
          bulkQty: 0,
          bulkUnit: ingredientUnit,
          pricePer: 0,
          itemCost: 0,
          missing: true,
          source: "Stock"
        };
      }
      const bulkUnit = ingredientUnit;
      const pricePer = bulkQty ? stock.unitPrice / bulkQty : stock.unitPrice;
      return {
        stock,
        bulkQty,
        bulkUnit,
        pricePer,
        itemCost: unitCost(ingredient) || 0,
        missing: false,
        source: "Stock"
      };
    }

    function cleanNumberLabel(value) {
      const number = Number(value || 0);
      if (!Number.isFinite(number)) return "0";
      return Number.isInteger(number) ? String(number) : String(Math.round(number * 100) / 100);
    }

    function stockPurchaseDisplay(stock, costing) {
      if (!stock) return null;
      const parsed = parseUnitSize(stock.unit);
      const unitPrice = Number(stock.unitPrice || 0);
      const packForMass = explicitPackSizeFromStock(stock, "g");
      const packForVolume = explicitPackSizeFromStock(stock, "ml");
      const countUnits = new Set(["each", "pkt", "box", "tin", "bttl", "tray", "tub", "pun", "bunch", "bag", "shaker"]);

      if (parsed.base === "kg") {
        return {
          bulk: `${cleanNumberLabel(parsed.qty * 1000)} g`,
          price: `${money(unitPrice / (parsed.qty || 1))} / kg`
        };
      }
      if (parsed.base === "ltr") {
        return {
          bulk: `${cleanNumberLabel(parsed.qty * 1000)} ml`,
          price: `${money(unitPrice / (parsed.qty || 1))} / litre`
        };
      }
      if (parsed.base === "g") {
        const qty = parsed.qty || 1;
        return qty === 1
          ? { bulk: "1000 g", price: `${money(unitPrice * 1000)} / kg` }
          : { bulk: `${cleanNumberLabel(qty)} g`, price: `${money(unitPrice)} / ${cleanNumberLabel(qty)}g` };
      }
      if (parsed.base === "ml") {
        const qty = parsed.qty || 1;
        return qty === 1
          ? { bulk: "1000 ml", price: `${money(unitPrice * 1000)} / litre` }
          : { bulk: `${cleanNumberLabel(qty)} ml`, price: `${money(unitPrice)} / ${cleanNumberLabel(qty)}ml` };
      }
      if (packForMass) {
        const grams = packForMass.base === "kg" ? packForMass.qty * 1000 : packForMass.qty;
        return {
          bulk: `${cleanNumberLabel(grams)} g`,
          price: `${money(unitPrice)} / ${cleanNumberLabel(grams)}g`
        };
      }
      if (packForVolume) {
        const millilitres = packForVolume.base === "ltr" ? packForVolume.qty * 1000 : packForVolume.qty;
        return {
          bulk: `${cleanNumberLabel(millilitres)} ml`,
          price: `${money(unitPrice)} / ${cleanNumberLabel(millilitres)}ml`
        };
      }
      if (countUnits.has(parsed.base)) {
        const label = parsed.base === "each" ? "each" : parsed.base.toUpperCase();
        return {
          bulk: `${cleanNumberLabel(parsed.qty || 1)} ${label}`,
          price: `${money(unitPrice)} / ${label}`
        };
      }
      if (costing?.bulkQty) {
        return {
          bulk: `${cleanNumberLabel(costing.bulkQty)} ${costing.bulkUnit || ""}`.trim(),
          price: money(costing.pricePer)
        };
      }
      return null;
    }

    function prepPurchaseDisplay(prep, costing) {
      if (!prep) return null;
      const yieldQty = Number(prep.yieldQty || 0);
      const yieldUnit = normaliseUnit(prep.yieldUnit || "");
      const batchCost = prepItemCost(prep, new Set([prep.id]));
      if (!yieldQty || batchCost == null) return null;
      if (yieldUnit === "g" || yieldUnit === "kg") {
        const grams = yieldUnit === "kg" ? yieldQty * 1000 : yieldQty;
        return {
          bulk: "1000 g",
          price: `${money(batchCost / grams * 1000)} / kg`
        };
      }
      if (yieldUnit === "ml" || yieldUnit === "ltr") {
        const millilitres = yieldUnit === "ltr" ? yieldQty * 1000 : yieldQty;
        return {
          bulk: "1000 ml",
          price: `${money(batchCost / millilitres * 1000)} / litre`
        };
      }
      return {
        bulk: `${cleanNumberLabel(yieldQty)} ${yieldUnit || "unit"}`,
        price: `${money(batchCost)} / batch`
      };
    }

    function costingPurchaseDisplay(costing, ingredient) {
      if (!costing || costing.missing) return { bulk: "-", price: "-" };
      if (costing.source === "Utilities") return { bulk: "Included", price: "-" };
      const display = stockPurchaseDisplay(costing.stock, costing)
        || prepPurchaseDisplay(costing.prep, costing);
      if (display) return display;
      const ingredientUnit = resolveRecipeIngredientUnit(ingredient);
      const parsed = parseUnitSize(ingredientUnit);
      if (parsed.base === "g") return { bulk: "1000 g", price: `${money(Number(costing.pricePer || 0) * 1000)} / kg` };
      if (parsed.base === "ml") return { bulk: "1000 ml", price: `${money(Number(costing.pricePer || 0) * 1000)} / litre` };
      return {
        bulk: `${cleanNumberLabel(costing.bulkQty)} ${costing.bulkUnit || ""}`.trim(),
        price: money(costing.pricePer)
      };
    }

    function recipeCostingSheet(recipe) {
      const rows = recipe.ingredients.map(ingredient => {
        const costing = stockInfoForIngredient(ingredient);
        return {
          ...ingredient,
          costing,
          purchaseDisplay: costingPurchaseDisplay(costing, ingredient)
        };
      });
      const category = recipeCategory(recipe);
      const total = recipeCost(recipe);
      const vat = total * 0.15;
      const totalInclVat = total + vat;
      const menuPrice = Number(recipe.sellingPrice || 0);
      const foodCostPct = menuPrice ? totalInclVat / menuPrice * 100 : 0;
      const blanks = Array.from({ length: Math.max(0, 6 - rows.length) });

      return `
        <div id="recipe-sheet-${escapeAttr(recipe.id)}" class="cost-sheet" data-return-anchor="recipe-sheet-${escapeAttr(recipe.id)}">
          <div class="recipe-sheet-actions">
            <button class="btn secondary icon" title="${recipe.imageUrl ? "Change recipe image" : "Add recipe image"}" onclick="setRecipeImage('${recipe.id}')">${miniIcon("image")}</button>
            <button class="btn edit icon" title="Edit recipe" onclick="editRecipe('${recipe.id}')">${miniIcon("pen")}</button>
            <button class="btn danger icon" title="Delete recipe" onclick="deleteRecipe('${recipe.id}')">${miniIcon("trash")}</button>
          </div>
          ${recipe.imageUrl ? `<div class="cost-sheet-image"><img src="${escapeAttr(recipe.imageUrl)}" alt="${escapeAttr(recipe.name)} reference"></div>` : ""}
          <div class="cost-sheet-title">${escapeHtml(category)}</div>
          <div class="cost-sheet-subtitle">COSTING SHEET</div>
          <div class="cost-sheet-name">${escapeHtml(recipe.name)}</div>
          <table>
            <thead>
              <tr>
                <th style="width:34%">Ingredients</th>
                <th style="width:16%">Quantity used<br>in recipe</th>
                <th style="width:16%">Purchase size<br>or unit sold</th>
                <th style="width:17%">Price per:<br>kg/litre/unit</th>
                <th style="width:17%">Item cost</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row, index) => `
                <tr id="recipe-${escapeAttr(recipe.id)}-ingredient-${index}" data-return-anchor="recipe-${escapeAttr(recipe.id)}-ingredient-${index}">
                  <td>${escapeHtml(row.ingredient.toUpperCase())}${row.costing.missing ? ` <span class="red">(NO COST)</span>` : ""}</td>
                  <td class="right">${row.qty}</td>
                  <td class="right">${escapeHtml(row.purchaseDisplay.bulk)}</td>
                  <td class="right">${escapeHtml(row.purchaseDisplay.price)}</td>
                  <td class="right">${money(row.costing.itemCost)}</td>
                </tr>
              `).join("")}
              ${blanks.map(() => `<tr class="blank"><td></td><td></td><td></td><td></td><td></td></tr>`).join("")}
              <tr class="staff"><td>WASTAGE, CONDIMENTS, STAFF</td><td></td><td></td><td></td><td class="right red">R2.00</td></tr>
              <tr class="summary"><td colspan="4">TOTAL COST</td><td class="right">${money(total)}</td></tr>
              <tr class="summary"><td colspan="4">VAT @ 15%</td><td class="right">${money(vat)}</td></tr>
              <tr class="summary"><td colspan="4">TOTAL INCLUDING VAT</td><td class="right">${money(totalInclVat)}</td></tr>
              <tr class="menu">
                <td colspan="3">MENU PRICE</td>
                <td class="right red">${money(menuPrice)}</td>
                <td class="right red">${foodCostPct.toFixed(2)}%</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function recipeCostingSheets() {
      const recipes = recipesForCostingSheets();
      if (!state.recipes.length) return `<div class="empty">No recipes saved yet. Add one manually or extract one from a file to build your first costing sheet.</div>`;
      if (!recipes.length) return `<div class="empty">No recipes in this category yet.</div>`;
      return recipes.map(recipeCostingSheet).join("");
    }

    function recipeCategories() {
      return ["All", ...new Set(state.recipes.map(recipeCategory).filter(Boolean))].sort((a, b) => {
        if (a === "All") return -1;
        if (b === "All") return 1;
        return a.localeCompare(b);
      });
    }

    function recipesForCostingSheets() {
      if (recipeCategoryFilter !== "All" && !recipeCategories().includes(recipeCategoryFilter)) {
        recipeCategoryFilter = "All";
      }
      if (recipeCategoryFilter === "All") return state.recipes;
      return state.recipes.filter(recipe => recipeCategory(recipe) === recipeCategoryFilter);
    }

    function setRecipeCategoryFilter(value) {
      recipeCategoryFilter = value || "All";
      renderRecipes();
    }

    async function runLocalOcr(fileInputId, outputId, statusId) {
      const fileInput = document.getElementById(fileInputId);
      const output = document.getElementById(outputId);
      const status = document.getElementById(statusId);
      const file = fileInput?.files?.[0];

      if (!file) {
        alert("Choose an image file first.");
        return;
      }

      if (!window.Tesseract) {
        alert("Tesseract.js could not load. Open this app while connected to the internet the first time, or bundle Tesseract locally later.");
        return;
      }

      status.value = "Reading image...";

      try {
        const result = await Tesseract.recognize(file, "eng", {
          logger: progress => {
            if (progress.status) {
              const pct = progress.progress ? ` ${Math.round(progress.progress * 100)}%` : "";
              status.value = progress.status + pct;
            }
          }
        });

        output.value = result.data.text.trim();
        status.value = "Text extracted. Review it below.";
      } catch (error) {
        console.error(error);
        status.value = "Could not read the image. Try a clearer photo.";
      }
    }

    async function loadImageForCanvas(file) {
      if (window.createImageBitmap) {
        return createImageBitmap(file);
      }

      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Could not load invoice image"));
        };
        image.src = url;
      });
    }

    function canvasToPngFile(canvas, name, suffix = "cleaned") {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (!blob) {
            reject(new Error("Could not prepare invoice image"));
            return;
          }
          const cleanName = String(name || "invoice").replace(/\.[^.]+$/, "");
          resolve(new File([blob], `${cleanName}-${suffix}.png`, { type: "image/png" }));
        }, "image/png", 0.95);
      });
    }

    function cleanInvoiceCanvas(canvas) {
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let index = 0; index < data.length; index += 4) {
        const luminance = (data[index] * 0.299) + (data[index + 1] * 0.587) + (data[index + 2] * 0.114);
        const contrasted = Math.max(0, Math.min(255, ((luminance - 128) * 1.55) + 138));
        const value = contrasted > 232 ? 255 : contrasted < 32 ? 0 : contrasted;
        data[index] = value;
        data[index + 1] = value;
        data[index + 2] = value;
        data[index + 3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    async function enhancedInvoiceImageFile(file, status) {
      status.value = "Cleaning invoice photo for another read...";
      const image = await loadImageForCanvas(file);
      const sourceWidth = image.width || image.naturalWidth;
      const sourceHeight = image.height || image.naturalHeight;
      const longestSide = Math.max(sourceWidth, sourceHeight);
      const targetLongestSide = Math.min(3200, Math.max(longestSide, 2200));
      const scale = targetLongestSide / longestSide;
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(sourceWidth * scale));
      canvas.height = Math.max(1, Math.round(sourceHeight * scale));

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      if (typeof image.close === "function") image.close();

      cleanInvoiceCanvas(canvas);
      return canvasToPngFile(canvas, file.name);
    }

    async function invoiceTableCropFile(file, status) {
      status.value = "Focusing on the invoice table...";
      const image = await loadImageForCanvas(file);
      const sourceWidth = image.width || image.naturalWidth;
      const sourceHeight = image.height || image.naturalHeight;
      const crop = { left: 0.01, top: 0.385, width: 0.98, height: 0.315 };
      const sourceX = Math.round(sourceWidth * crop.left);
      const sourceY = Math.round(sourceHeight * crop.top);
      const sourceCropWidth = Math.round(sourceWidth * crop.width);
      const sourceCropHeight = Math.round(sourceHeight * crop.height);
      const scale = Math.min(4, Math.max(1.8, 3000 / Math.max(1, sourceCropWidth)));
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(sourceCropWidth * scale));
      canvas.height = Math.max(1, Math.round(sourceCropHeight * scale));

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(image, sourceX, sourceY, sourceCropWidth, sourceCropHeight, 0, 0, canvas.width, canvas.height);
      if (typeof image.close === "function") image.close();

      cleanInvoiceCanvas(canvas);
      return canvasToPngFile(canvas, file.name, "table-crop");
    }

    async function extractInvoiceImageWithBrowserOcr(file, status, enhancedFile) {
      if (!window.Tesseract) {
        throw new Error("Browser OCR reader did not load");
      }
      const source = enhancedFile || await enhancedInvoiceImageFile(file, status);
      status.value = "Reading cleaned photo in the browser...";
      const result = await Tesseract.recognize(source, "eng", {
        logger: progress => {
          if (progress.status) {
            const pct = progress.progress ? ` ${Math.round(progress.progress * 100)}%` : "";
            status.value = "Reading cleaned photo: " + progress.status + pct;
          }
        }
      });
      return String(result.data.text || "").trim();
    }

    const PADDLE_OCR_URLS = ["http://127.0.0.1:8765", "http://127.0.0.1:8000"];
    let activePaddleOcrUrl = null;

    function localOcrFormData(file) {
      const body = new FormData();
      body.append("file", file, file.name);
      return body;
    }

    function localOcrPortLabel() {
      if (!activePaddleOcrUrl) return "local OCR helper";
      return `local OCR helper on port ${activePaddleOcrUrl.split(":").pop()}`;
    }

    async function fetchLocalOcr(path, file) {
      const urls = activePaddleOcrUrl
        ? [activePaddleOcrUrl, ...PADDLE_OCR_URLS.filter(url => url !== activePaddleOcrUrl)]
        : PADDLE_OCR_URLS;
      let lastError = null;

      for (const baseUrl of urls) {
        try {
          const response = await fetch(baseUrl + path, {
            method: "POST",
            body: localOcrFormData(file)
          });
          if (!response.ok) {
            const detail = await response.text().catch(() => "");
            lastError = new Error(`Local OCR helper returned ${response.status} on ${baseUrl}`);
            lastError.localOcrResponded = true;
            lastError.detail = detail.slice(0, 300);
            continue;
          }
          activePaddleOcrUrl = baseUrl;
          return await response.json();
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("Local PaddleOCR is not available");
    }

    async function extractWithPaddleOcr(file, status) {
      status.value = "Finding the local OCR helper...";
      const result = await fetchLocalOcr("/extract", file);
      status.value = `Reading with ${localOcrPortLabel()}...`;
      return String(result.text || "").trim();
    }

    async function extractStructuredInvoice(file, status) {
      status.value = "Reading invoice table with the local helper...";
      const result = await fetchLocalOcr("/extract-invoice", file);
      status.value = `Reading invoice rows with ${localOcrPortLabel()}...`;
      return result;
    }

    async function extractStructuredRecipePdf(file, status) {
      status.value = "Reading recipe sheets...";
      const result = await fetchLocalOcr("/extract-recipes", file);
      return Array.isArray(result.recipes) ? result.recipes : [];
    }

    async function extractStructuredPrepPdf(file, status) {
      status.value = "Finding prep item cards...";
      const result = await fetchLocalOcr("/extract-prep", file);
      status.value = `Reading prep cards with ${localOcrPortLabel()}...`;
      return Array.isArray(result.prepItems) ? result.prepItems : [];
    }

    async function extractPrepSpreadsheet(file, status) {
      if (!window.XLSX) {
        throw new Error("Spreadsheet reader did not load");
      }
      status.value = "Reading prep Excel workbook...";
      const workbook = XLSX.read(await file.arrayBuffer(), { type: "array", bookFiles: true });
      const rowPrepItems = extractPrepItemsFromWorkbookRows(workbook);
      if (rowPrepItems.length) return rowPrepItems;

      const imageFiles = workbookImageFiles(workbook, file.name);
      if (!imageFiles.length) return [];

      const prepItems = [];
      let lastError = null;
      for (let imageIndex = 0; imageIndex < imageFiles.length; imageIndex += 1) {
        const imageFile = imageFiles[imageIndex];
        try {
          status.value = `Reading embedded prep image ${imageIndex + 1} of ${imageFiles.length}...`;
          const imagePrepItems = await extractStructuredPrepPdf(imageFile, status);
          prepItems.push(...imagePrepItems);
        } catch (error) {
          lastError = error;
          console.warn(error);
        }
      }

      const unique = dedupePrepImports(prepItems);
      if (unique.length) return unique;
      if (lastError) throw lastError;
      return [];
    }

    function extractPrepItemsFromWorkbookRows(workbook) {
      const importSheetItems = extractPrepItemsFromImportSheets(workbook);
      if (importSheetItems.length) return dedupePrepImports(importSheetItems);

      const prepItems = [];
      workbook.SheetNames.forEach(sheetName => {
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" })
          .map(row => row.map(value => String(value ?? "").trim()));

        rows.forEach((row, rowIndex) => {
          row.forEach((cell, colIndex) => {
            if (!/\bCOSTING\s+SHEET\b/i.test(cell)) return;
            const card = parsePrepWorkbookCard(rows, rowIndex, colIndex, sheetName);
            if (card) prepItems.push(card);
          });
        });
      });
      return dedupePrepImports(prepItems);
    }

    function extractPrepItemsFromImportSheets(workbook) {
      const recipeSheetName = findWorkbookSheetName(workbook, ["Recipes Import", "Recipe Import", "Prep Items Import", "Prep Import"]);
      const ingredientSheetName = findWorkbookSheetName(workbook, ["Ingredients Import", "Ingredient Import", "Prep Ingredients Import"]);
      if (!recipeSheetName || !ingredientSheetName) return [];

      const recipeRows = workbookSheetRows(workbook, recipeSheetName);
      const ingredientRows = workbookSheetRows(workbook, ingredientSheetName);
      const recipeHeader = findWorkbookHeader(recipeRows, ["recipe name"]);
      const ingredientHeader = findWorkbookHeader(ingredientRows, ["ingredient", "quantity"]);
      if (!recipeHeader || !ingredientHeader) return [];

      const recipeRecords = workbookRecordsFromRows(recipeRows, recipeHeader);
      const ingredientRecords = workbookRecordsFromRows(ingredientRows, ingredientHeader);
      const ingredientsByKey = {};

      ingredientRecords.forEach(record => {
        const recipeCode = workbookRecordValue(record, ["recipe code", "prep code", "code"]);
        const recipeName = workbookRecordValue(record, ["recipe name", "prep item name", "prep name"]);
        const ingredientName = cleanPrepName(workbookRecordValue(record, ["ingredient", "ingredient name", "stock item"]));
        const qty = parseWorkbookNumber(workbookRecordValue(record, ["quantity used", "qty used", "quantity", "qty"]));
        const unit = normaliseUnit(workbookRecordValue(record, ["unit", "used unit", "quantity unit"]) || inferPrepIngredientUnit(ingredientName, qty));
        if (!ingredientName || !qty) return;
        const ingredient = { ingredient: ingredientName, qty, unit };
        if (!isUsablePrepIngredient(ingredient)) return;
        [recipeCode, recipeName].filter(Boolean).forEach(key => {
          const normalizedKey = stockLinkKey(key);
          if (!ingredientsByKey[normalizedKey]) ingredientsByKey[normalizedKey] = [];
          ingredientsByKey[normalizedKey].push(ingredient);
        });
      });

      const prepItems = recipeRecords.map(record => {
        const recipeCode = workbookRecordValue(record, ["recipe code", "prep code", "code"]);
        const name = cleanPrepName(workbookRecordValue(record, ["recipe name", "prep item name", "prep name", "name"]));
        if (!name) return null;
        const ingredients = ingredientsByKey[stockLinkKey(recipeCode)] || ingredientsByKey[stockLinkKey(name)] || [];
        if (!ingredients.length) return null;
        const category = normalizePrepSection(
          workbookRecordValue(record, ["section", "category", "department", "station"]),
          name
        );
        const yieldQty = parseWorkbookNumber(workbookRecordValue(record, ["yield quantity", "yield qty", "final yield qty", "yield portions", "yield"]));
        const yieldUnit = normaliseUnit(workbookRecordValue(record, ["yield unit", "final yield unit", "portion unit", "unit"]));
        const yieldInfo = normalizePrepYieldInfo({ name, ingredients, yieldQty, yieldUnit });
        return {
          name,
          category,
          yieldQty: yieldInfo.yieldQty,
          yieldUnit: yieldInfo.yieldUnit,
          ingredients: dedupePrepIngredients(ingredients)
        };
      }).filter(Boolean);

      return dedupePrepImports(prepItems);
    }

    function findWorkbookSheetName(workbook, candidates) {
      const normalizedCandidates = candidates.map(normalizeImportHeader);
      return (workbook.SheetNames || []).find(sheetName => {
        const normalized = normalizeImportHeader(sheetName);
        return normalizedCandidates.some(candidate => normalized === candidate || normalized.includes(candidate));
      }) || "";
    }

    function workbookSheetRows(workbook, sheetName) {
      const sheet = workbook.Sheets[sheetName];
      return XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" })
        .map(row => row.map(value => String(value ?? "").trim()));
    }

    function findWorkbookHeader(rows, requiredAliases) {
      for (let rowIndex = 0; rowIndex < Math.min(rows.length, 20); rowIndex += 1) {
        const headers = rows[rowIndex].map(normalizeImportHeader);
        const hasRequired = requiredAliases.every(alias => headers.some(header => header.includes(normalizeImportHeader(alias))));
        if (hasRequired) return { rowIndex, headers };
      }
      return null;
    }

    function workbookRecordsFromRows(rows, headerInfo) {
      return rows.slice(headerInfo.rowIndex + 1)
        .filter(row => row.some(cell => String(cell || "").trim()))
        .map(row => ({ row, headers: headerInfo.headers }));
    }

    function workbookRecordValue(record, aliases) {
      const normalizedAliases = aliases.map(normalizeImportHeader);
      const index = record.headers.findIndex(header => normalizedAliases.some(alias => header === alias || header.includes(alias) || alias.includes(header)));
      return index >= 0 ? String(record.row[index] ?? "").trim() : "";
    }

    function normalizeImportHeader(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[/_-]+/g, " ")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseWorkbookNumber(value) {
      if (typeof value === "number") return Number.isFinite(value) ? value : 0;
      const text = String(value || "").replace(/^R/i, "").replace(/[^\d,.-]/g, "");
      if (!text) return 0;
      const normalized = text.includes(".") && text.includes(",") ? text.replace(/,/g, "") : text.replace(",", ".");
      const number = Number(normalized);
      return Number.isFinite(number) ? number : 0;
    }

    function dedupePrepIngredients(ingredients) {
      const seen = new Set();
      return ingredients.filter(item => {
        const key = `${item.ingredient.toLowerCase()}|${item.qty}|${item.unit}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function parsePrepWorkbookCard(rows, startRow, startCol, sheetName) {
      const windowRows = rows.slice(startRow, Math.min(rows.length, startRow + 34));
      const titleCandidates = [];
      for (let rowOffset = 0; rowOffset < Math.min(windowRows.length, 8); rowOffset += 1) {
        windowRows[rowOffset].forEach(value => {
          const clean = cleanPrepName(value);
          if (clean && !isBadPrepTextFragment(clean) && !/\bCOSTING\s+SHEET\b/i.test(clean)) {
            titleCandidates.push(clean);
          }
        });
      }

      const name = titleCandidates.find(value => /[A-Za-z]/.test(value)) || sheetName;
      const ingredients = [];
      for (let rowOffset = 0; rowOffset < windowRows.length; rowOffset += 1) {
        const row = windowRows[rowOffset];
        const text = row.join(" ");
        if (/\b(TOTAL COST|YIELD IN|PORTION VOLUME|COST PER PORTION|VAT @)\b/i.test(text)) break;
        for (let col = Math.max(0, startCol - 1); col < Math.min(row.length, startCol + 6); col += 1) {
          const ingredientName = cleanPrepName(row[col]);
          if (!ingredientName || !isUsablePrepIngredient({ ingredient: ingredientName, qty: 1, unit: "g" })) continue;
          const qty = firstNumberInCells(row.slice(col + 1, col + 4));
          if (!qty) continue;
          const unit = inferUnitFromCells(row.slice(col + 1, col + 5), ingredientName, qty);
          ingredients.push({ ingredient: ingredientName, qty, unit });
          break;
        }
      }

      if (!ingredients.length) return null;
      const yieldInfo = inferPrepYield({ name, ingredients });
      return {
        name,
        category: inferPrepCategory(name, sheetName),
        yieldQty: yieldInfo.yieldQty,
        yieldUnit: yieldInfo.yieldUnit,
        ingredients
      };
    }

    function firstNumberInCells(cells) {
      for (const cell of cells) {
        const match = String(cell || "").match(/\d+(?:[.,]\d+)?/);
        if (!match) continue;
        const value = Number(match[0].replace(",", "."));
        if (value > 0) return value;
      }
      return 0;
    }

    function inferUnitFromCells(cells, ingredientName, quantity) {
      const text = cells.join(" ").toLowerCase();
      const unitMatch = text.match(/\b(kg|g|ml|ltr|l|each|pc|pcs|pkt|box)\b/);
      if (unitMatch) return normaliseUnit(unitMatch[1]);
      return inferPrepIngredientUnit(ingredientName, quantity);
    }

    function inferPrepIngredientUnit(ingredientName, quantity) {
      return inferIngredientUnit(ingredientName, quantity);
    }

    function ingredientNameText(value) {
      return String(value || "").replace(/\s+/g, " ").trim().toUpperCase();
    }

    function isLiquidIngredientName(name) {
      return /\b(SAUCE|VINEGAR|OIL|MIRIN|JUICE|CREAM|MILK|WATER|DRESSING|MAYO|PUREE|GLAZE|SYRUP)\b/.test(ingredientNameText(name));
    }

    function isPreparedRecipeComponentName(name) {
      return /\b(ROLL|NIGIRI|MAKI|SASHIMI|ROSES|BUTTERFLY|SANDWICH|PLATTER|DESSERT|CALIFORNIA|FASHION|CRUNCH|SUNSET)\b/.test(ingredientNameText(name));
    }

    function isCountIngredientName(name, quantity) {
      const upper = ingredientNameText(name);
      if (isPreparedRecipeComponentName(upper)) return true;
      if (Number(quantity || 0) <= 2 && /\b(EGG|LEMON|LIME|AVO|AVOCADO|BUN|WRAP|CUCUMBER|PINEAPPLE)\b/.test(upper)) return true;
      if (Number(quantity || 0) <= 5 && /\b(NORI|SHEET|SHEETS|OYSTER)\b/.test(upper)) return true;
      return false;
    }

    function isLikelyRawStockIngredientName(name) {
      const upper = ingredientNameText(name);
      if (!upper || isPreparedRecipeComponentName(upper)) return false;
      return /\b(SALMON|TUNA|PRAWN|PRAWNS|SHRIMP|AVO|AVOCADO|SESAME|HAMACHI|SCALLOP|CRAB|CAVIAR|NORI|GINGER|SPRING ONION|CUCUMBER|FISH SPICE|PANKO|FLOUR|SUGAR|YEAST)\b/.test(upper);
    }

    function shouldRepairEachToMeasuredUnit(ingredient) {
      const name = ingredient?.ingredient || "";
      if (isCountIngredientName(name, ingredient?.qty)) return false;
      return isLikelyRawStockIngredientName(name) || isLiquidIngredientName(name);
    }

    function inferIngredientUnit(ingredientName, quantity, sourceUnit = "") {
      const source = parseUnitSize(sourceUnit);
      if (["kg", "g"].includes(source.base) && !isPreparedRecipeComponentName(ingredientName)) return "g";
      if (["ltr", "ml"].includes(source.base) && !isPreparedRecipeComponentName(ingredientName)) return "ml";
      if (isLiquidIngredientName(ingredientName)) return "ml";
      if (isCountIngredientName(ingredientName, quantity)) return "EACH";
      return "g";
    }

    function prepIngredientKey(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
    }

    function isSelfReferencingPrepIngredient(prepItem, ingredientName) {
      const prepKey = prepIngredientKey(cleanPrepName(prepItem?.name || ""));
      const ingredientKey = prepIngredientKey(cleanPrepName(ingredientName || ""));
      return Boolean(prepKey && ingredientKey && prepKey === ingredientKey);
    }

    function resolvePrepIngredientUnit(ingredient) {
      const unit = normaliseUnit(ingredient?.unit || "");
      if (unit === "EACH" && shouldRepairEachToMeasuredUnit(ingredient)) {
        return inferIngredientUnit(ingredient?.ingredient, ingredient?.qty, ingredient?.source_bulk_size);
      }
      return unit || inferIngredientUnit(ingredient?.ingredient, ingredient?.qty, ingredient?.source_bulk_size);
    }

    function resolveRecipeIngredientUnit(ingredient) {
      return resolvePrepIngredientUnit(ingredient);
    }

    function normalizeRecipeIngredient(recipe, ingredient) {
      const name = cleanIngredientCell(ingredient?.ingredient || "");
      const qty = Number(ingredient?.qty || 0);
      if (!name || !qty) return null;
      return {
        ...ingredient,
        ingredient: name,
        qty,
        unit: resolveRecipeIngredientUnit({ ...ingredient, ingredient: name, qty })
      };
    }

    function normalizePrepIngredientForItem(prepItem, ingredient) {
      const name = cleanPrepName(ingredient?.ingredient || "");
      const qty = Number(ingredient?.qty || 0);
      if (!name || !qty) return null;
      if (isSelfReferencingPrepIngredient(prepItem, name)) return null;
      return {
        ingredient: name,
        qty,
        unit: resolvePrepIngredientUnit({ ingredient: name, qty, unit: ingredient?.unit })
      };
    }

    function workbookImageFiles(workbook, sourceName) {
      const files = workbook.files || {};
      const keys = workbook.keys || Object.keys(files);
      const baseName = String(sourceName || "prep-workbook").replace(/\.[^.]+$/, "");
      return keys
        .filter(key => /^xl\/media\/.+\.(png|jpe?g|webp|bmp|tiff?)$/i.test(key))
        .map(key => {
          const bytes = workbookFileBytes(files[key]);
          if (!bytes?.length) return null;
          const extension = key.split(".").pop().toLowerCase();
          const imageName = `${baseName}-${key.split("/").pop()}`;
          return new File([bytes], imageName, { type: imageMimeType(extension) });
        })
        .filter(Boolean);
    }

    function workbookFileBytes(entry) {
      if (!entry) return null;
      if (entry instanceof Uint8Array) return entry;
      if (entry instanceof ArrayBuffer) return new Uint8Array(entry);
      const content = entry.content ?? entry.data ?? entry;
      if (content instanceof Uint8Array) return content;
      if (content instanceof ArrayBuffer) return new Uint8Array(content);
      if (Array.isArray(content)) return new Uint8Array(content);
      if (typeof content === "string") {
        const bytes = new Uint8Array(content.length);
        for (let index = 0; index < content.length; index += 1) {
          bytes[index] = content.charCodeAt(index) & 255;
        }
        return bytes;
      }
      return null;
    }

    function imageMimeType(extension) {
      const types = {
        jpg: "image/jpeg",
        jpeg: "image/jpeg",
        png: "image/png",
        webp: "image/webp",
        bmp: "image/bmp",
        tif: "image/tiff",
        tiff: "image/tiff"
      };
      return types[extension] || "image/png";
    }

    function dedupePrepImports(items) {
      const seen = new Set();
      return items.filter(item => {
        const key = String(item?.name || "").trim().toLowerCase();
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function showRecipeSheetImport(recipeSheets, output, status, sourceLabel) {
      pendingRecipeSheetImport = recipeSheets;
      output.value = recipeSheets.map(recipe => recipeCategory(recipe) + " - " + recipe.name + " (" + recipe.ingredients.length + " ingredients)").join("\n");
      status.value = recipeSheets.length + " recipe sheets extracted with " + sourceLabel + ". Review and import them below.";
      renderRecipeSheetImport();
    }

    async function extractRecipeFile() {
      const fileInput = document.getElementById("recipeOcrFile");
      const output = document.getElementById("recipeOcrText");
      const status = document.getElementById("recipeOcrStatus");
      const file = fileInput?.files?.[0];

      if (!file) {
        alert("Choose a recipe file first.");
        return;
      }

      const filename = file.name.toLowerCase();

      try {
        let extractedText = "";
        const isPdf = filename.endsWith(".pdf") || file.type === "application/pdf";
        if (isPdf) {
          let recipeSheets = [];
          try {
            recipeSheets = await extractStructuredRecipePdf(file, status);
          } catch (structuredError) {
            console.warn(structuredError);
          }
          if (recipeSheets.length) {
            showRecipeSheetImport(recipeSheets, output, status, "the local structured reader");
            return;
          }

          try {
            recipeSheets = await extractBrowserStructuredRecipePdf(file, status);
          } catch (browserStructuredError) {
            console.warn(browserStructuredError);
          }
          if (recipeSheets.length) {
            showRecipeSheetImport(recipeSheets, output, status, "the browser table reader");
            return;
          }

          extractedText = await extractRecipePdf(file, status);
        } else if (file.type.startsWith("image/")) {
          extractedText = await extractWithPaddleOcr(file, status);
          output.value = extractedText;
          status.value = extractedText ? "Recipe text extracted with local PaddleOCR. Review it below." : "No recipe text found in that file.";
          return;
        } else if (/\.(xlsx|xls|ods)$/.test(filename)) {
          extractedText = await extractRecipeSpreadsheet(file);
        } else if (/\.(csv|tsv|txt)$/.test(filename) || file.type.startsWith("text/")) {
          status.value = "Reading text file...";
          extractedText = await file.text();
        } else {
          alert("Use an image, PDF, Excel, CSV, or text recipe file.");
          return;
        }

        output.value = extractedText.trim();
        status.value = output.value ? "Plain text extracted. Review it below, or build a recipe card manually." : "No recipe text found in that file.";
      } catch (error) {
        console.error(error);
        if (file.type.startsWith("image/")) {
          status.value = "Local PaddleOCR is not running. Trying browser image reader...";
          await runLocalOcr("recipeOcrFile", "recipeOcrText", "recipeOcrStatus");
          return;
        }
        if (filename.endsWith(".pdf") || file.type === "application/pdf") {
          try {
            status.value = "Reading the PDF in the browser...";
            const recipeSheets = await extractBrowserStructuredRecipePdf(file, status);
            if (recipeSheets.length) {
              showRecipeSheetImport(recipeSheets, output, status, "the browser table reader");
              return;
            }
            output.value = (await extractRecipePdf(file, status)).trim();
            status.value = output.value ? "Plain PDF text extracted. Review it below." : "No recipe text found in that PDF.";
            return;
          } catch (pdfError) {
            console.error(pdfError);
          }
        }
        status.value = "Could not read that file. Try an image or a clearer export.";
      }
    }

    async function extractRecipeSpreadsheet(file) {
      if (!window.XLSX) {
        throw new Error("Spreadsheet reader did not load");
      }
      const workbook = XLSX.read(await file.arrayBuffer(), { type: "array" });
      return workbook.SheetNames.map(sheetName => {
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        const values = rows.map(row => row.map(value => String(value).trim()).filter(Boolean).join(", ")).filter(Boolean);
        return sheetName + "\n" + values.join("\n");
      }).join("\n\n");
    }

    async function extractBrowserStructuredRecipePdf(file, status) {
      if (!window.pdfjsLib) {
        throw new Error("PDF reader did not load");
      }
      status.value = "Reading recipe sheet columns in the browser...";
      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      const recipes = [];

      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
        status.value = "Reading recipe sheet columns on page " + pageNumber + " of " + pdf.numPages + "...";
        const page = await pdf.getPage(pageNumber);
        const viewport = page.getViewport({ scale: 1 });
        const content = await page.getTextContent();
        const items = content.items.map(pdfTextItem).filter(Boolean);
        recipes.push(...parseBrowserRecipeSheetPage(items, viewport.width, viewport.height, pageNumber));
      }

      return dedupeRecipeSheets(recipes);
    }

    function pdfTextItem(item) {
      const text = String(item.str || "").trim();
      if (!text) return null;
      const transform = item.transform || [];
      return {
        text,
        x: Number(transform[4] || 0),
        y: Number(transform[5] || 0),
        width: Number(item.width || 0)
      };
    }

    function parseBrowserRecipeSheetPage(items, pageWidth, pageHeight, pageNumber) {
      const anchors = findRecipeSheetAnchors(items, pageWidth);
      if (!anchors.length) return [];

      const columns = clusterValues(anchors.map(anchor => anchor.x), 28).sort((a, b) => a - b);
      const rows = groupAnchorsByRow(anchors);
      const recipes = [];

      rows.forEach((row, rowIndex) => {
        const nextRow = rows[rowIndex + 1];
        const top = Math.min(pageHeight, row.y + 86);
        const bottom = nextRow ? Math.min(pageHeight, nextRow.y + 86) : 0;

        row.anchors.forEach(anchor => {
          const columnIndex = nearestIndex(columns, anchor.x);
          const left = columnIndex > 0 ? (columns[columnIndex - 1] + columns[columnIndex]) / 2 : 0;
          const right = columnIndex < columns.length - 1 ? (columns[columnIndex] + columns[columnIndex + 1]) / 2 : pageWidth;
          const bounds = { left, right, top, bottom };
          const sheetItems = items.filter(item => item.x >= left - 2 && item.x <= right + 2 && item.y <= top && item.y >= bottom);
          const recipe = parseBrowserRecipeRegion(sheetItems, bounds, pageNumber);
          if (recipe) recipes.push(recipe);
        });
      });

      return recipes;
    }

    function findRecipeSheetAnchors(items, pageWidth) {
      return buildPdfLines(items, 4).flatMap(line => {
        const clusters = clusterLineItems(line.items, Math.max(22, pageWidth * 0.025));
        return clusters
          .map(cluster => {
            const text = cluster.items.map(item => item.text).join(" ");
            if (!/\bCOSTING\s+SHEET\b/i.test(text)) return null;
            return {
              x: (cluster.minX + cluster.maxX) / 2,
              y: line.y
            };
          })
          .filter(Boolean);
      });
    }

    function buildPdfLines(items, tolerance = 3) {
      const lines = [];
      [...items].sort((a, b) => b.y - a.y || a.x - b.x).forEach(item => {
        let line = lines.find(candidate => Math.abs(candidate.y - item.y) <= tolerance);
        if (!line) {
          line = { y: item.y, items: [] };
          lines.push(line);
        }
        line.items.push(item);
        line.y = (line.y * (line.items.length - 1) + item.y) / line.items.length;
      });

      return lines.map(line => {
        const sorted = line.items.sort((a, b) => a.x - b.x);
        return {
          y: line.y,
          items: sorted,
          text: sorted.map(item => item.text).join(" "),
          minX: Math.min(...sorted.map(item => item.x)),
          maxX: Math.max(...sorted.map(item => item.x + item.width))
        };
      }).sort((a, b) => b.y - a.y || a.minX - b.minX);
    }

    function clusterLineItems(items, gap) {
      const clusters = [];
      [...items].sort((a, b) => a.x - b.x).forEach(item => {
        const previous = clusters[clusters.length - 1];
        const itemRight = item.x + item.width;
        if (!previous || item.x - previous.maxX > gap) {
          clusters.push({ items: [item], minX: item.x, maxX: itemRight });
          return;
        }
        previous.items.push(item);
        previous.maxX = Math.max(previous.maxX, itemRight);
        previous.minX = Math.min(previous.minX, item.x);
      });
      return clusters;
    }

    function groupAnchorsByRow(anchors) {
      const rows = [];
      [...anchors].sort((a, b) => b.y - a.y || a.x - b.x).forEach(anchor => {
        let row = rows.find(candidate => Math.abs(candidate.y - anchor.y) <= 34);
        if (!row) {
          row = { y: anchor.y, anchors: [] };
          rows.push(row);
        }
        row.anchors.push(anchor);
        row.y = (row.y * (row.anchors.length - 1) + anchor.y) / row.anchors.length;
      });
      rows.forEach(row => row.anchors.sort((a, b) => a.x - b.x));
      return rows.sort((a, b) => b.y - a.y);
    }

    function clusterValues(values, tolerance) {
      const clusters = [];
      [...values].sort((a, b) => a - b).forEach(value => {
        const cluster = clusters.find(candidate => Math.abs(candidate.average - value) <= tolerance);
        if (!cluster) {
          clusters.push({ values: [value], average: value });
          return;
        }
        cluster.values.push(value);
        cluster.average = cluster.values.reduce((sum, item) => sum + item, 0) / cluster.values.length;
      });
      return clusters.map(cluster => cluster.average);
    }

    function nearestIndex(values, value) {
      return values.reduce((bestIndex, candidate, index) => {
        return Math.abs(candidate - value) < Math.abs(values[bestIndex] - value) ? index : bestIndex;
      }, 0);
    }

    function parseBrowserRecipeRegion(items, bounds, pageNumber) {
      const rows = pdfItemsToTableRows(items, bounds);
      const costingIndex = rows.findIndex(row => /\bCOSTING\s+SHEET\b/i.test(row.text));
      if (costingIndex < 0) return null;

      const headerIndex = rows.findIndex((row, index) => index > costingIndex && /\bIngredients\b/i.test(row.text));
      const titleStop = headerIndex > costingIndex ? headerIndex : Math.min(rows.length, costingIndex + 8);
      let title = "";
      for (let index = costingIndex + 1; index < titleStop; index += 1) {
        const candidate = cleanPdfCell(rows[index].text);
        if (isRecipeTitleCandidate(candidate)) {
          title = candidate;
          break;
        }
      }
      if (!title) return null;
      const category = findRecipeCategoryInPdfRows(rows, costingIndex, title);

      const ingredients = [];
      let pendingName = "";
      let sellingPrice = 0;
      const start = headerIndex >= 0 ? headerIndex + 1 : costingIndex + 2;

      for (let index = start; index < rows.length; index += 1) {
        const row = rows[index];
        const text = cleanPdfCell(row.text);
        if (!text || /\bCOSTING\s+SHEET\b/i.test(text)) break;
        if (isPdfHeaderRow(text)) continue;

        if (/^MENU PRICE\b/i.test(text)) {
          sellingPrice = parseMoneyValue(row.cells.slice(2).join(" ")) || parseMoneyValue(text) || sellingPrice;
          continue;
        }
        if (/^(WASTAGE|TOTAL COST|VAT|TOTAL INCLUDING VAT|TOTAL INCL)/i.test(text)) continue;

        const name = cleanIngredientCell(row.cells[0]);
        const quantity = parseRecipeQuantity(row);
        if (name && quantity == null) {
          const nextQuantity = rows[index + 1] ? parseRecipeQuantity(rows[index + 1]) : null;
          if (nextQuantity != null || !ingredients.length) {
            pendingName = pendingName ? pendingName + " " + name : name;
          } else {
            ingredients[ingredients.length - 1].ingredient = cleanIngredientCell(ingredients[ingredients.length - 1].ingredient + " " + name);
          }
          continue;
        }
        if (!name || quantity == null) continue;

        const fullName = cleanIngredientCell((pendingName ? pendingName + " " : "") + name);
        pendingName = "";
        if (!fullName || isPdfHeaderRow(fullName)) continue;

        ingredients.push({
          ingredient: fullName,
          qty: quantity,
          unit: inferRecipeUnit(fullName, quantity, row.cells[2]),
          source_bulk_size: row.cells[2],
          source_unit_price: row.cells[3],
          page: pageNumber
        });
      }

      if (!ingredients.length) return null;
      return { name: title, category, sellingPrice, ingredients, page: pageNumber };
    }

    function pdfItemsToTableRows(items, bounds) {
      const width = Math.max(1, bounds.right - bounds.left);
      return buildPdfLines(items, 3).map(line => {
        const cells = ["", "", "", "", ""];
        line.items.forEach(item => {
          const rel = (item.x - bounds.left) / width;
          const column = rel < 0.34 ? 0 : rel < 0.50 ? 1 : rel < 0.66 ? 2 : rel < 0.83 ? 3 : 4;
          cells[column] = [cells[column], item.text].filter(Boolean).join(" ");
        });
        const cleanedCells = cells.map(cleanPdfCell);
        return {
          y: line.y,
          cells: cleanedCells,
          text: cleanPdfCell(cleanedCells.filter(Boolean).join(" "))
        };
      });
    }

    function cleanPdfCell(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function cleanIngredientCell(value) {
      return cleanPdfCell(value)
        .replace(/\(NO STOCK\)/gi, "")
        .replace(/\bR\s*\d+(?:[.,]\d{1,2})?\b/gi, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isRecipeTitleCandidate(value) {
      if (!value) return false;
      if (/^(COSTING SHEET|Ingredients|Quantity item|Bulk item|Price per|Item cost)$/i.test(value)) return false;
      if (/^(used in|ml\/gram|weight or unit|sold)$/i.test(value)) return false;
      return /[A-Za-z]/.test(value);
    }

    function findRecipeCategoryInPdfRows(rows, costingIndex, recipeName) {
      for (let index = costingIndex - 1; index >= Math.max(0, costingIndex - 8); index -= 1) {
        const candidate = cleanPdfCell(rows[index]?.text || rows[index]?.cells?.[0] || "");
        if (isRecipeCategoryCandidate(candidate)) {
          return normalizeRecipeCategory(candidate, recipeName);
        }
      }
      return normalizeRecipeCategory("", recipeName);
    }

    function isRecipeCategoryCandidate(value) {
      const candidate = cleanPdfCell(value);
      if (!candidate || candidate.length > 34) return false;
      if (/^(COSTING SHEET|MENU PRICE|Ingredients|Quantity item|Bulk item|Price per|Item cost)$/i.test(candidate)) return false;
      if (/\d|R\s*\d/i.test(candidate)) return false;
      return /[A-Za-z]/.test(candidate);
    }

    function isPdfHeaderRow(value) {
      return /\b(Ingredients|Quantity item|used in|ml\/gram|Bulk item|weight or unit|Price per|unit\/ml\/gram|Item cost)\b/i.test(value)
        || /^sold$/i.test(value);
    }

    function parseRecipeQuantity(row) {
      for (const index of [1, 2]) {
        const value = String(row.cells[index] || "").trim();
        if (!value || /R/i.test(value)) continue;
        if (/^-?\d+(?:[.,]\d+)?$/.test(value)) {
          return Number(value.replace(",", "."));
        }
        const leadingNumber = value.match(/^-?\d+(?:[.,]\d+)?\b/);
        if (leadingNumber && (index === 1 || !row.cells[1])) {
          return Number(leadingNumber[0].replace(",", "."));
        }
      }
      return null;
    }

    function parseMoneyValue(value) {
      const text = String(value || "");
      const moneyMatch = text.match(/R\s*(\d+(?:[.,]\d{1,2})?)/i);
      if (moneyMatch) return Number(moneyMatch[1].replace(",", "."));
      const numberMatch = text.replace(/%/g, "").match(/\b\d+(?:[.,]\d{1,2})?\b/);
      return numberMatch ? Number(numberMatch[0].replace(",", ".")) : 0;
    }

    function parseBulkQuantity(value) {
      const match = String(value || "").match(/\d+(?:[.,]\d+)?/);
      return match ? Number(match[0].replace(",", ".")) : null;
    }

    function inferRecipeUnit(name, quantity, bulkSize) {
      return inferIngredientUnit(name, quantity, bulkSize);
    }

    function dedupeRecipeSheets(recipes) {
      const seen = new Set();
      return recipes.filter(recipe => {
        const key = [
          String(recipe.name || "").toLowerCase(),
          recipe.page || "",
          (recipe.ingredients || []).map(item => item.ingredient + ":" + item.qty).join("|")
        ].join("::");
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    async function extractRecipePdf(file, status) {
      if (!window.pdfjsLib) {
        throw new Error("PDF reader did not load");
      }
      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      const pages = [];

      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
        status.value = "Reading PDF page " + pageNumber + " of " + pdf.numPages + "...";
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        const text = pdfTextToLines(content.items);
        if (text) pages.push(text);
      }

      if (pages.length) return pages.join("\n\n");
      return extractRecipePdfWithOcr(pdf, status);
    }

    function pdfTextToLines(items) {
      const lines = [];
      let currentLine = [];
      let previousY = null;
      items.forEach(item => {
        const value = String(item.str || "").trim();
        if (!value) return;
        const y = Math.round(item.transform?.[5] || 0);
        if (previousY !== null && Math.abs(y - previousY) > 2 && currentLine.length) {
          lines.push(currentLine.join(" "));
          currentLine = [];
        }
        currentLine.push(value);
        previousY = y;
      });
      if (currentLine.length) lines.push(currentLine.join(" "));
      return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    async function extractRecipePdfWithOcr(pdf, status) {
      if (!window.Tesseract) {
        throw new Error("Image reader did not load");
      }
      const pages = [];
      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
        status.value = "Reading PDF image " + pageNumber + " of " + pdf.numPages + "...";
        const page = await pdf.getPage(pageNumber);
        const viewport = page.getViewport({ scale: 1.5 });
        const canvas = document.createElement("canvas");
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);
        await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
        const result = await Tesseract.recognize(canvas, "eng");
        if (result.data.text.trim()) pages.push(result.data.text.trim());
      }
      return pages.join("\n\n");
    }

    function parseRecipeOcrText() {
      const text = document.getElementById("recipeOcrText").value.trim();
      if (!text) return alert("Extract or paste recipe text first.");

      const lines = text.split("\n").map(line => line.trim()).filter(Boolean);
      const recipeName = lines.find(line => !/\d/.test(line)) || lines[0] || "";
      const parsedIngredients = lines.map(parseIngredientLine).filter(Boolean);

      if (recipeName) document.getElementById("recipeName").value = recipeName;

      const container = document.getElementById("ingredientRows");
      container.innerHTML = "";

      if (!parsedIngredients.length) {
        addIngredientRow();
        alert("I extracted the text, but could not confidently parse ingredients. You can edit the OCR text or add ingredients manually.");
        return;
      }

      parsedIngredients.forEach(addIngredientRow);
    }

    function parseIngredientLine(line) {
      const cleaned = line
        .replace(/[-*•]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      const commaParts = cleaned.split(",").map(part => part.trim()).filter(Boolean);

      if (commaParts.length >= 3) {
        const qty = Number(commaParts[1]);
        if (!qty) return null;
        return {
          ingredient: commaParts[0],
          qty,
          unit: normaliseUnit(commaParts[2])
        };
      }

      const match = cleaned.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*(g|kg|ml|ltr|l|each|pc|pcs|pkt|box)\b/i);
      if (!match) return null;

      return {
        ingredient: match[1].trim(),
        qty: Number(match[2]),
        unit: normaliseUnit(match[3])
      };
    }

    function normaliseUnit(unit) {
      const value = String(unit || "").trim().toLowerCase();
      if (!value) return "";
      if (value === "l" || value === "lt") return "ltr";
      if (value === "each") return "EACH";
      if (value === "pc" || value === "pcs") return "EACH";
      if (value === "pkt") return "PKT";
      if (value === "box") return "BOX";
      return value;
    }

    function scrollToEditPanel(panelId) {

        setTimeout(() => panel.classList.remove("return-anchor-highlight"), 3200);
      }, 40);
    }

    function scrollToPrepCard(id) {

    }

    function scrollToRecipeSheet(id) {
      if (!id) return;
      scrollToReturnAnchor(`recipe-sheet-${id}`);
    }

    function prepUnitOptions(selected = "") {
      const units = [...new Set([selected, "g", "kg", "ml", "ltr", "EACH", "PKT", "BOX"].filter(Boolean))];
      return units.map(unit => `<option value="${escapeAttr(unit)}" ${unit === selected ? "selected" : ""}>${escapeHtml(unit)}</option>`).join("");
