    async function extractPrepFile() {
      const fileInput = document.getElementById("prepOcrFile");
      const output = document.getElementById("prepOcrText");
      const status = document.getElementById("prepOcrStatus");
      const file = fileInput?.files?.[0];

      if (!file) {
        alert("Choose a prep file first.");
        return;
      }

      const filename = file.name.toLowerCase();

      try {
        let extractedText = "";
        const isPdf = filename.endsWith(".pdf") || file.type === "application/pdf";
        pendingPrepSheetImport = [];
        renderPrepSheetImport();
        setPrepExtractionHelp("");
        if (isPdf) {
          let prepSheets = [];
          let prepReaderError = null;
          try {
            prepSheets = await extractStructuredPrepPdf(file, status);
          } catch (prepStructuredError) {
            prepReaderError = prepStructuredError;
            console.warn(prepStructuredError);
          }
          if (prepSheets.length) {
            showPrepSheetImport(prepSheets, output, status, "the local prep-card reader");
            return;
          }
          if (prepReaderError) {
            output.value = "";
            const message = localPrepReaderHelpMessage(prepReaderError);
            status.value = prepReaderError.localOcrResponded
              ? "The local OCR helper is running but hit an error. Restart it, then try again."
              : "Start or restart the local OCR helper, then extract this prep PDF again.";
            setPrepExtractionHelp(message, "amber");
            return;
          }
          try {
            prepSheets = await extractStructuredRecipePdf(file, status);
          } catch (structuredError) {
            console.warn(structuredError);
          }
          if (!prepSheets.length) {
            try {
              prepSheets = await extractBrowserStructuredRecipePdf(file, status);
            } catch (browserStructuredError) {
              console.warn(browserStructuredError);
            }
          }
          if (prepSheets.length) {
            showPrepSheetImport(prepSheets, output, status, "structured PDF reader");
            return;
          }
          extractedText = await extractRecipePdf(file, status);
        } else if (file.type.startsWith("image/")) {
          let prepSheets = [];
          try {
            prepSheets = await extractStructuredPrepPdf(file, status);
          } catch (prepImageError) {
            console.warn(prepImageError);
          }
          if (prepSheets.length) {
            showPrepSheetImport(prepSheets, output, status, "the local prep-card image reader");
            return;
          }
          extractedText = await extractWithPaddleOcr(file, status);
          output.value = extractedText;
          status.value = extractedText ? "Prep text extracted with local PaddleOCR. Review it below." : "No prep text found in that file.";
          return;
        } else if (/\.(xlsx|xls|ods)$/.test(filename)) {
          let prepSheets = [];
          let prepSpreadsheetError = null;
          try {
            prepSheets = await extractPrepSpreadsheet(file, status);
          } catch (spreadsheetError) {
            prepSpreadsheetError = spreadsheetError;
            console.warn(spreadsheetError);
          }
          if (prepSheets.length) {
            showPrepSheetImport(prepSheets, output, status, "the Excel prep reader");
            return;
          }
          extractedText = await extractRecipeSpreadsheet(file);
          if (prepSpreadsheetError) {
            setPrepExtractionHelp("This Excel file stores the prep cards as embedded images. Start or restart the local OCR helper, then extract the Excel file again.", "amber");
          }
        } else if (/\.(csv|tsv|txt)$/.test(filename) || file.type.startsWith("text/")) {
          status.value = "Reading text file...";
          extractedText = await file.text();
        } else {
          alert("Use an image, PDF, Excel, CSV, or text prep file.");
          return;
        }

        output.value = extractedText.trim();
        if (output.value && isLikelyFlattenedPrepText(output.value)) {
          status.value = "This file needs the local prep-card reader.";
          setPrepExtractionHelp(flattenedPrepHelpMessage(), "amber");
        } else {
          status.value = output.value ? "Prep text extracted. Review it below, then build a prep item." : "No prep text found in that file.";
        }
      } catch (error) {
        console.error(error);
        if (file.type.startsWith("image/")) {
          status.value = "Local PaddleOCR is not running. Trying browser image reader...";
          await runLocalOcr("prepOcrFile", "prepOcrText", "prepOcrStatus");
          return;
        }
        if (filename.endsWith(".pdf") || file.type === "application/pdf") {
          try {
            status.value = "Reading the PDF in the browser...";
            const prepSheets = await extractBrowserStructuredRecipePdf(file, status);
            if (prepSheets.length) {
              showPrepSheetImport(prepSheets, output, status, "browser table reader");
              return;
            }
            output.value = (await extractRecipePdf(file, status)).trim();
            if (output.value && isLikelyFlattenedPrepText(output.value)) {
              status.value = "This file needs the local prep-card reader.";
              setPrepExtractionHelp(flattenedPrepHelpMessage(), "amber");
            } else {
              status.value = output.value ? "Plain PDF text extracted. Review it below." : "No prep text found in that PDF.";
            }
            return;
          } catch (pdfError) {
            console.error(pdfError);
          }
        }
        status.value = "Could not read that prep file. Try a clearer file or paste the text.";
      }
    }

    function setPrepExtractionHelp(message, tone = "amber") {
      const container = document.getElementById("prepExtractionHelp");
      if (!container) return;
      container.innerHTML = message ? `<div class="notice ${tone}">${escapeHtml(message)}</div>` : "";
    }

    function localPrepReaderHelpMessage(error) {
      if (error?.localOcrResponded) {
        return "The local OCR helper is running, but it hit an error while reading this prep PDF. Close the helper window, open start-paddle-ocr.bat again so it loads the latest fix, then click Extract Prep Items.";
      }
      return "These bulk prep PDFs are full spreadsheet exports with many tiny costing cards. Start or restart the local OCR helper, then click Extract Prep Items again. Recipe Vault checks ports 8765 and 8000. The helper file is outputs\\recipe-vault-paddle-ocr\\start-paddle-ocr.bat.";
    }

    function flattenedPrepHelpMessage() {
      return "This PDF text is flattened, so headers, prices, and ingredients are mixed together. Use the local prep-card reader, upload the original Excel sheet, or use the Universal Recipe OCR Import Template with Recipes Import and Ingredients Import sheets.";
    }

    function showPrepSheetImport(prepSheets, output, status, sourceLabel) {
      pendingPrepSheetImport = prepSheets
        .map(normalizePrepImportSource)
        .filter(item => item.name && item.ingredients.length && isUsablePrepImport(item));
      output.value = pendingPrepSheetImport.map(item => `${item.category} - ${item.name} (${item.ingredients.length} ingredients, yields ${item.yieldQty} ${item.yieldUnit})`).join("\n");
      status.value = pendingPrepSheetImport.length
        ? `${pendingPrepSheetImport.length} prep items extracted with ${sourceLabel}. Review and import them below.`
        : "No prep items could be read from that file.";
      setPrepExtractionHelp(
        pendingPrepSheetImport.length ? "Prep items are ready. Use Import Prep Items above to add them to your Prep Item Database." : flattenedPrepHelpMessage(),
        pendingPrepSheetImport.length ? "green" : "amber"
      );
      renderPrepSheetImport();
    }

    function renderPrepSheetImport() {
      const container = document.getElementById("prepSheetImport");
      if (!container) return;
      if (!pendingPrepSheetImport.length) {
        container.innerHTML = "";
        syncPrepTextBuilderState();
        return;
      }

      const preview = pendingPrepSheetImport.slice(0, 10);
      const remaining = pendingPrepSheetImport.length - preview.length;
      container.innerHTML = `
        <div class="notice" style="margin-top:12px">
          <strong>${pendingPrepSheetImport.length} prep items are ready to import.</strong>
          <div class="split" style="margin-top:10px">
            <button class="btn" onclick="importPrepSheets()">Import Prep Items</button>
            <button class="btn secondary" onclick="clearPrepSheetImport()">Clear</button>
          </div>
        </div>
        <div class="table-wrap" style="margin-top:12px">
          <table>
            <thead><tr><th>Prep item</th><th>Section</th><th class="num">Yield</th><th class="num">Ingredients</th></tr></thead>
            <tbody>
              ${preview.map(item => `<tr><td><strong>${escapeHtml(item.name)}</strong></td><td><span class="badge blue">${escapeHtml(item.category)}</span></td><td class="num">${item.yieldQty} ${escapeHtml(item.yieldUnit)}</td><td class="num">${item.ingredients.length}</td></tr>`).join("")}
              ${remaining > 0 ? `<tr><td colspan="4" class="muted">+${remaining} more prep items</td></tr>` : ""}
            </tbody>
          </table>
        </div>
      `;
      syncPrepTextBuilderState();
    }

    function syncPrepTextBuilderState() {
      const hasPendingImport = pendingPrepSheetImport.length > 0;
      const button = document.getElementById("prepBuildTextButton");
      const textarea = document.getElementById("prepOcrText");
      if (button) {
        button.disabled = hasPendingImport;
        button.title = hasPendingImport ? "Import the extracted prep items above first." : "";
      }
      if (textarea) {
        textarea.readOnly = hasPendingImport;
        textarea.placeholder = hasPendingImport
          ? "Extracted prep items are ready above."
          : "Extracted prep text appears here. You can also paste text, then click Build Prep Item.";
      }
    }

    function importPrepSheets() {
      let added = 0;
      let updated = 0;
      pendingPrepSheetImport.forEach(source => {
        const prepItem = {
          id: uid("prep"),
          name: source.name,
          category: source.category || "Prep",
          yieldQty: Number(source.yieldQty || 1),
          yieldUnit: source.yieldUnit || "EACH",
          ingredients: source.ingredients
        };
        const existingIndex = state.prepItems.findIndex(item => item.name.toLowerCase() === prepItem.name.toLowerCase());
        if (existingIndex >= 0) {
          prepItem.id = state.prepItems[existingIndex].id;
          state.prepItems[existingIndex] = prepItem;
          updated += 1;
        } else {
          state.prepItems.push(prepItem);
          added += 1;
        }
      });
      pendingPrepSheetImport = [];
      saveState();
      renderPrepItems();
      alert(`Prep items imported. Added ${added} and updated ${updated}.`);
    }

    function clearPrepSheetImport() {
      pendingPrepSheetImport = [];
      const output = document.getElementById("prepOcrText");
      if (output) output.value = "";
      setPrepExtractionHelp("");
      renderPrepSheetImport();
    }

    function parsePrepOcrText() {
      const text = document.getElementById("prepOcrText").value.trim();
      const status = document.getElementById("prepOcrStatus");
      if (pendingPrepSheetImport.length) {
        if (status) status.value = "Prep items are ready to import.";
        setPrepExtractionHelp("Use Import Prep Items above to add the extracted prep items to your database.", "green");
        return;
      }
      if (!text) return alert("Extract or paste prep text first.");
      if (isLikelyFlattenedPrepText(text)) {
        if (status) status.value = "This file needs the local prep-card reader.";
        setPrepExtractionHelp(flattenedPrepHelpMessage(), "amber");
        return;
      }

      const lines = text.split("\n").map(line => line.trim()).filter(Boolean);
      const ingredients = parsePrepIngredientText(text);
      const name = lines.find(line => isPrepNameCandidate(line, ingredients)) || "Prep Item";

      if (!ingredients.length) {
        if (status) status.value = "No clear prep ingredients found in that text.";
        setPrepExtractionHelp("I could not confidently find prep ingredients in that text. If this came from one of the bulk prep PDFs, start the local OCR helper and use Extract Prep Items again.", "amber");
        return;
      }

      const yieldInfo = inferPrepYield({ name, ingredients });
      document.getElementById("prepName").value = cleanPrepName(name);
      document.getElementById("prepCategory").value = inferPrepCategory(name, "Prep");
      document.getElementById("prepYieldQty").value = yieldInfo.yieldQty;
      document.getElementById("prepYieldUnit").value = yieldInfo.yieldUnit;

      const container = document.getElementById("prepIngredientRows");
      container.innerHTML = "";
      ingredients.forEach(addPrepIngredientRow);
      setPrepExtractionHelp("Prep item built from text. Review the fields below before saving.", "green");
    }

    function parsePrepIngredientText(text) {
      const parsed = [];
      text.split("\n").map(line => line.trim()).filter(Boolean).forEach(line => {
        if (isBadPrepTextFragment(line)) return;
        const direct = parseIngredientLine(line);
        if (direct && isUsablePrepIngredient(direct)) {
          parsed.push(direct);
          return;
        }

        const pattern = /([A-Za-z][A-Za-z0-9 &/().'-]*?)\s+(\d+(?:\.\d+)?)\s*(g|kg|ml|ltr|l|each|pc|pcs|pkt|box)\b/gi;
        let match;
        while ((match = pattern.exec(line)) !== null) {
          const candidate = {
            ingredient: match[1].trim(),
            qty: Number(match[2]),
            unit: normaliseUnit(match[3])
          };
          if (isUsablePrepIngredient(candidate)) parsed.push(candidate);
        }
      });

      const seen = new Set();
      return parsed.filter(item => {
        const key = `${item.ingredient.toLowerCase()}|${item.qty}|${item.unit}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return item.ingredient && item.qty > 0;
      });
    }

    function isPrepNameCandidate(line, ingredients) {
      const clean = cleanPrepName(line);
      if (!clean || clean.length > 60) return false;
      if (isBadPrepTextFragment(clean)) return false;
      if (/^(ingredients|costing sheet|quantity item|bulk item|price per|item cost|menu price)$/i.test(clean)) return false;
      return !ingredients.some(item => clean.toLowerCase() === item.ingredient.toLowerCase());
    }

    function cleanPrepName(value) {
      return String(value || "")
        .replace(/\s+\d+(?:\.\d+)?\s*(g|kg|ml|ltr|l|each|pc|pcs|pkt|box)\b/gi, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isBadPrepTextFragment(value) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      if (!text) return true;
      if (text.length > 80) return true;
      if (/^\[\d+\]\s*/.test(text)) return true;
      if (/\b(SEASON|KONG YEN|SOURCE|REFERENCE)\b/i.test(text)) return true;
      if (/(^|\s)R\s*\d+(?:[.,]\d+)?/.test(text)) return true;
      return /\b(COSTING SHEET|TOTAL COST|YIELD IN|PORTION VOLUME|COST PER PORTION|PRICE PER|ITEM COST|QUANTITY ITEM|BULK ITEM|MENU PRICE|VAT @|INGREDIENTS)\b/i.test(text);
    }

    function isUsablePrepIngredient(ingredient) {
      const name = String(ingredient?.ingredient || "").replace(/\s+/g, " ").trim();
      if (!name || !Number(ingredient?.qty)) return false;
      if (isBadPrepTextFragment(name)) return false;
      if (/^\[\d+\]/.test(name)) return false;
      if (/\d+\s*$/.test(name)) return false;
      if (name.length > 48) return false;
      if (name.split(/\s+/).length > 7) return false;
      if (!/[A-Za-z]/.test(name)) return false;
      return true;
    }

    function isUsablePrepImport(item) {
      if (!item || !item.name || isBadPrepTextFragment(item.name)) return false;
      if (!Array.isArray(item.ingredients) || !item.ingredients.length) return false;
      return item.ingredients.every(isUsablePrepIngredient);
    }

    function isLikelyFlattenedPrepText(text) {
      const value = String(text || "");
      const headerHits = (value.match(/\b(COSTING SHEET|TOTAL COST|YIELD IN|PORTION VOLUME|PRICE PER|ITEM COST)\b/gi) || []).length;
      const lineCount = value.split("\n").filter(line => line.trim()).length;
      const averageLineLength = value.length / Math.max(lineCount, 1);
      const compactSpreadsheetText = /\bCOSTING SHEET\b[\s\S]{0,120}\bIngredients\b[\s\S]{0,120}\bQuantity item\b/i.test(value);
      const denseNumberRuns = (value.match(/\b\d+(?:[.,]\d+)?\b/g) || []).length;
      return (headerHits >= 3 && (lineCount <= 20 || averageLineLength > 120))
        || compactSpreadsheetText
        || (value.length > 350 && denseNumberRuns > 30 && !/\b(kg|g|ml|ltr|each|pc|pcs|pkt|box)\b/i.test(value));
    }

    function normalizePrepImportSource(source) {
      const name = cleanPrepName(source.name || "Prep Item");
      const ingredients = (source.ingredients || [])
        .map(ingredient => normalizePrepIngredientForItem({ name }, ingredient))
        .filter(Boolean)
        .filter(isUsablePrepIngredient);
      const yieldInfo = normalizePrepYieldInfo({ ...source, ingredients });
      return {
        name,
        category: normalizePrepSection(source.category || "Prep", name),
        yieldQty: yieldInfo.yieldQty,
        yieldUnit: yieldInfo.yieldUnit,
        ingredients
      };
    }

    function inferPrepCategory(name, fallback = "Prep") {
      return normalizePrepSection(fallback, name);
    }

    function normalizePrepSection(value, name = "") {
      const raw = String(value || "").replace(/\s+/g, " ").trim();
      const text = `${raw} ${name || ""}`.toUpperCase();
      if (/\bHOT\b|\bGRILL\b|\bMAIN\b|\bKITCHEN\b/.test(text)) return "Hot Section";
      if (/\bPASTRY\b|\bBAKERY\b|\bDESSERT\b|\bBAKED\b|\bCAKE\b|\bTART\b|\bBREAD\b|\bFOCACCIA\b|\bNAAN\b/.test(text)) return "Pastry";
      if (/\bCOLD\b|\bSTARTER\b|\bSTARTERS\b|\bSALAD\b|\bGARNISH\b|\bPICKLED\b|\bHUMMUS\b/.test(text)) return "Cold / Starter";
      if (/\bSUSHI\b|\bNORI\b|\bPONZU\b|\bWASABI\b|\bCALIFORNIA\b/.test(text)) return "Sushi";
      if (/\bSAUCE\b|\bDRESSING\b|\bMAYO\b|\bMARINADE\b|\bGLAZE\b|\bTERIYAKI\b|\bAIOLI\b/.test(text)) return "Sauces";
      if (/\bBATTER\b|\bTEMPURA\b|\bCRUMB\b|\bPANKO\b/.test(text)) return "Batters";
      if (/\bMIX\b|\bPASTE\b|\bSPRINKLE\b/.test(text)) return "Mixes";
      if (/\bBULK\s+PREP\b|\bPREP\b/.test(raw.toUpperCase()) && raw.length > 4) return cleanPrepSectionName(raw);
      return raw && raw.toUpperCase() !== "PREP" ? cleanPrepSectionName(raw) : "Prep";
    }

    function cleanPrepSectionName(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase())
        .replace(/\bAnd\b/g, "and")
        .replace(/\bOf\b/g, "of");
    }

    function legacyInferPrepCategory(name, fallback = "Prep") {
      const upper = String(name || "").toUpperCase();
      if (/\b(SAUCE|TERIYAKI|MAYO|DRESSING|GLAZE|PONZU|TIKKA)\b/.test(upper)) return "Sauce";
      if (/\b(BATTER|CRUMB|CRUMBS|PANKO)\b/.test(upper)) return "Batter";
      if (/\b(MIX|PASTE|GARNISH|SPRINKLE)\b/.test(upper)) return "Mix";
      return fallback || "Prep";
    }

    function inferPrepYield(source) {
      const text = String(source.name || "");
      const explicit = text.match(/\b(\d+(?:\.\d+)?)\s*(ml|ltr|lt|l|g|kg)\b/i);
      if (explicit) {
        return { yieldQty: Number(explicit[1]), yieldUnit: normaliseUnit(explicit[2]) };
      }

      const totals = {};
      (source.ingredients || []).forEach(ingredient => {
        const base = prepBaseQuantity(ingredient.qty, ingredient.unit);
        totals[base.unit] = (totals[base.unit] || 0) + base.qty;
      });

      if (totals.ml || totals.g) {
        return Number(totals.ml || 0) >= Number(totals.g || 0)
          ? { yieldQty: roundPrepQty(totals.ml), yieldUnit: "ml" }
          : { yieldQty: roundPrepQty(totals.g), yieldUnit: "g" };
      }
      return { yieldQty: 1, yieldUnit: "EACH" };
    }

    function normalizePrepYieldInfo(source) {
      const inferred = inferPrepYield({ name: source.name, ingredients: source.ingredients || [] });
      const yieldQty = Number(source.yieldQty || 0);
      const rawUnit = normaliseUnit(source.yieldUnit || "");
      if (!yieldQty) return inferred;
      const yieldUnit = shouldTreatCountYieldAsBulk(yieldQty, rawUnit, source.ingredients || [])
        ? inferred.yieldUnit
        : (rawUnit || inferred.yieldUnit || "g");
      return { yieldQty, yieldUnit };
    }

    function shouldTreatCountYieldAsBulk(yieldQty, yieldUnit, ingredients) {
      const countUnits = new Set(["", "EACH", "each", "pc", "pcs", "PKT", "BOX"]);
      if (!countUnits.has(yieldUnit)) return false;
      if (Number(yieldQty || 0) < 250) return false;
      const inferred = inferPrepYield({ ingredients });
      return inferred.yieldUnit === "g" || inferred.yieldUnit === "ml";
    }

    function prepBaseQuantity(qty, unit) {
      const parsed = parseUnitSize(unit);
      const amount = Number(qty || 0) * Number(parsed.qty || 1);
      if (parsed.base === "kg") return { qty: amount * 1000, unit: "g" };
      if (parsed.base === "g") return { qty: amount, unit: "g" };
      if (parsed.base === "ltr") return { qty: amount * 1000, unit: "ml" };
      if (parsed.base === "ml") return { qty: amount, unit: "ml" };
      return { qty: amount, unit: parsed.base || unit || "EACH" };
    }

    function roundPrepQty(value) {
      return Math.round(Number(value || 0) * 100) / 100;
    }

    function prepItemCards() {
      const items = filteredPrepItems();
      if (!state.prepItems.length) return `<div class="empty">No prep items saved yet. Add sauces, mixes, batters, or garnish batches here.</div>`;
      if (!items.length) return `<div class="empty">No prep items in this section yet.</div>`;
      return items
        .sort((a, b) => `${a.category || ""} ${a.name}`.localeCompare(`${b.category || ""} ${b.name}`))
        .map(prepItemCard)
        .join("");
    }

    function filteredPrepItems() {
      return state.prepItems.filter(item => prepSectionFilter === "All" || (item.category || "Prep") === prepSectionFilter);
    }

    function prepCostSummary() {
      const items = filteredPrepItems();
      return items.reduce((summary, item) => {
        const cost = prepItemCost(item, new Set([item.id]));
        if (cost == null) {
          summary.missing += 1;
        } else {
          summary.total += cost;
          summary.costed += 1;
        }
        return summary;
      }, { total: 0, costed: 0, missing: 0, count: items.length });
    }

    function prepCostSummaryStrip() {
      const summary = prepCostSummary();
      return `
        <div class="prep-summary-grid">
          ${prepSummaryTile("Total to make", money(summary.total))}
          ${prepSummaryTile("Costed batches", `${summary.costed} / ${summary.count}`)}
          ${prepSummaryTile("Needs prices", summary.missing)}
        </div>
      `;
    }

    function prepSummaryTile(label, value) {
      return `<div class="prep-summary-tile"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
    }

    function prepSections(includeAll = true) {
      const defaults = ["Hot Section", "Cold / Starter", "Pastry", "Sushi", "Bulk Prep", "Sauces", "Batters", "Mixes", "Prep"];
      const saved = state.prepItems.map(item => item.category || "Prep");
      const sections = [...new Set([...defaults, ...saved].filter(Boolean))]
        .sort((a, b) => {
          const order = defaults.indexOf(a) - defaults.indexOf(b);
          if (defaults.includes(a) && defaults.includes(b)) return order;
          if (defaults.includes(a)) return -1;
          if (defaults.includes(b)) return 1;
          return a.localeCompare(b);
        });
      return includeAll ? ["All", ...sections] : sections;
    }

    function prepSectionTabs() {
      return `
        <div class="prep-section-tabs">
          ${prepSections().map(section => {
            const count = section === "All" ? state.prepItems.length : state.prepItems.filter(item => (item.category || "Prep") === section).length;
            return `<button class="btn secondary ${section === prepSectionFilter ? "active" : ""}" onclick="setPrepSectionFilter('${escapeAttr(section)}')">${escapeHtml(section)} <span class="badge">${count}</span></button>`;
          }).join("")}
        </div>
      `;
    }

    function setPrepSectionFilter(section) {
      prepSectionFilter = section || "All";
      renderPrepItems();
    }

    function prepItemCard(item) {
      const batchCost = prepItemCost(item, new Set([item.id]));
      const unitPrice = batchCost == null || !Number(item.yieldQty) ? null : batchCost / Number(item.yieldQty);
      const totalCostLabel = batchCost == null ? "Missing stock prices" : money(batchCost);
      const unitCostLabel = unitPrice == null ? "--" : `${money(unitPrice)} / ${escapeHtml(item.yieldUnit || "unit")}`;
      const rows = (item.ingredients || []).map((ingredient, index) => {
        const ingredientUnit = resolveRecipeIngredientUnit(ingredient);
        const cost = ingredientCostWithPrepContext(ingredient, new Set([item.id]));
        const prep = findPrepForCostingIngredient(ingredient);
        const noCost = isNoCostIngredient(ingredient.ingredient);
        const linkedStock = linkedStockForIngredient(ingredient.ingredient);
        const status = noCost
          ? `<span class="badge green">No cost</span>`
          : cost == null
          ? (prep ? prepItemLink(ingredient.ingredient) : missingStockAction(ingredient.ingredient, ingredientUnit))
          : `<span class="invoice-line-status"><span class="badge ${prep ? "blue" : "green"}">${prep ? "Prep" : "Stock"}</span>${linkedStock && !prep ? linkedStockActions(ingredient.ingredient) : ""}</span>`;
        return `<tr id="prep-${escapeAttr(item.id)}-ingredient-${index}" data-return-anchor="prep-${escapeAttr(item.id)}-ingredient-${index}"><td><strong>${escapeHtml(ingredient.ingredient)}</strong></td><td class="num">${ingredient.qty} ${escapeHtml(ingredientUnit)}</td><td class="num">${cost == null ? "--" : money(cost)}</td><td>${status}</td></tr>`;
      }).join("");

      return `
        <div id="prep-card-${escapeAttr(item.id)}" class="prep-card" data-return-anchor="prep-card-${escapeAttr(item.id)}">
          <div class="prep-card-head">
            <div>
              <h4>${escapeHtml(item.name)}</h4>
              <div class="split">
                <span class="badge blue">${escapeHtml(item.category || "Prep")}</span>
                <span class="badge">${Number(item.yieldQty || 0)} ${escapeHtml(item.yieldUnit || "")}</span>
                <span class="badge ${batchCost == null ? "amber" : "green"}">Total cost to make: ${totalCostLabel}</span>
                <span class="badge">Unit cost: ${unitCostLabel}</span>
              </div>
            </div>
            <div class="prep-actions">
              <button class="btn edit icon" title="Edit prep item" onclick="editPrepItem('${item.id}')">${miniIcon("pen")}</button>
              <button class="btn danger icon" title="Delete prep item" onclick="deletePrepItem('${item.id}')">${miniIcon("trash")}</button>
            </div>
          </div>
          <div class="prep-card-body table-wrap">
            <table>
              <thead><tr><th>Ingredient</th><th class="num">Batch qty</th><th class="num">Cost</th><th>Status</th></tr></thead>
              <tbody>
                ${rows || `<tr><td colspan="4" class="muted">No ingredients added yet.</td></tr>`}
                <tr class="prep-total-row"><td colspan="2">Total cost to make this prep item</td><td class="num">${batchCost == null ? "--" : money(batchCost)}</td><td>${batchCost == null ? `<span class="badge amber">Needs prices</span>` : `<span class="badge green">Costed</span>`}</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function savePrepItem() {
      const name = document.getElementById("prepName").value.trim();
      const category = normalizePrepSection(document.getElementById("prepCategory").value.trim() || "Prep", name);
      const rawYieldQty = Number(document.getElementById("prepYieldQty").value || 0);
      const rawYieldUnit = document.getElementById("prepYieldUnit").value;
      const ingredients = [...document.querySelectorAll(".prep-row")]
        .map(row => normalizePrepIngredientForItem({ name }, {
          ingredient: row.querySelector(".prep-ing-name").value.trim(),
          qty: Number(row.querySelector(".prep-ing-qty").value || 0),
          unit: row.querySelector(".prep-ing-unit").value
        }))
        .filter(Boolean)
        .filter(ingredient => ingredient.ingredient && ingredient.qty > 0);
      const yieldInfo = normalizePrepYieldInfo({ name, ingredients, yieldQty: rawYieldQty, yieldUnit: rawYieldUnit });
      const yieldQty = yieldInfo.yieldQty;
      const yieldUnit = yieldInfo.yieldUnit;

      if (!name || !yieldQty || !ingredients.length) {
        alert("Add a prep item name, final yield, and at least one ingredient.");
        return;
      }

      const prepItem = { id: editingPrepId || uid("prep"), name, category, yieldQty, yieldUnit, ingredients };
      const duplicate = state.prepItems.find(item => item.id !== prepItem.id && item.name.toLowerCase() === name.toLowerCase());
      if (duplicate && !confirm(`"${name}" already exists. Save another item with the same name?`)) return;

      if (editingPrepId) {
        state.prepItems = state.prepItems.map(item => item.id === editingPrepId ? prepItem : item);
      } else {
        state.prepItems.push(prepItem);
      }
      editingPrepId = null;
      prepEditReturnId = "";
      if (prepSectionFilter !== "All" && prepSectionFilter !== prepItem.category) prepSectionFilter = prepItem.category || "All";
      saveState();
      renderPrepItems();
      scrollToPrepCard(prepItem.id);
    }

    function editPrepItem(id) {
      if (!state.prepItems.some(item => item.id === id)) return;
      editingPrepId = id;
      prepEditReturnId = id;
      renderPrepItems();
      scrollToEditPanel("prepEditPanel");
    }

    function cancelPrepEdit() {
      const returnId = prepEditReturnId || editingPrepId;
      const returnItem = state.prepItems.find(item => item.id === returnId);
      if (returnItem && prepSectionFilter !== "All" && prepSectionFilter !== returnItem.category) {
        prepSectionFilter = returnItem.category || "All";

      editingPrepId = null;
      prepEditReturnId = "";
      renderPrepItems();
      scrollToPrepCard(returnId);

    function deletePrepItem(id) {
      const item = state.prepItems.find(prep => prep.id === id);

      state.prepItems = state.prepItems.filter(prep => prep.id !== id);
      if (editingPrepId === id) editingPrepId = null;
      if (prepEditReturnId === id) prepEditReturnId = "";
      saveState();
      renderPrepItems();
    }

        const recipe = {
          id: uid("re"),
          name: source.name,

    async function compactImageFile(file, maxSide = 900) {
      const originalDataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Could not read image"));
        reader.readAsDataURL(file);
      });

      return new Promise(resolve => {
        const image = new Image();
        image.onload = () => {
          const scale = Math.min(1, maxSide / Math.max(image.width || 1, image.height || 1));
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1, Math.round((image.width || 1) * scale));
          canvas.height = Math.max(1, Math.round((image.height || 1) * scale));
          const ctx = canvas.getContext("2d");
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/jpeg", 0.84));
        };
        image.onerror = () => resolve(originalDataUrl);
        image.src = originalDataUrl;
      });
    }

    function editRecipe(id) {
      if (!state.recipes.some(recipe => recipe.id === id)) return;
      editingRecipeId = id;
      recipeEditReturnId = id;
      renderRecipes();
      scrollToEditPanel("recipeEditPanel");
    }

    function cancelRecipeEdit() {
      const returnId = recipeEditReturnId || editingRecipeId;
      const returnRecipe = state.recipes.find(recipe => recipe.id === returnId);
      if (returnRecipe && recipeCategoryFilter !== "All" && recipeCategoryFilter !== recipeCategory(returnRecipe)) {
        recipeCategoryFilter = recipeCategory(returnRecipe) || "All";
      }
      editingRecipeId = null;
      recipeEditReturnId = "";
      renderRecipes();
      scrollToRecipeSheet(returnId);
    }

    function deleteRecipe(id) {
      const recipe = state.recipes.find(item => item.id === id);
      if (!recipe || !confirm(`Delete "${recipe.name}" and its costing sheet?`)) return;
      state.recipes = state.recipes.filter(item => item.id !== id);
      if (editingRecipeId === id) editingRecipeId = null;
      if (recipeEditReturnId === id) recipeEditReturnId = "";
      saveState();
      renderRecipes();
    }

    function renderStock() {
      const importedCount = state.stock.filter(s => s.source === "June 26 BB Food Stock").length;
      const categoryOptions = stockCategories();
      const focusedName = stockFocusIngredient.trim();
      const focusedStock = state.stock.find(s => s.name.toLowerCase() === focusedName.toLowerCase());
      const linkedStock = linkedStockForIngredient(focusedName);
      const focusMatches = focusedName && !focusedStock ? state.stock.filter(s => stockItemMatchesSearch(s, focusedName)) : [];
      const isAddingFocusedIngredient = stockFocusIngredient && !focusedStock;
      document.getElementById("stock").innerHTML = `
        <div class="card">
          <div class="card-head">
            <h3>Monthly Stock Sheet</h3>
            <div class="split">
              ${periodControl("Stock month")}
              <span class="badge green">${importedCount || bbFoodStockSheet.length} items</span>
            </div>
          </div>
          <div class="card-body">
            <div class="split" style="align-items:center">
              <p class="sheet-note" style="flex:1;margin:0">This is the ingredient price book Recipe Vault uses when recipes are captured. Edit the names, units, and prices here so recipe cards match your real stock sheet.</p>
              <div class="sheet-actions">
                ${stockReturnPage ? `<button id="stockReturnButton" class="btn secondary ${stockReturnHighlight ? "return-highlight" : ""}" onclick="returnFromStockSheet()">${stockReturnButtonLabel()}</button>` : ""}
                <button class="btn" onclick="importBbStockSheet()">Load BB Stock Sheet</button>
                <button class="btn secondary" onclick="clearStockSearch()">Show All</button>
              </div>
            </div>
          </div>
        </div>
        ${stockInvoiceReviewPanel()}
        <div class="card" style="margin-top:16px">
          <div class="card-head"><h3>Add Stock Item</h3><span class="badge ${isAddingFocusedIngredient ? "amber" : ""}">${isAddingFocusedIngredient ? "Price needed" : "Supplier price list"}</span></div>
          <div class="card-body">
            ${stockFocusNotice(focusedName, focusedStock, linkedStock, focusMatches)}
            <div class="grid grid-4">
              <div class="field"><label>Name</label><input id="stockName" value="${isAddingFocusedIngredient ? escapeAttr(stockFocusIngredient) : ""}" placeholder="Ingredient name"></div>
              <div class="field"><label>Unit</label><select id="stockUnit">${unitOptions("KG")}</select></div>
              <div class="field"><label>Unit price</label><input id="stockPrice" type="number" step="0.01"></div>
              <div class="field"><label>Current qty</label><input id="stockQty" type="number" step="0.01"></div>
            </div>
            <div class="split" style="margin-top:12px">
              <div class="field" style="flex:1"><label>Category / supplier</label><input id="stockCategory" placeholder="Robberg, Woolies, Dry goods"></div>
              <div class="field"><label>Par level</label><input id="stockPar" type="number" step="0.01" value="0"></div>
              <button class="btn" onclick="saveStock()">Save Stock Item</button>
            </div>
          </div>
        </div>
        <div class="card" style="margin-top:16px">
          <div class="card-head"><h3>Editable Stock Sheet</h3><span class="badge green stock-count-badge">${filteredStock().length} of ${state.stock.length} items</span></div>
          <div class="card-body">
            <div class="grid grid-3" style="margin-bottom:14px">
              <div class="field"><label>Find ingredient</label><input id="stockSearch" value="${escapeAttr(stockSearch)}" placeholder="Search by name, supplier, or unit" oninput="setStockSearch(this.value)"></div>
              <div class="field"><label>Supplier / section</label><select id="stockCategoryFilter" onchange="setStockCategory(this.value)">${categoryOptions.map(cat => `<option ${cat === stockCategoryFilter ? "selected" : ""}>${escapeHtml(cat)}</option>`).join("")}</select></div>
              <div class="field"><label>How recipe costing reads this</label><div class="sheet-note">KG prices convert grams to kilograms, LTR prices convert ml to litres, and EACH/PKT/BOX are counted directly.</div></div>
            </div>
            <div class="table-wrap">${stockTable()}</div>
          </div>
        </div>
      `;
    }

    function stockCategories() {
      const categories = [...new Set(state.stock.map(s => s.category || "Unsorted"))].sort((a, b) => a.localeCompare(b));
      return ["All", ...categories];
    }

    function filteredStock() {
      const q = stockSearch.trim().toLowerCase();
      return state.stock.filter(s => {
        const category = s.category || "Unsorted";
        const categoryMatch = stockCategoryFilter === "All" || category === stockCategoryFilter;
        return categoryMatch && (!q || stockItemMatchesSearch(s, q));
      }).sort((a, b) => {
        const supplierSort = (a.category || "Unsorted").localeCompare(b.category || "Unsorted");
        if (supplierSort !== 0) return supplierSort;
        return a.name.localeCompare(b.name);
      });
    }

    function stockSearchText(item) {
      return `${item.name} ${item.unit} ${item.category || ""} ${item.source || ""}`.toLowerCase();
    }

    function stockSearchTokens(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .split(" ")
        .filter(token => token.length >= 2);
    }

    function stockItemMatchesSearch(item, query) {
      const text = stockSearchText(item);
      const normalizedQuery = String(query || "").trim().toLowerCase();
      if (!normalizedQuery) return true;
      if (text.includes(normalizedQuery)) return true;
      const tokens = stockSearchTokens(normalizedQuery);
      return tokens.length ? tokens.some(token => text.includes(token)) : false;
    }

    function stockFocusNotice(focusedName, focusedStock, linkedStock, focusMatches) {
      if (!focusedName) return "";
      const invoiceContext = pendingInvoiceReview ? findInvoiceReviewContext(pendingInvoiceReview.invoiceId, pendingInvoiceReview.rowIndex) : null;
      if (invoiceContext) {
        return `
          <div class="notice amber stock-focus-note">
            <strong>${escapeHtml(invoiceContext.row.raw)}</strong> from <strong>${escapeHtml(invoiceContext.invoice.name)}</strong>. Link it to stock or add it manually.
            <div class="split">
              <button class="btn secondary compact" onclick="focusManualStockAdd()">Add manually</button>
            </div>
          </div>
        `;
      }
      if (linkedStock) {
        return `<div class="notice green stock-focus-note"><strong>${escapeHtml(focusedName)}</strong> is linked to <strong>${escapeHtml(linkedStock.name)}</strong>. Recipe Vault will use that stock price for costing.</div>`;
      }
      if (focusedStock) {
        return `<div class="notice green stock-focus-note"><strong>${escapeHtml(focusedName)}</strong> matched an existing stock item. It is highlighted below; use the pencil if you need to update the price.</div>`;
      }
      if (focusMatches.length) {
        return `
          <div class="notice amber stock-focus-note">
            <strong>${escapeHtml(focusedName)}</strong> has possible matches below. Link the correct row or add it manually.
            <div class="split">
              <button class="btn secondary compact" onclick="focusManualStockAdd()">Add manually</button>
            </div>
          </div>
        `;
      }
      return `<div class="notice amber stock-focus-note"><strong>${escapeHtml(focusedName)}</strong>: No stock.</div>`;
    }

    function stockInvoiceReviewPanel() {
      const reviewItems = invoiceReviewItems();
      if (!reviewItems.length) return "";
      const suggestedCount = reviewItems.filter(({ row }) => row.suggestedStockId).length;
      return `
        <div class="card" id="invoiceStockReview" style="margin-top:16px">
          <div class="card-head">
            <h3>Invoice Stock Review</h3>
            <div class="split">
              ${suggestedCount ? `<button class="btn secondary compact" onclick="saveSuggestedInvoiceLinks()">Save suggested links</button>` : ""}
              <span class="badge amber">${reviewItems.length} items need attention</span>
            </div>
          </div>
          <div class="card-body">
            <div class="notice amber" style="margin-bottom:12px">Review these items before they update stock.</div>
            <div class="invoice-review-list">
              ${reviewItems.slice(0, 12).map(({ invoice, row, rowIndex }) => invoiceReviewItem(invoice, row, rowIndex)).join("")}
            </div>
            ${reviewItems.length > 12 ? `<p class="muted" style="margin-bottom:0">+${reviewItems.length - 12} more invoice items need review. Use the invoice detail rows to open each one.</p>` : ""}
          </div>
        </div>
      `;
    }

    function invoiceReviewItem(invoice, row, rowIndex) {
      const suggested = row.suggestedStockId ? state.stock.find(s => s.id === row.suggestedStockId) : null;
      return `
        <div class="invoice-review-item">
          <div><strong>${escapeHtml(row.raw)}</strong><div class="muted">${escapeHtml(row.reviewMessage || "No stock.")}</div></div>
          <div>${escapeHtml(invoice.supplier || "Unknown supplier")}</div>
          <div class="num">${formatInvoiceQty(row)}</div>
          <div>${suggested ? `<span class="badge amber">${escapeHtml(suggested.name)}</span>` : `<span class="badge amber">No stock</span>`}</div>
          <div class="invoice-review-actions">
            ${suggested ? `<button class="btn secondary compact" onclick="confirmInvoiceSuggestion('${invoice.id}', ${rowIndex})">Link suggested</button>` : ""}
            <button class="btn secondary compact" onclick="openStockForInvoiceReview('${invoice.id}', ${rowIndex})">Search stock</button>
            <button class="btn compact" onclick="prepareInvoiceManualStock('${invoice.id}', ${rowIndex})">Add manually</button>
          </div>
        </div>
      `;
    }

    function saveSuggestedInvoiceLinks() {
      const reviewItems = invoiceReviewItems().filter(({ row }) => row.suggestedStockId);
      let saved = 0;
      reviewItems.forEach(({ invoice, row }) => {
        const stock = state.stock.find(s => s.id === row.suggestedStockId);
        if (!stock) return;
        state.invoiceItemLinks[stockLinkKey(row.raw)] = stock.id;
        rollbackInvoiceRowStock(row);
        applyInvoiceRowToStock(invoice, row, stock, "linked");
        addCorrectionHistory("invoice_suggestion_confirmed", {
          invoiceId: invoice.id,
          invoiceName: invoice.name,
          item: row.raw,
          stockId: stock.id,
          stockName: stock.name,
          source: "bulk-suggested-links"
        });
        saved += 1;
      });
      if (!saved) return;
      pendingInvoiceReview = null;
      stockFocusIngredient = "";
      stockSearch = "";
      stockCategoryFilter = "All";
      stockReturnHighlight = true;
      saveState();
      ensureStockDatalist();
      renderStock();
    }

    function unitOptions(selected) {
      const common = ["KG", "LTR", "EACH", "PKT", "BOX", "TIN", "BTTL", "TRAY", "TUB", "PUN", "100G", "125G", "150ML", "300ML", "400G", "410G", "500G", "500ML", "1LT", "2LTR", "2.5KG", "PKT OF 50"];
      const units = [...new Set([selected, ...common].filter(Boolean))];
      return units.map(unit => `<option value="${escapeAttr(unit)}" ${unit === selected ? "selected" : ""}>${escapeHtml(unit)}</option>`).join("");
    }

    function stockTable() {
      const rows = filteredStock();
      if (!rows.length) {
        const missingName = stockFocusIngredient || stockSearch;
        return `
          <div class="empty">
            No stock items match that search.
            ${missingName ? `<div style="margin-top:12px"><button class="btn" onclick="focusManualStockAdd()">Add ${escapeHtml(missingName)} manually</button></div>` : ""}
          </div>
        `;
      }
      const grouped = rows.reduce((groups, item) => {
        const supplier = item.category || "Unsorted";
        if (!groups[supplier]) groups[supplier] = [];
        groups[supplier].push(item);
        return groups;
      }, {});
      return Object.keys(grouped).sort((a, b) => a.localeCompare(b)).map(supplier => `
        <div class="supplier-group">
          <div class="supplier-title">${escapeHtml(supplier)} (${grouped[supplier].length})</div>
          <table class="stock-edit">
            <thead><tr><th>Ingredient</th><th>Unit</th><th class="num">Unit Price</th><th>Supplier</th><th class="num">Total Stock</th><th class="num">Invoice Qty</th><th class="num">Par Level</th><th>Last Invoice</th><th></th></tr></thead>
            <tbody>
              ${grouped[supplier].map(stockRow).join("")}
            </tbody>
          </table>
        </div>
      `).join("");
    }

    function stockRow(s) {
      const isEditing = editingStockId === s.id;
      const linkedStock = pendingInvoiceReview ? linkedStockForCurrentInvoiceReview() : linkedStockForIngredient(stockFocusIngredient);
      const isLinkedToFocus = stockFocusIngredient && linkedStock?.id === s.id;
      const isFocused = s.name.toLowerCase() === stockFocusIngredient.toLowerCase() || isLinkedToFocus;
      const canLinkToFocus = stockFocusIngredient && s.name.toLowerCase() !== stockFocusIngredient.toLowerCase();
      const linkAction = canLinkToFocus
        ? (isLinkedToFocus && !pendingInvoiceReview
          ? `<button class="btn secondary" data-stock-target="${escapeAttr(stockFocusIngredient)}" title="Remove this stock link" onclick="unlinkStockIngredient(this.dataset.stockTarget)">Unlink</button>`
          : `<button class="btn secondary" title="Use this stock item for ${escapeAttr(stockFocusIngredient)}" onclick="${pendingInvoiceReview ? `linkInvoiceReviewToStock('${s.id}')` : `linkStockToIngredient('${s.id}')`}">${isLinkedToFocus ? "Linked" : "Link"}</button>`)
        : "";
      if (isEditing) {
        return `
          <tr class="${isFocused ? "stock-focused" : ""}" data-stock-id="${s.id}">
            <td><input class="stock-name-input" data-field="name" value="${escapeAttr(s.name)}"></td>
            <td><select class="stock-unit-input" data-field="unit">${unitOptions(s.unit)}</select></td>
            <td class="num"><input class="stock-price-input" data-field="unitPrice" type="number" step="0.01" value="${Number(s.unitPrice || 0)}"></td>
            <td><input class="stock-category-input" data-field="category" value="${escapeAttr(s.category || "")}"></td>
            <td class="num"><input class="stock-qty-input" data-field="qty" type="number" step="0.01" value="${Number(s.qty || 0)}"></td>
            <td class="num">${formatInvoiceStockQty(s)}</td>
            <td class="num"><input class="stock-par-input" data-field="par" type="number" step="0.01" value="${Number(s.par || 0)}"></td>
            <td>${escapeHtml(s.lastInvoice || "--")}</td>
            <td class="num"><div class="stock-actions"><button class="btn save icon" title="Save ingredient" onclick="saveStockEdit('${s.id}')">${miniIcon("check")}</button><button class="btn danger icon row-action" title="Delete ingredient" onclick="deleteStock('${s.id}')">${miniIcon("trash")}</button></div></td>
          </tr>
        `;
      }
      return `
        <tr class="${isFocused ? "stock-focused" : ""}" data-stock-id="${s.id}">
          <td><strong>${escapeHtml(s.name)}</strong></td>
          <td><span class="unit-pill">${escapeHtml(s.unit)}</span></td>
          <td class="num">${money(s.unitPrice)}</td>
          <td>${escapeHtml(s.category || "-")}</td>
          <td class="num">${formatStockQty(s)}</td>
          <td class="num">${formatInvoiceStockQty(s)}</td>
          <td class="num">${Number(s.par || 0) ? Number(s.par).toFixed(2) : "--"}</td>
          <td>${escapeHtml(s.lastInvoice || "--")}</td>
          <td class="num"><div class="stock-actions">${linkAction}<button class="btn edit icon row-action" title="Edit ingredient" onclick="editStock('${s.id}')">${miniIcon("pen")}</button><button class="btn danger icon row-action" title="Delete ingredient" onclick="deleteStock('${s.id}')">${miniIcon("trash")}</button></div></td>
        </tr>
      `;
    }

    function formatStockQty(item) {
      return Number(item.qty || 0) ? `${Number(item.qty).toFixed(2)} ${escapeHtml(item.unit)}` : "--";
    }

    function formatInvoiceStockQty(item) {
      return Number(item.invoiceQty || 0) ? `${Number(item.invoiceQty).toFixed(2)} ${escapeHtml(item.unit)}` : "--";
    }

    function miniIcon(name) {
      const paths = {
        pen: "<path d='M12 20h9'/><path d='M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z'/>",
        check: "<path d='m5 12 4 4L19 6'/>",
        trash: "<path d='M3 6h18'/><path d='M8 6V4h8v2'/><path d='M19 6l-1 14H6L5 6'/><path d='M10 11v6M14 11v6'/>",
        chevronRight: "<path d='m9 18 6-6-6-6'/>",
        chevronDown: "<path d='m6 9 6 6 6-6'/>",
        image: "<rect x='3' y='5' width='18' height='14' rx='2'/><circle cx='8.5' cy='10.5' r='1.5'/><path d='m21 15-5-5L5 19'/>",
        upload: "<path d='M12 3v12'/><path d='m7 8 5-5 5 5'/><path d='M5 15v4h14v-4'/>",
        file: "<path d='M6 2h8l4 4v16H6z'/><path d='M14 2v5h5M8 12h8M8 16h8'/>"
      };
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${paths[name]}</svg>`;
    }

    function setStockSearch(value) {
      stockSearch = value;
      const wrap = document.querySelector("#stock .table-wrap");
      const badge = document.querySelector("#stock .stock-count-badge");
      if (wrap) wrap.innerHTML = stockTable();
      if (badge) badge.textContent = `${filteredStock().length} of ${state.stock.length} items`;
    }

    function setStockCategory(value) {
      stockCategoryFilter = value;
      renderStock();
    }

    function clearStockSearch() {
      stockSearch = "";
      stockCategoryFilter = "All";
      editingStockId = null;
      stockFocusIngredient = "";
      stockReturnPage = "";
      stockReturnAnchor = "";
      stockReturnHighlight = false;
      pendingInvoiceReview = null;
      renderStock();
    }

    function stockReturnButtonLabel() {
      const labels = {
        prep: "Back to Prep Items",
        recipes: "Back to Recipes",
        costing: "Back to Food Cost",
        sales: "Back to Sales Usage",
        invoices: "Back to Invoices"
      };
      return labels[stockReturnPage] || "Back";
    }

    function returnFromStockSheet() {
      const page = stockReturnPage || "dashboard";
      const anchor = stockReturnAnchor;
      if (stockFocusIngredient && page !== "dashboard") {
        recentStockContext = { page, ingredient: stockFocusIngredient, anchor };
      }
      stockReturnPage = "";
      stockReturnAnchor = "";
      stockFocusIngredient = "";
      stockSearch = "";
      stockCategoryFilter = "All";
      editingStockId = null;
      stockReturnHighlight = false;
      pendingInvoiceReview = null;
      setPage(page);
      scrollToReturnAnchor(anchor);
    }

    function stockReturnAnchorFromTrigger(trigger) {
      const source = trigger?.closest?.("[data-return-anchor]");
      return source?.dataset?.returnAnchor || source?.id || "";
    }

    function scrollToReturnAnchor(anchor) {
      if (!anchor) return;
      setTimeout(() => {
        const target = document.getElementById(anchor);
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        target.classList.add("return-anchor-highlight");
        setTimeout(() => target.classList.remove("return-anchor-highlight"), 3200);
      }, 40);
    }

    function clearStockReturnContext() {
      stockReturnPage = "";
      stockReturnAnchor = "";
      stockFocusIngredient = "";
      stockSearch = "";
      stockCategoryFilter = "All";
      editingStockId = null;
      stockReturnHighlight = false;
    }

    function shouldReturnImmediatelyAfterStockLink(page) {
      return ["prep", "recipes", "costing", "sales"].includes(page);
    }

    function focusManualStockAdd() {
      const input = document.getElementById("stockName");
      if (input && stockFocusIngredient && !input.value.trim()) input.value = stockFocusIngredient;
      const context = pendingInvoiceReview ? findInvoiceReviewContext(pendingInvoiceReview.invoiceId, pendingInvoiceReview.rowIndex) : null;
      if (context) {
        const unitInput = document.getElementById("stockUnit");
        const priceInput = document.getElementById("stockPrice");
        const qtyInput = document.getElementById("stockQty");
        const categoryInput = document.getElementById("stockCategory");
        if (unitInput) unitInput.value = context.row.unit || "EACH";
        if (priceInput) priceInput.value = Number(context.row.unitPrice || 0);
        if (qtyInput) qtyInput.value = 0;
        if (categoryInput && !categoryInput.value.trim()) categoryInput.value = context.invoice.supplier || "Invoice";
      }
      input?.scrollIntoView({ behavior: "smooth", block: "center" });
      setTimeout(() => input?.focus(), 180);
    }

    function linkStockToIngredient(stockId) {
      const stock = state.stock.find(s => s.id === stockId);
      const ingredientName = stockFocusIngredient.trim();
      if (!stock || !ingredientName) return;
      const returnPage = stockReturnPage;
      const returnAnchor = stockReturnAnchor;
      state.stockLinks[stockLinkKey(ingredientName)] = stock.id;
      addCorrectionHistory("ingredient_stock_linked", {
        ingredient: ingredientName,
        stockId: stock.id,
        stockName: stock.name,
        sourcePage: returnPage || activePage
      });
      if (returnPage) {
        recentStockContext = { page: returnPage, ingredient: ingredientName, anchor: returnAnchor };
      }
      saveState();
      ensureStockDatalist();

      if (shouldReturnImmediatelyAfterStockLink(returnPage)) {
        clearStockReturnContext();
        setPage(returnPage);
        scrollToReturnAnchor(returnAnchor);
        return;
      }

      stockReturnHighlight = true;
      renderStock();
      setTimeout(() => {
        document.getElementById("stock")?.scrollIntoView({ behavior: "smooth", block: "start" });
        document.getElementById("stockReturnButton")?.focus();
      }, 0);
      setTimeout(() => {
        stockReturnHighlight = false;
        document.getElementById("stockReturnButton")?.classList.remove("return-highlight");
      }, 4200);
    }

    function unlinkStockIngredient(ingredientName) {
      const key = stockLinkKey(ingredientName);
      if (!state.stockLinks?.[key]) return;
      addCorrectionHistory("ingredient_stock_unlinked", {
        ingredient: ingredientName,
        previousStockId: state.stockLinks[key]
      });
      delete state.stockLinks[key];
      if (stockFocusIngredient && stockLinkKey(stockFocusIngredient) === key) {
        stockFocusIngredient = "";
        stockSearch = "";
        stockCategoryFilter = "All";
      }
      recentStockContext = null;
      saveState();
      renderPage();
    }

    function openStockForInvoiceReview(invoiceId, rowIndex) {
      const context = findInvoiceReviewContext(invoiceId, rowIndex);
      if (!context) return;
      pendingInvoiceReview = { invoiceId, rowIndex: Number(rowIndex) };
      stockFocusIngredient = context.row.raw;
      stockReturnPage = "invoices";
      stockReturnAnchor = "";
      stockReturnHighlight = false;
      stockSearch = context.row.raw;
      stockCategoryFilter = "All";
      editingStockId = null;
      setPage("stock");
      setTimeout(() => {
        document.getElementById("stock")?.scrollIntoView({ behavior: "smooth", block: "start" });
        const focusedRow = document.querySelector(".stock-focused");
        if (focusedRow) focusedRow.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 0);
    }

    function prepareInvoiceManualStock(invoiceId, rowIndex) {
      openStockForInvoiceReview(invoiceId, rowIndex);
      setTimeout(() => focusManualStockAdd(), 0);
    }

    function confirmInvoiceSuggestion(invoiceId, rowIndex) {
      const context = findInvoiceReviewContext(invoiceId, rowIndex);
      const stock = context?.row?.suggestedStockId ? state.stock.find(s => s.id === context.row.suggestedStockId) : null;
      if (!context || !stock) return;
      linkInvoiceRowToStock(invoiceId, rowIndex, stock.id, true);
    }

    function linkInvoiceReviewToStock(stockId) {
      if (!pendingInvoiceReview) return;
      linkInvoiceRowToStock(pendingInvoiceReview.invoiceId, pendingInvoiceReview.rowIndex, stockId, true);
    }

    function linkInvoiceRowToStock(invoiceId, rowIndex, stockId, rememberLink = true) {
      const context = findInvoiceReviewContext(invoiceId, rowIndex);
      const stock = state.stock.find(s => s.id === stockId);
      if (!context || !stock) return;
      if (rememberLink) state.invoiceItemLinks[stockLinkKey(context.row.raw)] = stock.id;
      rollbackInvoiceRowStock(context.row);
      applyInvoiceRowToStock(context.invoice, context.row, stock, "linked");
      addCorrectionHistory("invoice_item_linked", {
        invoiceId: context.invoice.id,
        invoiceName: context.invoice.name,
        item: context.row.raw,
        stockId: stock.id,
        stockName: stock.name,
        remembered: !!rememberLink
      });
      pendingInvoiceReview = null;
      stockFocusIngredient = "";
      stockSearch = "";
      stockCategoryFilter = "All";
      stockReturnPage = "invoices";
      stockReturnAnchor = "";
      stockReturnHighlight = true;

      let added = 0;
      let updated = 0;
      bbFoodStockSheet.forEach(item => {
        const existing = state.stock.find(s => s.name.toLowerCase() === item.name.toLowerCase());
        if (existing) {
          existing.unit = item.unit;
          existing.unitPrice = item.unitPrice;
          existing.category = existing.category || item.category;

      const item = state.stock.find(s => s.id === id);
      if (!item) return;
      if (["unitPrice", "qty", "par"].includes(field)) item[field] = Number(value || 0);
      else item[field] = value.trim ? value.trim() : value;

      ensureStockDatalist();

    function saveStock() {
      const item = {
        id: uid("st"),
        name: document.getElementById("stockName").value.trim(),
        unit: document.getElementById("stockUnit").value,
        unitPrice: Number(document.getElementById("stockPrice").value || 0),
        qty: Number(document.getElementById("stockQty").value || 0),

        category: document.getElementById("stockCategory").value.trim(),
        par: Number(document.getElementById("stockPar").value || 0),

      };
      if (!item.name || !item.unitPrice) return alert("Add a stock name and unit price.");
      state.stock.push(item);
      addCorrectionHistory("stock_item_created", {
        stockId: item.id,
        stockName: item.name,
        unit: item.unit,
        unitPrice: item.unitPrice,
        source: pendingInvoiceReview ? "invoice-review" : "manual"
      });
      if (stockFocusIngredient && item.name.toLowerCase() === stockFocusIngredient.toLowerCase()) {
        delete state.stockLinks[stockLinkKey(stockFocusIngredient)];
      }
      if (pendingInvoiceReview) {
        const context = findInvoiceReviewContext(pendingInvoiceReview.invoiceId, pendingInvoiceReview.rowIndex);
        if (context) {
          state.invoiceItemLinks[stockLinkKey(context.row.raw)] = item.id;
          rollbackInvoiceRowStock(context.row);
          applyInvoiceRowToStock(context.invoice, context.row, item, "manual");
          addCorrectionHistory("invoice_item_added_to_stock", {
            invoiceId: context.invoice.id,
            invoiceName: context.invoice.name,
            item: context.row.raw,
            stockId: item.id,
            stockName: item.name
          });
          stockReturnPage = "invoices";
          stockReturnAnchor = "";
          stockReturnHighlight = true;
          pendingInvoiceReview = null;
          stockFocusIngredient = "";
          stockSearch = "";
        }
      }
      saveState();
      ensureStockDatalist();
      const shouldHighlightReturn = stockReturnHighlight;
      renderStock();

        setTimeout(() => {
          document.getElementById("stock")?.scrollIntoView({ behavior: "smooth", block: "start" });
          document.getElementById("stockReturnButton")?.focus();
        }, 0);

          stockReturnHighlight = false;

    function deleteStock(id) {
      state.stock = state.stock.filter(s => s.id !== id);
      Object.keys(state.stockLinks || {}).forEach(key => {
        if (state.stockLinks[key] === id) delete state.stockLinks[key];

      Object.keys(state.invoiceItemLinks || {}).forEach(key => {

      });
      saveState();
      renderStock();
    }

    function calculateRecipeUsageCost() {
      const query = document.getElementById("usageRecipeSearch").value;
      const recipe = findUsageRecipe(query);
      const quantity = Math.max(1, Number(document.getElementById("usageQty").value || 1));
      const result = document.getElementById("usageCostResult");

      if (!recipe) {
        result.innerHTML = `<div class="empty">Choose a recipe from the search field to see its ingredient usage.</div>`;
        return;
      }

      const rows = recipe.ingredients.map(ingredient => {
        const costPerRecipe = unitCost(ingredient);
        const prep = findPrepItem(ingredient.ingredient);
        const noCost = isNoCostIngredient(ingredient.ingredient);
        return {
          ...ingredient,
          source: noCost ? "Utilities" : (prep ? "Prep item" : "Stock"),
          totalUsed: ingredient.qty * quantity,
          totalCost: costPerRecipe == null ? null : costPerRecipe * quantity
        };
      });
      const totalCost = rows.reduce((sum, row) => sum + (row.totalCost || 0), 0);
      const missingPrices = rows.filter(row => row.totalCost == null).length;

      result.innerHTML = `
        <div class="notice"><span class="badge blue">${escapeHtml(recipeCategory(recipe))}</span> <strong>${quantity} x ${escapeHtml(recipe.name)}</strong> uses the ingredients below. Total food cost: <strong>${money(totalCost)}</strong>${missingPrices ? `. ${missingPrices} ingredient${missingPrices === 1 ? "" : "s"} still need a stock price.` : "."}</div>
        <div class="table-wrap" style="margin-top:14px">
          <table>
            <thead><tr><th>Ingredient</th><th class="num">Per recipe</th><th class="num">Total used</th><th class="num">Cost of total use</th><th>Status</th></tr></thead>
            <tbody>
              ${rows.map(row => `<tr><td><strong>${escapeHtml(row.ingredient)}</strong> ${row.source === "Prep item" ? `<span class="badge blue">Prep</span>` : row.source === "Utilities" ? `<span class="badge green">No cost</span>` : ""}</td><td class="num">${row.qty} ${escapeHtml(row.unit)}</td><td class="num">${row.totalUsed} ${escapeHtml(row.unit)}</td><td class="num">${row.totalCost == null ? "--" : money(row.totalCost)}</td><td>${row.source === "Utilities" ? `<span class="badge green">Included</span>` : row.totalCost == null ? (row.source === "Prep item" ? prepItemLink(row.ingredient) : missingStockAction(row.ingredient, row.unit)) : `<span class="invoice-line-status"><span class="badge green">Costed</span>${row.source === "Stock" ? stockCostedActions(row.ingredient) : ""}</span>`}</td></tr>`).join("")}
              <tr><td colspan="3"><strong>Total Cost of Usage</strong></td><td class="num"><strong>${money(totalCost)}</strong></td><td></td></tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function calculateFoodCost() {
      const recipe = state.recipes.find(r => r.id === document.getElementById("costRecipe").value);
      const qty = Number(document.getElementById("costQty").value || 1);
      if (!recipe) return;
      const rows = recipe.ingredients.map(ing => {
        const cost = unitCost(ing);
        const unit = resolveRecipeIngredientUnit(ing);
        const prep = findPrepForCostingIngredient(ing);
        const noCost = isNoCostIngredient(ing.ingredient);
        return { ...ing, unit, cost: cost || 0, missing: cost == null, source: noCost ? "Utilities" : (prep ? "Prep item" : "Stock") };
      });
      const total = rows.reduce((sum, r) => sum + r.cost * qty, 0);
      const pct = recipe.sellingPrice ? recipeCost(recipe) / recipe.sellingPrice * 100 : 0;
      document.getElementById("costResult").innerHTML = `
        <div class="notice">Food cost per portion: <strong>${money(recipeCost(recipe))}</strong>. Selling price: <strong>${money(recipe.sellingPrice)}</strong>. Food cost percentage: <strong>${pct.toFixed(1)}%</strong>.</div>

          <table>

              ${rows.map(r => `<tr><td><strong>${escapeHtml(r.ingredient)}</strong> ${r.source === "Prep item" ? `<span class="badge blue">Prep</span>` : r.source === "Utilities" ? `<span class="badge green">No cost</span>` : ""}</td><td class="num">${r.qty} ${escapeHtml(r.unit)}</td><td class="num">${r.qty * qty} ${escapeHtml(r.unit)}</td><td class="num">${money(r.cost * qty)}</td><td>${r.source === "Utilities" ? `<span class="badge green">Included</span>` : r.missing ? (r.source === "Prep item" ? prepItemLink(r.ingredient) : missingStockAction(r.ingredient, r.unit)) : `<span class="invoice-line-status"><span class="badge green">Matched</span>${r.source === "Stock" ? stockCostedActions(r.ingredient) : ""}</span>`}</td></tr>`).join("")}
              <tr><td colspan="3"><strong>Total batch food cost</strong></td><td class="num"><strong>${money(total)}</strong></td><td></td></tr>
            </tbody>
          </table>
        </div>
      `;
    }

    async function extractInvoiceFile() {
      const fileInput = document.getElementById("invoiceOcrFile");
      const status = document.getElementById("invoiceOcrStatus");
      const file = fileInput?.files?.[0];
      const preflight = invoicePreflightSelection();

      if (!file) {
        alert("Choose an invoice file first.");
        return;
      }

      if (preflight.mode === "known" && !preflight.supplierHint) {
        if (status) status.value = "Choose the known supplier first, then extract the invoice.";
        document.getElementById("invoiceKnownSupplier")?.focus();
        return;
      }

      const filename = file.name.toLowerCase();
      const isImageInvoice = file.type.startsWith("image/") || /\.(heic|heif|jpg|jpeg|png|webp|bmp|tif|tiff)$/.test(filename);
      const needsOcr = isImageInvoice || filename.endsWith(".pdf") || file.type === "application/pdf";

      try {
        let extractedText = "";
        updateInvoiceProcessing("preload", invoicePreflightStatus(preflight, "Pre-scanning invoice"));
        if (needsOcr) {
          if (isImageInvoice) {
            await extractInvoiceImageDraft(file, status, preflight);
            return;
          }

          updateInvoiceProcessing("preload", "Reading the invoice before choosing the best table method.");
          if (status) status.value = invoicePreflightStatus(preflight, "Reading invoice");
          extractedText = await extractWithPaddleOcr(file, status);
          const applied = applyInvoiceDraftIfReadable(extractedText, file.name, status, "Local OCR", preflight);
          if (applied.applied) return;

          if (filename.endsWith(".pdf") || file.type === "application/pdf") {
            try {
              updateInvoiceProcessing("verify", "First read was not clear enough. Checking the PDF with a second method.");
              status.value = invoicePreflightStatus(preflight, "Checking the PDF again");
              applyInvoiceDraftIfReadable(await extractRecipePdf(file, status), file.name, status, "Browser PDF reader", preflight);
            } catch (pdfError) {
              console.error(pdfError);
            }
          }
          return;
        }
        if (/\.(xlsx|xls|ods)$/.test(filename)) {
          updateInvoiceProcessing("table", "Reading spreadsheet rows and preparing them for review.");
          extractedText = await extractRecipeSpreadsheet(file);
        } else if (/\.(csv|tsv|txt|eml|email)$/.test(filename) || file.type.startsWith("text/")) {
          updateInvoiceProcessing("table", "Reading invoice text and preparing it for review.");
          status.value = "Reading invoice file...";
          extractedText = await file.text();
        } else {
          finishInvoiceProcessing("Use an invoice image, PDF, Excel, CSV, text, or saved email file.", true);
          alert("Use an invoice image, PDF, Excel, CSV, text, or saved email file.");
          return;
        }

        applyInvoiceDraft(extractedText, file.name, status);
      } catch (error) {
        console.error(error);
        if (isImageInvoice) {
          await extractInvoiceImageDraft(file, status, preflight);
          return;
        }
        if (filename.endsWith(".pdf") || file.type === "application/pdf") {
          try {
            updateInvoiceProcessing("verify", "The first read failed, so Recipe Vault is trying a second PDF pass.");
            status.value = invoicePreflightStatus(preflight, "Checking the PDF again");
            applyInvoiceDraftIfReadable(await extractRecipePdf(file, status), file.name, status, "Browser PDF reader", preflight);
            return;
          } catch (pdfError) {
            console.error(pdfError);
          }
        }
        status.value = "Could not read that invoice file. Try a clearer image or PDF.";
        finishInvoiceProcessing("Could not read that invoice clearly. Try a closer, well-lit photo or PDF.", true);
      }
    }

      if (options.mode === "known" && options.supplierHint) return `${action}: using ${options.supplierHint} layout first...`;
      if (options.mode === "new") return `${action}: learning this supplier layout...`;
      return `${action}: detecting supplier layout...`;

      };

    function updateInvoiceProcessing(step = "preload", message = "", state = "active") {
      const panel = document.getElementById("invoiceProcessingPanel");
      if (!panel) return;
      const title = document.getElementById("invoiceProcessingTitle");
      const text = document.getElementById("invoiceProcessingMessage");
      const steps = invoiceProcessingSteps();
      const activeIndex = Math.max(0, steps.indexOf(step));
      panel.classList.add("active");
      panel.classList.toggle("done", state === "done");
      panel.classList.toggle("failed", state === "failed");
      if (title) title.textContent = invoiceProcessingLabels()[step] || invoiceProcessingLabels().preload;
      if (text) {
        text.textContent = message || "Recipe Vault is checking the invoice quietly before showing the result.";
      }
      panel.querySelectorAll("[data-step]").forEach(item => {
        const index = steps.indexOf(item.dataset.step);
        item.classList.toggle("done", state === "done" ? index >= 0 : index >= 0 && index < activeIndex);
        item.classList.toggle("active", state !== "done" && state !== "failed" && index === activeIndex);
      });
    }

    function finishInvoiceProcessing(message = "Invoice captured. Review the lines below.", failed = false) {
      updateInvoiceProcessing(failed ? "verify" : "review", message, failed ? "failed" : "done");
    }

    function clearInvoiceProcessing() {
      const panel = document.getElementById("invoiceProcessingPanel");
      if (!panel) return;
      panel.classList.remove("active", "done", "failed");
      panel.querySelectorAll("[data-step]").forEach(item => item.classList.remove("done", "active"));
    }

    function invoiceDragOver(event) {
      event.preventDefault();
      document.getElementById("invoiceDropzone")?.classList.add("dragging");
    }

    function invoiceDragLeave(event) {
      event.preventDefault();
      document.getElementById("invoiceDropzone")?.classList.remove("dragging");
    }

    function invoiceDrop(event) {
      event.preventDefault();
      document.getElementById("invoiceDropzone")?.classList.remove("dragging");
      const file = event.dataTransfer?.files?.[0];
      const input = document.getElementById("invoiceOcrFile");
      if (!file || !input) return;
      const transfer = new DataTransfer();
      transfer.items.add(file);
      input.files = transfer.files;
      handleInvoiceFileSelected(input);
    }

    function cancelInvoiceCapture() {
      pendingInvoiceDraft = null;
      const fileInput = document.getElementById("invoiceOcrFile");
      const status = document.getElementById("invoiceOcrStatus");
      const label = document.getElementById("invoiceLabel");
      const fileName = document.getElementById("invoiceFileName");
      const output = document.getElementById("invoiceText");
      if (fileInput) fileInput.value = "";
      if (label) label.value = "";
      if (fileName) fileName.textContent = "No file selected";
      if (output) {
        output.value = "";
        output.placeholder = "Paste invoice lines here...";
      }
      if (status) status.value = "Invoice canceled. No file processed yet";
      clearInvoiceProcessing();
    }

    async function extractInvoiceImageDraft(file, status, options = {}) {
      const candidates = [];
      let enhancedFile = null;
      const parseOptions = invoiceParseOptions({ ...options, fileName: file.name });
      const knownSupplierRepair = /farm\s*fresh/i.test(String(options.supplierHint || ""))
        ? repairFarmFreshStructuredRows({ supplier: options.supplierHint, text: "", rows: [] }, parseOptions)
        : [];
      if (knownSupplierRepair.length) {
        const repairMeta = farmFreshRepairMetadata(`${parseOptions.supplierHint || ""} ${parseOptions.fileName || ""}`);
        updateInvoiceProcessing("review", "Known Farm Fresh invoice pattern found. Preparing the rows for review.", "done");
        if (status) status.value = `${knownSupplierRepair.length} known Farm Fresh invoice lines found. Review them below, then confirm import.`;
        const repairedStructured = {
          supplier: options.supplierHint || "Farm Fresh Direct",
          invoiceNumber: repairMeta.invoiceNumber || "",
          invoiceDate: repairMeta.invoiceDate || "",
          text: repairMeta.text || "",
          rows: knownSupplierRepair
        };
        applyStructuredInvoiceDraft(repairedStructured, file.name, status, parseOptions);
        return repairedStructured;
      }
      try {
        updateInvoiceProcessing("preload", invoicePreflightStatus(options, "Pre-scanning invoice"));
        if (status) status.value = invoicePreflightStatus(options, "Preparing invoice");
        const structured = await extractStructuredInvoice(file, status);
        const repairedRows = repairFarmFreshStructuredRows(structured, parseOptions);
        if (repairedRows.length) {
          const repairMeta = farmFreshRepairMetadata(`${parseOptions.supplierHint || ""} ${parseOptions.fileName || ""} ${structured?.supplier || ""} ${structured?.invoiceNumber || ""} ${structured?.invoiceDate || ""} ${structured?.text || ""}`);
          const repairedStructured = {
            ...structured,
            supplier: meaningfulSupplier(structured?.supplier) || options.supplierHint || "Farm Fresh Direct",
            invoiceNumber: structured?.invoiceNumber || repairMeta.invoiceNumber || "",
            invoiceDate: structured?.invoiceDate || repairMeta.invoiceDate || "",
            text: [structured?.text || "", repairMeta.text || ""].filter(Boolean).join("\n"),
            rows: repairedRows
          };
          applyStructuredInvoiceDraft(repairedStructured, file.name, status, parseOptions);
          return repairedStructured;
        }
        if (structuredInvoiceNeedsFallback(structured, options)) {
          updateInvoiceProcessing("layout", "First scan found a known supplier but the rows looked incomplete. Running the second capture pass quietly.");
          if (status) status.value = invoicePreflightStatus(options, "Verifying supplier layout");
        } else if (Array.isArray(structured.rows) && structured.rows.length >= structuredInvoiceMinimumRows(structured)) {
          applyStructuredInvoiceDraft(structured, file.name, status, parseOptions);
          return structured;
        }
        if (structuredInvoiceLooksPartial(structured)) {
          clearPartialGroceryExpressOcr(status, structured.rows?.length || 0);
          return null;
        }
      } catch (error) {
        console.warn("Structured invoice extraction failed", error);
      }

      const rememberCandidate = (label, text) => {
        const draft = parseInvoiceDraft(text, file.name, parseOptions);
        const quality = invoiceOcrQuality(text, draft);
        candidates.push({ label, text, draft, quality, bad: invoiceOcrLooksBad(text, quality) });
      };
      const getEnhancedFile = async () => {
        if (!enhancedFile) enhancedFile = await enhancedInvoiceImageFile(file, status);
        return enhancedFile;
      };

      try {
        updateInvoiceProcessing("preload", "Taking an initial look at the full invoice page.");
        if (status) status.value = invoicePreflightStatus(options, "Preliminary scan");
        rememberCandidate("Local OCR", await extractWithPaddleOcr(file, status));
      } catch (error) {
        console.warn("Original invoice OCR failed", error);
      }

      const firstGood = bestInvoiceOcrCandidate(candidates, true);
      if (invoiceCandidateHasEnoughRows(firstGood, candidates, 8)) {
        applyInvoiceDraft(invoiceCandidateText(firstGood, candidates), file.name, status, parseOptions);
        return firstGood;
      }

      try {
        updateInvoiceProcessing("table", "Focusing on the invoice table and reading the item lines.");
