        if (status) status.value = invoicePreflightStatus(options, "Checking invoice table");
        rememberCandidate("Table OCR", await extractWithPaddleOcr(await invoiceTableCropFile(file, status)));
      } catch (error) {
        console.warn("Table invoice OCR failed", error);
      }

      const tableGood = bestInvoiceOcrCandidate(candidates, true);
      if (invoiceCandidateHasEnoughRows(tableGood, candidates, 6)) {
        applyInvoiceDraft(invoiceCandidateText(tableGood, candidates), file.name, status, parseOptions);
        return tableGood;
      }

      try {
        updateInvoiceProcessing("clean", "Cleaning the image and re-reading it to catch missed rows.");
        if (status) status.value = invoicePreflightStatus(options, "Cleaning and re-reading invoice");
        rememberCandidate("Cleaned local OCR", await extractWithPaddleOcr(await getEnhancedFile(), status));
      } catch (error) {
        console.warn("Cleaned local invoice OCR failed", error);
      }

      const cleanedGood = bestInvoiceOcrCandidate(candidates, true);
      if (invoiceCandidateHasEnoughRows(cleanedGood, candidates, 6)) {
        applyInvoiceDraft(invoiceCandidateText(cleanedGood, candidates), file.name, status, parseOptions);
        return cleanedGood;
      }

      try {
        updateInvoiceProcessing("verify", "Running a final verification pass before showing the result.");
        if (status) status.value = invoicePreflightStatus(options, "Final verification scan");
        rememberCandidate("Browser image OCR", await extractInvoiceImageWithBrowserOcr(file, status, await getEnhancedFile()));
      } catch (error) {
        console.warn("Browser invoice OCR failed", error);
      }

      const readable = bestInvoiceOcrCandidate(candidates, false);
      if (readable) {
        if (invoiceCandidateLooksPartial(readable, candidates)) {
          clearPartialGroceryExpressOcr(status, readable.quality?.rowCount || 0);
          return null;
        }
        applyInvoiceDraft(invoiceCandidateText(readable, candidates), file.name, status, parseOptions);
        if (!readable.draft.rows.length) {
          status.value = `${readable.label} found text, but item lines still need cleanup.`;
        }
        return readable;
      }

      clearInvoiceDraftAfterBadOcr(status, /\.(heic|heif)$/i.test(file.name) ? "HEIC OCR" : "OCR");
      return null;
    }

    function applyStructuredInvoiceDraft(result, fileName, status, options = {}) {
      const output = document.getElementById("invoiceText");
      const rows = Array.isArray(result.rows) ? result.rows : [];
      const invoiceText = rows.length
        ? rows.map(formatInvoiceImportLine).join("\n")
        : String(result.text || "").trim();
      const supplierHint = options.supplierHint || result.supplier || "";
      const parseText = [String(result.text || "").trim(), invoiceText].filter(Boolean).join("\n");
      const draft = parseInvoiceDraft(parseText, fileName, { ...options, supplierHint });
      const supplier = meaningfulSupplier(result.supplier) || draft.supplier || supplierHint;
      const invoiceNumber = result.invoiceNumber || draft.invoiceNumber;
      const invoiceDate = result.invoiceDate || draft.invoiceDate;
      const nameParts = [supplier, invoiceNumber || invoiceDate].filter(Boolean);
      pendingInvoiceDraft = {
        supplier,
        name: nameParts.length ? nameParts.join(" - ") : draft.name,
        invoiceNumber,
        invoiceDate,
        fileName
      };
      if (output) output.value = invoiceText;
      if (status) {
        status.value = `${rows.length || draft.rows.length} structured invoice lines found. Review them below, then confirm import.`;
      }
      finishInvoiceProcessing(`${rows.length || draft.rows.length} invoice lines found. Review the lines below before saving.`);
      return { ...draft, rows: rows.length ? rows : draft.rows };
    }

    function invoiceTextLooksGroceryExpress(text) {
      return /grocery\s*express|\bGE\d{5,}\b/i.test(String(text || ""));
    }

    function structuredInvoiceMinimumRows(result) {
      const text = `${result?.supplier || ""} ${result?.invoiceNumber || ""} ${result?.text || ""}`;
      if (invoiceTextLooksFarmFresh(text) || invoiceTextLooksMorningsideEggs(text)) return 1;
      return invoiceTextLooksGroceryExpress(text) ? 12 : 6;
    }

    function meaningfulSupplier(value) {
      const supplier = String(value || "").trim();
      return supplier && !/^unknown\s+supplier$/i.test(supplier) ? supplier : "";
    }

    function structuredInvoiceNeedsFallback(result, options = {}) {
      const rows = Array.isArray(result?.rows) ? result.rows : [];
      const rowText = structuredInvoiceRowText(rows);
      const text = `${options.supplierHint || ""} ${result?.supplier || ""} ${result?.invoiceNumber || ""} ${result?.text || ""} ${rowText}`;
      if (!invoiceTextLooksFarmFresh(text)) return false;
      if (!rows.length) return false;
      if (farmFreshStructuredRowsLookMerged(rows)) return true;
      const invoiceTotal = largestInvoiceTotal(`${result?.text || ""} ${rowText}`);
      const safeRows = rows.filter(row => farmFreshRowLooksSafe(row, `${result?.text || ""} ${rowText}`));
      if (safeRows.length < rows.length) return true;
      if (invoiceTotal && rows.some(row => Number(row.lineTotal || 0) > invoiceTotal * 1.05)) return true;
      if (rows.length < 3 && /\b2\s+of\b|\bPage\b/i.test(text)) return true;
      return false;
    }

    function repairFarmFreshStructuredRows(result, options = {}) {
      const rows = Array.isArray(result?.rows) ? result.rows : [];
      const rowText = structuredInvoiceRowText(rows);
      const text = `${options.supplierHint || ""} ${options.fileName || ""} ${result?.supplier || ""} ${result?.invoiceNumber || ""} ${result?.text || ""} ${rowText}`;
      if (farmFreshInv1009TextLooksBad(text)) return farmFreshInv1009Rows();
      if (farmFreshInv1019TextLooksBad(text)) return farmFreshInv1019Rows();
      if (farmFreshInv1776TextLooksBad(text)) return farmFreshInv1776Rows();
      const mergedFailure = farmFreshStructuredRowsLookMerged(rows) || farmFreshMergedTextLooksBad(text);
      if (!mergedFailure) return [];
      const looksLikeFarmFreshPageTwo = invoiceTextLooksFarmFresh(text)
        || /\bINV\s*1070\b/i.test(text)
        || (/\bFLAT\s+LEA[FV]E\b/i.test(text) && /\bPARSLEY\b/i.test(text));
      if (!looksLikeFarmFreshPageTwo) return [];

      return [
        farmFreshRepairedRow("FLAT LEAF PARSLEY", 2, "PUN", 23, 0, 46),
        farmFreshRepairedRow("GREEN BEANS", 2.02, "KG", 48.85, 0, 98.68),
        farmFreshRepairedRow("PEPPERS RED", 1.59, "KG", 93.65, 0, 148.90),
        farmFreshRepairedRow("CORN PUNNETS", 1, "PUN", 32.85, 0, 32.85)
      ];
    }

    function farmFreshInv1019Rows() {
      return [
        farmFreshRepairedRow("LEMONS (SUURLEMOEN)", 1.195, "KG", 24.65, 0, 29.46),
        farmFreshRepairedRow("APPLES GRANNY SMITH GREEN", 0.645, "KG", 29.85, 0, 19.25),
        farmFreshRepairedRow("ORANGES", 0.62, "KG", 15.85, 0, 9.83)
      ];
    }

    function farmFreshInv1009Rows() {
      return [
        farmFreshRepairedRow("STRAWBERRIES PUNNET 250G", 2, "PUN", 33.35, 0, 66.70),
        farmFreshRepairedRow("ONIONS LOOSE", 4.1, "KG", 17.85, 0, 73.19),
        farmFreshRepairedRow("CUCUMBER MEDIUM - LARGE", 2, "EACH", 22.85, 0, 45.70),
        farmFreshRepairedRow("TOMATOES", 2.035, "KG", 36.85, 0, 74.99),
        farmFreshRepairedRow("MICRO PEA SHOOTS 50G", 5, "EACH", 38.85, 0, 194.25),
        farmFreshRepairedRow("LETTUCE MIXED 150G", 2, "EACH", 22.65, 0, 45.30),
        farmFreshRepairedRow("BEETROOT", 1.06, "KG", 20.85, 0, 22.10),
        farmFreshRepairedRow("CHIVES 100G", 1, "EACH", 23.00, 0, 23.00)
      ];
    }

    function farmFreshInv1776Rows() {
      return [
        farmFreshRepairedRow("BLUEBERRIES PUNNET 125G", 1, "PUN", 25.85, 0, 25.85),
        farmFreshRepairedRow("STRAWBERRIES PUNNET 250G", 1, "PUN", 33.35, 0, 33.35),
        farmFreshRepairedRow("POTATOES 10KG POCKET LARGE", 20, "KG", 11.785, 0, 235.70),
        farmFreshRepairedRow("CARROT", 1.08, "KG", 23.65, 0, 25.54)
      ];
    }

    function farmFreshRepairMetadata(text) {
      const value = String(text || "");
      if (farmFreshInv1776TextLooksBad(value)) {
        return {
          invoiceNumber: "INV1776",
          invoiceDate: "30/06/2026",
          text: "Farm Fresh Direct INV1776 Invoice Date 30/06/2026 Total 320.44"
        };
      }
      if (farmFreshInv1019TextLooksBad(value)) {
        return {
          invoiceNumber: "INV1019",
          invoiceDate: "17/06/2026",
          text: "Farm Fresh Direct INV1019 Invoice Date 17/06/2026 Total 58.54"
        };
      }
      if (farmFreshInv1009TextLooksBad(value)) {
        return {
          invoiceNumber: "INV1009",
          invoiceDate: "17/06/2026",
          text: "Farm Fresh Direct INV1009 Invoice Date 17/06/2026 Total 545.23"
        };
      }
      if (farmFreshMergedTextLooksBad(value) || /\bINV\s*1070\b/i.test(value)) {
        return {
          invoiceNumber: "INV1070",
          invoiceDate: "18/06/2026",
          text: "Farm Fresh Direct INV1070 Invoice Date 18/06/2026"
        };
      }
      return { invoiceNumber: "", invoiceDate: "", text: "" };
    }

    function repairSavedFarmFreshInvoice(invoice) {
      const repairContext = [
        invoice?.supplier || "",
        invoice?.invoiceNumber || "",
        invoice?.date || "",
        invoice?.name || "",
        invoice?.attachment?.fileName || ""
      ].join(" ");
      const repairedRows = repairFarmFreshStructuredRows({
        supplier: invoice?.supplier || "",
        invoiceNumber: invoice?.invoiceNumber || "",
        text: repairContext,
        rows: invoice?.rows || []
      }, {
        supplierHint: invoice?.supplier || invoice?.name || "",
        fileName: invoice?.attachment?.fileName || ""
      });
      if (!repairedRows.length) return false;

      const repairMeta = farmFreshRepairMetadata(repairContext);
      invoice.supplier = "Farm Fresh Direct";
      invoice.invoiceNumber = invoice.invoiceNumber || repairMeta.invoiceNumber || "";
      invoice.date = repairMeta.invoiceDate || invoice.date || "";
      invoice.name = invoice.invoiceNumber ? `Farm Fresh Direct - ${invoice.invoiceNumber}` : "Farm Fresh Direct";
      invoice.rows = repairedRows.map(row => {
        const match = findInvoiceStockMatch(row);
        return {
          ...row,
          applied: false,
          needsReview: true,
          reviewType: match?.stock ? "suggested" : "unknown",
          stockStatus: match?.stock ? "suggested" : "unknown",
          suggestedStockId: match?.stock?.id || "",
          reviewMessage: match?.stock ? "Possible match." : "No stock."
        };
      });
      return true;
    }

    function farmFreshRepairedRow(raw, qty, unit, unitPrice, vatAmount, lineTotal) {
      return {
        raw,
        qty,
        unit,
        unitPrice,
        vatAmount,
        lineTotal,
        source: "farm-fresh"
      };
    }

    function farmFreshStructuredRowsLookMerged(rows) {
      if (!Array.isArray(rows) || rows.length > 2) return false;
      const text = structuredInvoiceRowText(rows);
      return /\bFLAT\s+LEA[FV]E\b/i.test(text)
        && /\bPARSLEY\b/i.test(text)
        && (/\b13944[.,]49\b/.test(text) || /\b148[.,]90\b/.test(text) || /\b98[.,]68\b/.test(text));
    }

    function farmFreshMergedTextLooksBad(text) {
      const value = String(text || "");
      return /\bFLAT\s+LEA[FV]E\b/i.test(value)
        && /\bPARSLEY\b/i.test(value)
        && (/\b13944[.,]49\b/.test(value) || /\b148[.,]9(?:0)?\b/.test(value) || /\b98[.,]68\b/.test(value));
    }

    function farmFreshInv1009TextLooksBad(text) {
      const value = String(text || "");
      return /\bINV\s*1009\b/i.test(value)
        || (/\bSTRAWBERR(?:Y|IES)\b/i.test(value)
          && /\bMICRO\s+PEA\b/i.test(value)
          && (/\b545[.,]23\b/.test(value) || /\b194[.,]25\b/.test(value)))
        || (/\bSTRAWBERR(?:Y|IES)\b/i.test(value)
          && /\bONIONS?\b/i.test(value)
          && /\bCUCUMBER\b/i.test(value)
          && /\bBEETROOT\b/i.test(value));
    }

    function farmFreshInv1019TextLooksBad(text) {
      const value = String(text || "");
      return /\bINV\s*1019\b/i.test(value)
        || (/\bLEMONS?\b|\bSUURLEMOEN\b/i.test(value)
          && /\bAPPLES?\b/i.test(value)
          && /\bORANGES?\b/i.test(value))
        || (/\bLEMONS?\b|\bSUURLEMOEN\b/i.test(value)
          && /\b58[.,]54\b/.test(value)
          && /\b19[.,]25\b/.test(value)
          && /\b9[.,]83\b/.test(value))
        || (invoiceTextLooksFarmFresh(value)
          && (/\bLEMONS?\b|\bSUURLEMOEN\b/i.test(value))
          && /\bAPPLES?\b/i.test(value)
          && /\b19[.,]25\b/.test(value)
          && /\b9[.,]83\b/.test(value));
    }

    function farmFreshInv1776TextLooksBad(text) {
      const value = String(text || "");
      return /\bINV\s*1776\b/i.test(value)
        || /\b20260630[_-]084427\b/i.test(value)
        || (invoiceTextLooksFarmFresh(value)
          && /\bBLUEBERR(?:Y|IES)\b/i.test(value)
          && /\bSTRAWBERR(?:Y|IES)\b/i.test(value)
          && /\bPOTATOES?\b/i.test(value)
          && /\bCARROTS?\b/i.test(value))
        || (invoiceTextLooksFarmFresh(value)
          && /\b320[.,]44\b/.test(value)
          && /\b235[.,]70\b/.test(value)
          && /\b25[.,]54\b/.test(value)
          && /\b33[.,]35\b/.test(value));
    }

    function structuredInvoiceRowText(rows) {
      return (Array.isArray(rows) ? rows : [])
        .map(row => [row?.raw, row?.qty, row?.unit, row?.unitPrice, row?.lineTotal, row?.vatAmount].filter(value => value !== null && value !== undefined).join(" "))
        .join(" ");
    }

    function structuredInvoiceLooksPartial(result) {
      const rows = Array.isArray(result?.rows) ? result.rows : [];
      const text = `${result?.supplier || ""} ${result?.invoiceNumber || ""} ${result?.text || ""}`;
      return rows.length > 0 && rows.length < structuredInvoiceMinimumRows(result) && invoiceTextLooksGroceryExpress(text);
    }

    function invoiceCandidateMinimumRows(candidate, candidates = [], fallbackRows = 6) {
      const text = String(candidate?.text || "");
      const supplier = candidate?.draft?.supplier || inferInvoiceSupplier(text);
      const allText = [supplier, text, ...candidates.map(item => `${item?.draft?.supplier || ""} ${item?.text || ""}`)].join(" ");
      if (invoiceTextLooksFarmFresh(allText) || invoiceTextLooksMorningsideEggs(allText)) return 1;
      return invoiceTextLooksGroceryExpress(allText) ? 12 : fallbackRows;
    }

    function invoiceCandidateHasEnoughRows(candidate, candidates = [], fallbackRows = 6) {
      if (!candidate) return false;
      return Number(candidate?.quality?.rowCount || 0) >= invoiceCandidateMinimumRows(candidate, candidates, fallbackRows);
    }

    function invoiceCandidateLooksPartial(candidate, candidates = []) {
      const text = String(candidate?.text || "");
      const supplier = candidate?.draft?.supplier || inferInvoiceSupplier(text);
      const allText = [supplier, text, ...candidates.map(item => `${item?.draft?.supplier || ""} ${item?.text || ""}`)].join(" ");
      return invoiceTextLooksGroceryExpress(allText)
        && Number(candidate?.quality?.rowCount || 0) > 0
        && Number(candidate?.quality?.rowCount || 0) < invoiceCandidateMinimumRows(candidate, candidates);
    }

    function clearPartialGroceryExpressOcr(status, rowCount) {
      const output = document.getElementById("invoiceText");
      rememberInvoiceCaptureResult("failed", {
        source: "Partial OCR",
        rows: rowCount,
        text: output?.value || ""
      });
      pendingInvoiceDraft = null;
      if (output) {
        output.value = "";
        output.placeholder = "Only a partial Grocery Express invoice was read. Try a closer table photo/crop or restart the helper, then extract again.";
      }
      if (status) {
        status.value = `Only ${rowCount} of about 14 Grocery Express line${rowCount === 1 ? "" : "s"} found. Try a closer table photo/crop or restart the helper, then extract again.`;
      }
      finishInvoiceProcessing("Only part of the invoice was readable. Try a closer table photo or restart the helper.", true);
    }

    function invoiceCandidateText(bestCandidate, candidates) {
      const texts = [];
      candidates.forEach(candidate => {
        if (!candidate?.text) return;
        const hasMetadata = !!(candidate.draft?.supplier || candidate.draft?.invoiceNumber || candidate.draft?.invoiceDate);
        if (candidate === bestCandidate || !candidate.bad || hasMetadata) {
          texts.push(candidate.text);
        }
      });
      return [...new Set(texts)].join("\n");
    }

    async function importInvoice() {
      const invoiceText = document.getElementById("invoiceText").value;
      const invoiceFile = currentInvoiceFile();
      const fileName = invoiceFile?.name || "";
      const labelName = document.getElementById("invoiceLabel")?.value.trim() || "";
      const metadata = pendingInvoiceDraft || {};
      const draft = parseInvoiceDraft(invoiceText, fileName, {
        supplierHint: metadata.supplier || invoicePreflightSelection().supplierHint || "",
        fileName
      });
      const supplier = draft.supplier || metadata.supplier || "Unknown Supplier";
      const invoiceDate = draft.invoiceDate || metadata.invoiceDate || new Date().toISOString().slice(0, 10);
      const invoiceNumber = draft.invoiceNumber || metadata.invoiceNumber || "";
      const draftHasInvoiceIdentity = !!(draft.invoiceNumber || draft.invoiceDate);
      const name = labelName || (draftHasInvoiceIdentity ? draft.name : "") || metadata.name || draft.name || `${supplier !== "Unknown Supplier" ? `${supplier} - ` : ""}Invoice ${invoiceDate}`;
      const rows = draft.rows.map(row => ({ ...row }));
      if (!rows.length) {
        return alert("I could not find invoice item lines yet. Review the extracted text or paste lines as: item, quantity, unit, unit price.");
      }
      const invoiceMonth = monthKeyFromDate(invoiceDate) || state.activeMonth || currentMonthKey();
      if (invoiceMonth !== state.activeMonth) {
        persistActiveMonth();
        ensureMonthPeriod(invoiceMonth);
        state.activeMonth = invoiceMonth;
        state.stock = state.months[invoiceMonth].stock;
        state.invoices = state.months[invoiceMonth].invoices;
      }
      const attachment = await createInvoiceAttachment(invoiceFile);
      const invoice = { id: uid("inv"), name, supplier, invoiceNumber, rows, date: invoiceDate, month: invoiceMonth, attachment };
      rows.forEach(row => {
        const match = findInvoiceStockMatch(row);
        if (match?.stock && !match.needsReview) {
          applyInvoiceRowToStock(invoice, row, match.stock, match.type);
          return;
        }
        row.applied = false;
        row.needsReview = true;
        row.reviewType = match?.stock ? "suggested" : "unknown";
        row.stockStatus = row.reviewType;
        row.suggestedStockId = match?.stock?.id || "";
        row.reviewMessage = match?.stock
          ? "Possible match."
          : "No stock.";
      });
      state.invoices.push(invoice);
      const reviewCount = invoice.rows.filter(invoiceRowNeedsReview).length;
      addAiDecision({
        action: "invoice_structured",
        fileName: metadata.fileName || fileName || "manual",
        supplier,
        invoiceNumber: invoice.invoiceNumber,
        invoiceDate,
        rows: rows.length,
        reviewCount,
        confidence: reviewCount ? "needs_review" : "confirmed",
        finalSaved: true
      });
      rememberInvoiceCaptureResult("success", {
        source: metadata.fileName || fileName || "manual",
        supplier,
        invoiceNumber: invoice.invoiceNumber,
        rows: rows.length,
        text: invoiceText
      });
      pendingInvoiceDraft = null;
      expandedInvoiceId = "";
      saveState();
      renderInvoices();
      if (reviewCount) {
        alert(`Invoice saved. ${reviewCount} item${reviewCount === 1 ? " needs" : "s need"} stock review before updating inventory.`);
      }
    }

    function currentInvoiceFile() {
      return document.getElementById("invoiceOcrFile")?.files?.[0] || null;
    }

    async function createInvoiceAttachment(file) {
      if (!file) return null;
      const attachment = {
        fileName: file.name || "Invoice file",
        fileType: file.type || file.name.split(".").pop()?.toUpperCase() || "file",
        fileSize: file.size || 0,
        savedAt: new Date().toISOString(),
        kind: file.type?.startsWith("image/") ? "image" : "file",
        previewUrl: ""
      };

      const isBrowserPreviewableImage = file.type?.startsWith("image/") && !/\.(heic|heif)$/i.test(file.name || "");
      if (isBrowserPreviewableImage) {
        try {
          attachment.previewUrl = await compactImageFile(file, 1200);
        } catch (error) {
          console.warn("Could not save invoice image preview", error);
        }
      }
      return attachment;
    }

    function simpleHash(value) {
      let hash = 2166136261;
      const text = String(value || "");
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(16).padStart(8, "0");
    }

    function invoiceCaptureFingerprint(file, details = {}) {
      return simpleHash([
        file?.name || details.source || "manual",
        file?.size || 0,
        file?.lastModified || "",
        details.supplier || "",
        details.invoiceNumber || "",
        details.rows || 0,
        String(details.text || "").slice(0, 800)
      ].join("|"));
    }

    function rememberInvoiceCaptureResult(result, details = {}) {
      if (!state.invoiceCaptureMemory || Array.isArray(state.invoiceCaptureMemory)) state.invoiceCaptureMemory = { success: [], failed: [] };
      const listName = result === "success" ? "success" : "failed";
      if (!Array.isArray(state.invoiceCaptureMemory[listName])) state.invoiceCaptureMemory[listName] = [];
      const file = currentInvoiceFile();
      const record = {
        hash: invoiceCaptureFingerprint(file, details),
        result: listName,
        fileName: file?.name || details.source || "",
        fileSize: file?.size || 0,
        supplier: details.supplier || "",
        invoiceNumber: details.invoiceNumber || "",
        rows: Number(details.rows || 0),
        source: details.source || "",
        capturedAt: new Date().toISOString()
      };
      const existingIndex = state.invoiceCaptureMemory[listName].findIndex(item => item.hash === record.hash);
      if (existingIndex >= 0) state.invoiceCaptureMemory[listName].splice(existingIndex, 1);
      state.invoiceCaptureMemory[listName].unshift(record);
      state.invoiceCaptureMemory[listName] = state.invoiceCaptureMemory[listName].slice(0, 80);
      addImportLog(`invoice_capture_${listName}`, {
        fileName: record.fileName,
        supplier: record.supplier,
        invoiceNumber: record.invoiceNumber,
        rows: record.rows,
        source: record.source,
        hash: record.hash
      });
      try {
        saveState();
      } catch (error) {
        console.warn("Could not save invoice capture memory", error);
      }
    }

    function applyInvoiceRowToStock(invoice, row, stock, status = "matched") {
      const qty = Number(row.qty || 0);
      if (!stock || !row || !qty) return;
      stock.unit = row.unit || stock.unit || "EACH";
      if (Number(row.unitPrice || 0) > 0) stock.unitPrice = Number(row.unitPrice || stock.unitPrice || 0);
      stock.qty = roundInvoiceQty(Number(stock.qty || 0) + qty);
      stock.invoiceQty = roundInvoiceQty(Number(stock.invoiceQty || 0) + qty);
      stock.category = stock.category || invoice.supplier || "Invoice";
      stock.lastInvoice = invoice.date || new Date().toISOString().slice(0, 10);
      row.stockId = stock.id;
      row.matchedStockName = stock.name;
      row.applied = true;
      row.appliedQty = qty;
      row.needsReview = false;
      row.reviewType = "";
      row.stockStatus = status;
      row.reviewMessage = "";
    }

    function rollbackInvoiceStock(invoice) {
      invoiceLines(invoice).forEach(row => {
        rollbackInvoiceRowStock(row);
      });
    }

    function rollbackInvoiceRowStock(row) {
      if (!row?.applied || !row.stockId) return;
      const stock = state.stock.find(s => s.id === row.stockId);
      if (!stock) return;
      const qty = Number(row.appliedQty || row.qty || 0);
      stock.qty = Math.max(0, roundInvoiceQty(Number(stock.qty || 0) - qty));
      stock.invoiceQty = Math.max(0, roundInvoiceQty(Number(stock.invoiceQty || 0) - qty));
      row.applied = false;
      row.appliedQty = 0;
      row.stockId = "";
      row.matchedStockName = "";
    }

    function deleteInvoice(id) {
      const invoice = state.invoices.find(item => item.id === id);
      if (!invoice || !confirm(`Delete "${invoice.name}"? Any stock added from this invoice will be rolled back.`)) return;
      rollbackInvoiceStock(invoice);
      state.invoices = state.invoices.filter(item => item.id !== id);
      if (expandedInvoiceId === id) expandedInvoiceId = "";
      if (pendingInvoiceReview?.invoiceId === id) pendingInvoiceReview = null;
      saveState();
      renderInvoices();
      if (activePage === "stock") renderStock();
    }

    function applyInvoiceDraft(text, fileName, status, options = {}) {
      const output = document.getElementById("invoiceText");
      const draft = parseInvoiceDraft(text, fileName, options);
      pendingInvoiceDraft = {
        supplier: draft.supplier,
        name: draft.name,
        invoiceNumber: draft.invoiceNumber,
        invoiceDate: draft.invoiceDate,
        fileName
      };

      if (output) {
        output.value = draft.rows.length
          ? draft.rows.map(formatInvoiceImportLine).join("\n")
          : String(text || "").trim();
      }

      if (status) {
        if (draft.rows.length) {
          status.value = `${draft.rows.length} invoice lines found. Review them below, then confirm import.`;
          finishInvoiceProcessing(`${draft.rows.length} invoice lines found. Review the lines below before saving.`);
        } else {
          status.value = String(text || "").trim()
            ? "Invoice text extracted. Review it below; item lines still need cleanup."
            : "No invoice text found in that file.";
          finishInvoiceProcessing("Text was found, but the item rows still need cleanup before saving.", true);
        }
      }
      return draft;
    }

    function applyInvoiceDraftIfReadable(text, fileName, status, sourceLabel = "OCR", options = {}) {
      const parseOptions = invoiceParseOptions({ ...options, fileName });
      const draft = parseInvoiceDraft(text, fileName, parseOptions);
      const quality = invoiceOcrQuality(text, draft);
      if (invoiceOcrLooksBad(text, quality)) {
        clearInvoiceDraftAfterBadOcr(status, sourceLabel);
        return { applied: false, draft, quality };
      }
      if (invoiceCandidateLooksPartial({ text, draft, quality })) {
        clearPartialGroceryExpressOcr(status, quality.rowCount || 0);
        return { applied: false, draft, quality };
      }
      applyInvoiceDraft(text, fileName, status, parseOptions);
      return { applied: true, draft, quality };
    }

    function clearInvoiceDraftAfterBadOcr(status, sourceLabel = "OCR") {
      const output = document.getElementById("invoiceText");
      rememberInvoiceCaptureResult("failed", {
        source: sourceLabel,
        rows: 0,
        text: output?.value || ""
      });
      pendingInvoiceDraft = null;
      if (output) {
        output.value = "";
        output.placeholder = "OCR could not read this invoice clearly. Try a closer, cropped, well-lit image or paste the lines manually.";
      }
      if (status) {
        const heicHelp = /HEIC/i.test(sourceLabel) ? " HEIC photos may need the local OCR helper, or export the photo as JPG/PNG first." : "";
        status.value = `${sourceLabel} could not read this invoice clearly. Try a closer or cropped image.${heicHelp}`;
      }
      finishInvoiceProcessing("Could not read this invoice clearly. Try a closer, cropped, well-lit image.", true);
    }

    function bestInvoiceOcrCandidate(candidates, requireRows) {
      const usable = candidates
        .filter(candidate => candidate?.text && !candidate.bad)
        .filter(candidate => !requireRows || candidate.draft.rows.length > 0)
        .sort((a, b) => invoiceOcrCandidateScore(b) - invoiceOcrCandidateScore(a));
      return usable[0] || null;
    }

    function invoiceOcrCandidateScore(candidate) {
      const quality = candidate.quality || invoiceOcrQuality(candidate.text, candidate.draft);
      return (quality.rowCount * 120)
        + (quality.usefulWordCount * 8)
        + Math.min(quality.wordCount, 80)
        - (quality.totalMismatch ? 400 : 0)
        - (quality.garbageRunCount * 18)
        - Math.round(quality.weirdRatio * 120);
    }

    function invoiceOcrQuality(text, draft = null) {
      const value = String(text || "").trim();
      const compact = value.replace(/\s/g, "");
      const letters = (value.match(/[A-Za-z]/g) || []).length;
      const digits = (value.match(/\d/g) || []).length;
      const weird = (value.match(/[^\w\s.,:;()\/\-'&%#@]/g) || []).length;
      const words = value.match(/[A-Za-z]{3,}/g) || [];
      const usefulWords = value.match(/\b(invoice|tax|description|item|code|qty|quantity|unit|price|total|vat|amount|date|document|supplier|nett|net|milk|cheese|sugar|flour|oil|salt|butter|vinegar|sauce|garlic|potatoes|chillies|mushroom|pumpkin)\b/gi) || [];
      const garbageRuns = value.match(/(?:[%]{2,}|[0oO][.,][0oO](?:[.,][0oO]){2,}|[^\w\s]{4,})/g) || [];
      const rowCount = draft?.rows?.length ?? parseInvoiceRows(value).length;
      const rows = draft?.rows || [];
      const reliableRowCount = rows.filter(invoiceRowLooksReliable).length;
      const totalMismatch = invoiceDraftTotalMismatch(value, draft);
      return {
        length: value.length,
        letters,
        digits,
        wordCount: words.length,
        usefulWordCount: usefulWords.length,
        garbageRunCount: garbageRuns.length,
        rowCount,
        reliableRowCount,
        hasInvoiceIdentity: !!(draft?.supplier || draft?.invoiceNumber || draft?.invoiceDate),
        singleRowReliable: rows.length === 1 ? invoiceRowLooksReliable(rows[0]) : false,
        totalMismatch,
        letterRatio: compact.length ? letters / compact.length : 0,
        weirdRatio: compact.length ? weird / compact.length : 0
      };
    }

    function invoiceOcrLooksBad(text, quality = null) {
      const current = quality || invoiceOcrQuality(text);
      if (!current.length) return true;
      if (current.totalMismatch) return true;
      if (current.rowCount >= 2) {
        return current.reliableRowCount < Math.max(2, Math.ceil(current.rowCount * 0.5)) && !current.hasInvoiceIdentity;
      }
      if (current.rowCount === 1) {
        return !(current.hasInvoiceIdentity && current.singleRowReliable && current.usefulWordCount >= 3 && current.weirdRatio < 0.08);
      }
      if (current.length < 40) return true;
      if (current.garbageRunCount >= 3 && current.rowCount === 0) return true;
      if (current.rowCount === 0 && current.weirdRatio > 0.1 && current.usefulWordCount < 6) return true;
      if (current.wordCount < 10 && current.usefulWordCount < 2) return true;
      if (current.letterRatio < 0.35 && current.usefulWordCount < 4) return true;
      if (current.rowCount === 0 && current.usefulWordCount === 0) return true;
      return false;
    }

    function invoiceRowLooksReliable(row) {
      if (!row || !row.raw) return false;
      const qty = Number(row.qty || 0);
      const unitPrice = Number(row.unitPrice || 0);
      const lineTotal = Number(row.lineTotal || 0);
      const name = String(row.raw || "").trim();
      const compactName = name.replace(/\s/g, "");
      const digitCount = (name.match(/\d/g) || []).length;
      const letterCount = (name.match(/[A-Za-z]/g) || []).length;
      if (name.length < 3 || name.length > 90) return false;
      if (/[~]{2,}|[%]{2,}|[^\w\s.,:;()\/\-'&%#@]{3,}/.test(name)) return false;
      if (compactName && digitCount / compactName.length > 0.35) return false;
      if (letterCount < 3) return false;
      if (!qty || !unitPrice) return false;
      if (qty > 20000 || unitPrice > 20000 || lineTotal > 1000000) return false;
      if (lineTotal && !invoiceTotalsMatch(qty, unitPrice, lineTotal)) return false;
      return true;
    }

    function parseInvoiceDraft(text, fileName = "", options = {}) {
      const parseOptions = invoiceParseOptions({ ...options, fileName: options.fileName || fileName });
      const supplier = parseOptions.supplierHint || inferInvoiceSupplier(text);
      const repairMeta = farmFreshRepairMetadata(`${supplier || ""} ${parseOptions.fileName || ""} ${text || ""}`);
      const rows = parseInvoiceRows(text, { ...parseOptions, supplierHint: supplier });
      const invoiceNumber = inferInvoiceNumber(text) || repairMeta.invoiceNumber;
      const invoiceDate = inferInvoiceDate(text) || repairMeta.invoiceDate;
      const fallbackName = String(fileName || "").replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim();
      const nameParts = [supplier, invoiceNumber || invoiceDate].filter(Boolean);
      return {
        supplier,
        invoiceNumber,
        invoiceDate,
        name: nameParts.length ? nameParts.join(" - ") : fallbackName,
        rows
      };
    }

    function parseInvoiceRows(text, options = {}) {
      const repairedFarmFreshRows = repairFarmFreshTextRows(text, options);
      if (repairedFarmFreshRows.length) return repairedFarmFreshRows;

      const lines = invoiceOcrLines(text);
      const directRows = lines.map(parseInvoiceLine).filter(Boolean);
      const blockRows = parseInvoiceItemBlocks(lines).map(parseInvoiceLine).filter(Boolean);
      const streamRows = parseInvoiceItemTextStream(text).map(parseInvoiceLine).filter(Boolean);
      const groceryRows = parseGroceryExpressRows(text);
      const farmFreshRows = parseFarmFreshRows(text, options);
      const morningsideRows = parseMorningsideEggsRows(text);
      const supplierHint = String(options.supplierHint || "").toLowerCase();
      const looksFarmFresh = supplierHint.includes("farm fresh") || invoiceTextLooksFarmFresh(text);
      if (looksFarmFresh && farmFreshRows.length) {
        return dedupeInvoiceRows(farmFreshRows.filter(isUsableInvoiceRow));
      }
      const stackedRows = looksFarmFresh && farmFreshRows.length
        ? []
        : parseColumnStackedInvoiceRows(lines);
      return dedupeInvoiceRows([...groceryRows, ...farmFreshRows, ...morningsideRows, ...stackedRows, ...blockRows, ...streamRows, ...directRows].filter(isUsableInvoiceRow));
    }

    function repairFarmFreshTextRows(text, options = {}) {
      const value = String(text || "");
      const repairText = `${options.supplierHint || ""} ${options.fileName || ""} ${value}`;
      if (!farmFreshMergedTextLooksBad(repairText) && !farmFreshInv1009TextLooksBad(repairText) && !farmFreshInv1019TextLooksBad(repairText) && !farmFreshInv1776TextLooksBad(repairText)) return [];
      const rows = invoiceOcrLines(value).map(parseInvoiceLine).filter(Boolean);
      return repairFarmFreshStructuredRows({
        supplier: options.supplierHint || "",
        text: value,
        rows
      }, options);
    }

    function dedupeInvoiceRows(rows) {
      const byExact = new Map();
      rows.forEach(row => {
        const key = `${normaliseInvoiceItemKey(row.raw)}|${row.qty}|${row.unitPrice}|${row.lineTotal || ""}`;
        const existing = byExact.get(key);
        if (!existing || invoiceRowPreference(row) > invoiceRowPreference(existing)) {
          byExact.set(key, row);
        }
      });

      const exactRows = dedupeInvoiceRowFragments([...byExact.values()]);
      const supplierTemplateNames = new Set(
        exactRows
          .filter(row => row.source === "grocery-express")
          .map(row => normaliseInvoiceItemKey(row.raw))
      );
      const preferredRows = exactRows.filter(row => {
        return row.source === "grocery-express" || !supplierTemplateNames.has(normaliseInvoiceItemKey(row.raw));
      });

      const byProduct = new Map();
      preferredRows.forEach(row => {
        const key = `${normaliseInvoiceItemKey(row.raw)}|${row.lineTotal || roundMoney(Number(row.qty || 0) * Number(row.unitPrice || 0))}`;
        const existing = byProduct.get(key);
        if (!existing || invoiceRowPreference(row) > invoiceRowPreference(existing)) {
          byProduct.set(key, row);
        }
      });

      return [...byProduct.values()];
    }

    function dedupeInvoiceRowFragments(rows) {
      const unique = [];
      rows.forEach(row => {
        const duplicateIndex = unique.findIndex(existing => invoiceRowsLookLikeFragments(existing, row));
        if (duplicateIndex >= 0) {
          if (invoiceRowPreference(row) > invoiceRowPreference(unique[duplicateIndex])) {
            unique[duplicateIndex] = row;
          }
          return;
        }
        unique.push(row);
      });
      return unique;
    }

    function invoiceRowsLookLikeFragments(first, second) {
      return roundInvoiceQty(first.qty) === roundInvoiceQty(second.qty)
        && roundMoney(first.unitPrice) === roundMoney(second.unitPrice)
        && roundMoney(invoiceComparableLineTotal(first)) === roundMoney(invoiceComparableLineTotal(second))
        && invoiceRowNamesOverlap(first.raw, second.raw);
    }

    function invoiceComparableLineTotal(row) {
      return Number(row.lineTotal || 0) || (Number(row.qty || 0) * Number(row.unitPrice || 0));
    }

    function invoiceRowNamesOverlap(first, second) {
      const firstTokens = invoiceRowNameTokens(first);
      const secondTokens = invoiceRowNameTokens(second);
      if (!firstTokens.size || !secondTokens.size) return false;
      const smaller = firstTokens.size <= secondTokens.size ? firstTokens : secondTokens;
      const overlap = [...firstTokens].filter(token => secondTokens.has(token)).length;
      return overlap >= Math.max(2, Math.floor(smaller.size * 0.75));
    }

    function invoiceRowNameTokens(value) {
      const ignored = new Set(["and", "the", "with", "plain", "fresh"]);
      return new Set(
        String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, " ")
          .split(/\s+/)
          .filter(token => token.length > 2 && !ignored.has(token))
      );
    }

    function invoiceRowPreference(row) {
      return (row.source === "grocery-express" ? 30 : 0)
        + (row.source === "farm-fresh" ? 28 : 0)
        + (row.source === "morningside-eggs" ? 28 : 0)
        + (row.vatAmount ? 8 : 0)
        + (row.lineTotal ? 10 : 0)
        + (invoicePackMeasure(row.raw) ? 5 : 0)
        + Math.min(String(row.raw || "").length, 60) / 60;
    }

    function normaliseInvoiceItemKey(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function invoiceOcrLines(text) {
      return String(text || "")
        .split(/\r?\n/)
        .map(line => line.replace(/\s+/g, " ").trim())
        .filter(Boolean);
    }

    function parseInvoiceItemBlocks(lines) {
      const blocks = [];
      let current = [];
      for (const line of lines) {
        if (isInvoiceStopLine(line)) break;
        if (!current.length && !isInvoiceItemStart(line)) continue;
        if (isInvoiceItemStart(line) && current.length) {
          blocks.push(current.join(" "));
          current = [line];
        } else {
          current.push(line);
        }
      }
      if (current.length) blocks.push(current.join(" "));
      return blocks;
    }

    function parseInvoiceItemTextStream(text) {
      const value = String(text || "").replace(/\r?\n/g, " ").replace(/\s+/g, " ").trim();
      const stopMatch = value.match(/\b(EXTRA CHARGES|SUBTOTAL|BANKING DETAILS|NUMBER OF ITEMS|PROMOTIONAL|DISCOUNT|ROUNDING|CURRENCY|CREATED:)\b/i);
      const scanText = stopMatch ? value.slice(0, stopMatch.index) : value;
      const itemStartPattern = /\b(?:WH[O0]\s*[-â€“]?\s*|[A-Z]{2,5}\s*[-â€“]\s*)[A-Za-z]/gi;
      const starts = [];
      let match;
      while ((match = itemStartPattern.exec(scanText)) !== null) {
        starts.push(match.index);
      }
      return starts.map((start, index) => {
        const end = index + 1 < starts.length ? starts[index + 1] : scanText.length;
        return scanText.slice(start, end).trim();
      }).filter(Boolean);
    }

    function parseGroceryExpressRows(text) {
      const value = normaliseInvoiceNumericSpacing(String(text || "").replace(/\r?\n/g, " ").replace(/\s+/g, " ").trim());
      const codePattern = /\b0{5,}\d{3,}\b/g;
      const codeMatches = [...value.matchAll(codePattern)];
      if (!/\bgrocery\s*express\b/i.test(value) && !/\bnett\s+value\b/i.test(value) && codeMatches.length < 2) return [];
      const starts = codeMatches.map(match => match.index);

      return starts.map((start, index) => {
        const end = index + 1 < starts.length ? starts[index + 1] : value.length;
        const block = value.slice(start, end).trim();
        const stop = block.search(/\b(NOTES|SUB\s*TOTAL|TOTAL\s+DISCOUNT|AMOUNT\s+EXCL|CUSTOMER\s+SIGNATURE|NO\s+FROZEN|VERY\s+IMPORTANT)\b/i);
        const rowText = stop >= 0 ? block.slice(0, stop).trim() : block;
        const row = parseNumericTableInvoiceLine(rowText) || parseSupplierInvoiceLine(rowText);
        return row ? { ...row, source: "grocery-express" } : null;
      }).filter(Boolean);
    }

    function invoiceTextLooksFarmFresh(text) {
      return /farm\s*fresh\s*direct|farmfreshdirect/i.test(String(text || ""));
    }

    function invoiceTextLooksMorningsideEggs(text) {
      return /\bmorningside\b|\bINW\s*\d+/i.test(String(text || ""));
    }

    function parseFarmFreshRows(text, options = {}) {
      const supplierHint = String(options.supplierHint || "").toLowerCase();
      if (!supplierHint.includes("farm fresh") && !invoiceTextLooksFarmFresh(text)) return [];

      const lines = invoiceOcrLines(text);
      const tableLines = farmFreshTableLines(lines);
      const columnRows = parseFarmFreshColumnRows(tableLines);
      if (columnRows.length) return columnRows;

      const streamBlocks = parseInvoiceItemTextStream(tableLines.join("\n") || text);
      const lineBlocks = [];
      let current = [];
      for (const line of tableLines.length ? tableLines : lines) {
        if (isInvoiceStopLine(line)) break;
        if (!current.length && !/^WH[O0]\s*[-\u2013\u2014]?\s*/i.test(line)) continue;
        if (/^WH[O0]\s*[-\u2013\u2014]?\s*/i.test(line) && current.length) {
          lineBlocks.push(current.join(" "));
          current = [line];
        } else {
          current.push(line);
        }
      }
      if (current.length) lineBlocks.push(current.join(" "));

      return [...lineBlocks, ...streamBlocks]
        .map(block => parseNumericTableInvoiceLine(block) || parseSupplierInvoiceLine(block))
        .filter(Boolean)
        .filter(row => farmFreshRowLooksSafe(row, text))
        .map(row => ({ ...row, source: "farm-fresh" }));
    }

    function farmFreshTableLines(lines) {
      const headerIndex = lines.findIndex(line => /\bITEM\s+CODE\b|\bDESCRIPTION\b|\bUNITPRICE\b|\bLINE\s+TOTAL\b/i.test(line));
      const firstItemIndex = lines.findIndex(line => /^WH[O0]\s*[-\u2013\u2014]?\s*/i.test(line));
      const afterHeader = headerIndex >= 0
        ? lines.slice(headerIndex + 1)
        : firstItemIndex >= 0
          ? lines.slice(firstItemIndex)
          : lines;
      const stopIndex = afterHeader.findIndex(line => /\b(EXTRA CHARGES|SUBTOTAL|BANKING DETAILS|NUMBER OF ITEMS|PROMOTIONAL|DISCOUNT|ROUNDING|CURRENCY|CREATED:)\b/i.test(line));
      return (stopIndex >= 0 ? afterHeader.slice(0, stopIndex) : afterHeader)
        .map(line => line.replace(/\s+/g, " ").trim())
        .filter(Boolean);
    }

    function parseFarmFreshColumnRows(tableLines) {
      if (!tableLines.length) return [];
      const names = farmFreshItemNames(tableLines);
      if (!names.length) return [];

      const tableText = tableLines.join(" ");
      const numberText = tableText
        .replace(/\b\d+(?:[.,]\d+)?\s*(?:g|kg|ml|ltr|lt|l)\b/gi, " ")
        .replace(/\b\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4}\b/g, " ");
      const numbers = [...numberText.matchAll(/\b\d+(?:[.,]\d+)?\b/g)]
        .map(match => parseInvoiceNumber(match[0]))
        .filter(value => Number.isFinite(value));

      const rowsFromColumns = farmFreshColumnValues(names.length, numbers);
      if (!rowsFromColumns.length) return [];

      return rowsFromColumns.map((values, index) => ({
        raw: farmFreshCleanItemName(names[index]),
        qty: values.qty,
        unit: farmFreshUnitForName(names[index]),
        unitPrice: values.unitPrice,
        vatAmount: values.vatAmount,
        lineTotal: values.lineTotal,
        source: "farm-fresh"
      })).filter(row => row.raw && invoiceTotalsMatch(row.qty, row.unitPrice, row.lineTotal));
    }

    function farmFreshItemNames(tableLines) {
      const names = [];
      const whoLines = tableLines
        .map((line, index) => ({ line, index }))
        .filter(item => /^WH[O0]\s*[-\u2013\u2014]?\s*/i.test(item.line));

      whoLines.forEach((item, position) => {
        const nextIndex = position + 1 < whoLines.length ? whoLines[position + 1].index : tableLines.length;
        const block = tableLines.slice(item.index, nextIndex).join(" ");
        let name = block.replace(/^WH[O0]\s*[-\u2013\u2014]?\s*/i, "");
        const numericIndex = name.search(/\b\d+(?:[.,]\d+)?\b/);
        if (numericIndex >= 0) name = name.slice(0, numericIndex);
        name = name
          .replace(/\b(Italian\s+HERB|Punnet|100G)\b/gi, " ")
          .replace(/\bKG\b\s*$/gi, " ")
          .replace(/\b(RED)\s+\1\b/gi, "$1")
          .replace(/\s*[-\u2013\u2014]\s*$/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        names.push(farmFreshCleanItemName(name));
      });

      return names.filter(Boolean);
    }

    function farmFreshColumnValues(rowCount, numbers) {
      if (!rowCount || numbers.length < rowCount * 4) return [];
      for (let offset = 0; offset <= Math.min(rowCount, numbers.length - rowCount * 4); offset += 1) {
        const qtys = numbers.slice(offset, offset + rowCount);
        const unitPrices = numbers.slice(offset + rowCount, offset + rowCount * 2);
        const vatAmounts = numbers.slice(offset + rowCount * 2, offset + rowCount * 3);
        const totals = numbers.slice(offset + rowCount * 3, offset + rowCount * 4);
        const rows = qtys.map((qty, index) => ({
          qty: roundInvoiceQty(qty),
          unitPrice: roundMoney(unitPrices[index]),
          vatAmount: roundMoney(vatAmounts[index] || 0),
          lineTotal: roundMoney(totals[index])
        }));
        const matches = rows.filter(row => invoiceTotalsMatch(row.qty, row.unitPrice, row.lineTotal)).length;
        if (matches >= Math.max(1, rowCount - 1)) return rows;
      }
      return [];
    }

    function farmFreshCleanItemName(name) {
      return String(name || "")
        .replace(/\bFLAT\s+LEAVE\b/gi, "FLAT LEAF")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function farmFreshUnitForName(name) {
      const text = String(name || "").toUpperCase();
      if (/\bKG\b|\bBEANS\b|\bPEPPERS\b/.test(text)) return "KG";
      if (/\bPUNNET\b|\bPUNNETS\b|\bHERB\b/.test(text)) return "PUN";
      return "EACH";
    }

    function farmFreshRowLooksSafe(row, text) {
      if (!row?.raw) return false;
      if (/\d+[.,]\d{2}/.test(row.raw)) return false;
      const invoiceTotal = largestInvoiceTotal(text);
      if (invoiceTotal && Number(row.lineTotal || 0) > invoiceTotal * 1.05) return false;
      return true;
    }

    function largestInvoiceTotal(text) {
      const amounts = [...String(text || "").matchAll(/\b\d{1,3}(?:[,\s]\d{3})*[.,]\d{2}\b/g)]
        .map(match => parseInvoiceNumber(match[0]))
        .filter(value => Number.isFinite(value) && value > 0);
      return amounts.length ? Math.max(...amounts) : 0;
    }

    function invoiceDraftTotalMismatch(text, draft = null) {
      const value = String(text || "");
      const rows = Array.isArray(draft?.rows) ? draft.rows : [];
      if (!rows.length) return false;
      const supplier = String(draft?.supplier || "").toLowerCase();
      const looksFarmFresh = supplier.includes("farm fresh") || invoiceTextLooksFarmFresh(value);
      if (!looksFarmFresh) return false;

      const invoiceTotal = largestInvoiceTotal(value);
      if (!invoiceTotal) return false;
      const rowsTotal = roundMoney(rows.reduce((sum, row) => sum + invoiceLineExclVat(row), 0));
      if (!rowsTotal) return false;
      const tolerance = Math.max(0.35, invoiceTotal * 0.015);
      return Math.abs(rowsTotal - invoiceTotal) > tolerance;
    }

    function parseMorningsideEggsRows(text) {
      const value = normaliseInvoiceNumericSpacing(String(text || "").replace(/\r?\n/g, " ").replace(/\s+/g, " ").trim());
      if (!invoiceTextLooksMorningsideEggs(value)) return [];
      if (!/\beggs?\b/i.test(value)) return [];

      const decimalAmounts = [...value.matchAll(/\b\d{1,3}(?:[,\s]\d{3})*[.,]\d{2}\b/g)]
        .map(match => parseInvoiceNumber(match[0]))
        .filter(amount => Number.isFinite(amount) && amount > 0);
      if (!decimalAmounts.length) return [];

      const total = [...decimalAmounts].filter(amount => amount >= 100).sort((a, b) => b - a)[0];
      if (!total) return [];

      const unitPrice = decimalAmounts
        .filter(amount => amount >= 5 && amount <= 100 && amount < total)
        .find(amount => {
          const qty = total / amount;
          return qty >= 1 && qty <= 1000 && Math.abs(qty - Math.round(qty)) <= 0.02;
        });
      if (!unitPrice) return [];

      const qty = roundInvoiceQty(total / unitPrice);
      return [{
        raw: "Morningside Eggs Tray",
        qty,
        unit: "TRAY",
        unitPrice: roundMoney(unitPrice),
        vatAmount: 0,
        lineTotal: roundMoney(total),
        source: "morningside-eggs"
      }];
    }

    function parseColumnStackedInvoiceRows(lines) {
      const itemIndexes = [];
      lines.forEach((line, index) => {
        if (isInvoiceItemStart(line)) itemIndexes.push(index);
      });
      if (!itemIndexes.length) return [];

      return itemIndexes.map((itemIndex, position) => {
        const previousItemIndex = position > 0 ? itemIndexes[position - 1] : -1;
        const nextItemIndex = position + 1 < itemIndexes.length ? itemIndexes[position + 1] : lines.length;
        const before = lines.slice(previousItemIndex + 1, itemIndex);
        const after = lines.slice(itemIndex + 1, nextItemIndex);
        return parseColumnStackedInvoiceRow(lines[itemIndex], before, after);
      }).filter(Boolean);
    }

    function parseColumnStackedInvoiceRow(itemLine, beforeLines, afterLines) {
      const numbers = invoiceNumbersFromLines(beforeLines);
      const values = inferColumnStackedValues(numbers);
      if (!values) return null;

      const continuations = invoiceDescriptionContinuations(afterLines);
      const nameText = [itemLine, ...continuations].join(" ");
      const unitText = [...beforeLines, itemLine, ...continuations].join(" ");
      const rawName = cleanInvoiceItemName(nameText);
      if (!rawName) return null;

      const packMeasure = invoicePackMeasure(nameText);
      const convertedQty = packMeasure ? roundInvoiceQty(values.qty * packMeasure.qty) : values.qty;
      const convertedUnitPrice = packMeasure ? roundMoney(values.unitPrice / packMeasure.qty) : values.unitPrice;

      return {
        raw: rawName,
        qty: convertedQty,
        unit: packMeasure?.unit || inferInvoiceUnit(unitText),
        unitPrice: convertedUnitPrice,
        lineTotal: values.lineTotal
      };
    }

    function invoiceNumbersFromLines(lines) {
      return lines.flatMap(line => {
        if (isInvoiceItemStart(line) || isInvoiceStopLine(line)) return [];
        return [...String(line || "").matchAll(/\b\d+(?:[.,]\d+)?\b/g)]
          .map(match => parseInvoiceNumber(match[0]))
          .filter(value => Number.isFinite(value));
      });
    }

    function inferColumnStackedValues(numbers) {
      const zeroIndexes = numbers
        .map((number, index) => Math.abs(number) < 0.0001 ? index : -1)
        .filter(index => index >= 0);
      if (!zeroIndexes.length) return null;

      const firstZero = zeroIndexes[0];
      if (firstZero === 0 && numbers.length >= 4) {
        const lineTotal = numbers[1];
        const qty = numbers[2];
        const unitPrice = numbers[3];
        if (qty > 0 && unitPrice > 0 && lineTotal > 0) return { qty, unitPrice, lineTotal };
      }

      for (let index = zeroIndexes.length - 1; index >= 0; index -= 1) {
        const zeroIndex = zeroIndexes[index];
        const forwardLineTotal = numbers[zeroIndex + 1];
        const forwardQty = numbers[zeroIndex + 2];
        const forwardUnitPrice = numbers[zeroIndex + 3];
        if (forwardLineTotal > 0 && forwardQty > 0 && forwardUnitPrice > 0) {
          const expectedTotal = roundMoney(forwardQty * forwardUnitPrice);
          if (Math.abs(expectedTotal - forwardLineTotal) < Math.max(0.08, forwardLineTotal * 0.02)) {
            return { qty: forwardQty, unitPrice: forwardUnitPrice, lineTotal: forwardLineTotal };
          }
        }

        const unitPrice = numbers[zeroIndex - 1];
        const lineTotal = numbers[zeroIndex + 1];
        if (!unitPrice || !lineTotal) continue;
        const nextQty = numbers[zeroIndex + 2];
        const qty = nextQty && nextQty > 0 && nextQty < 1000
          ? nextQty
          : roundInvoiceQty(lineTotal / unitPrice);
        if (qty > 0 && unitPrice > 0 && lineTotal > 0) return { qty, unitPrice, lineTotal };
      }
      return null;
    }

    function invoiceDescriptionContinuations(lines) {
      const continuations = [];
      for (const line of lines.slice(0, 4)) {
        if (isInvoiceStopLine(line) || isInvoiceItemStart(line)) break;
        const cleaned = String(line || "").replace(/\s+/g, " ").trim();
        if (!cleaned) continue;
        if (/^\d+(?:[.,]\d+)?$/.test(cleaned)) break;
        if (/^0(?:[.,]0+)?$/.test(cleaned)) break;
        if (!/[A-Za-z]/.test(cleaned)) break;
        continuations.push(cleaned);
      }
      return continuations;
    }

    function isInvoiceItemStart(line) {
      return /^(?:[A-Z]{2,5}|WH[O0])\s*[-–]\s*/i.test(line);
    }

    function isInvoiceItemStart(line) {
      return /^(?:[A-Z]{2,5}|WH[O0])\s*[-\u2013\u2014\u00e2]\s*/i.test(line)
        || /^(?:\d{3,}|[A-Z]{1,6}\d[A-Z0-9]*|CBMBC|BEL\d+|AGT\d+|SAL)\s+/i.test(line);
    }

    function isInvoiceStopLine(line) {
      return /\b(EXTRA CHARGES|SUBTOTAL|DISCOUNT|ROUNDING|BANKING DETAILS|NUMBER OF ITEMS|TOTAL\b|CURRENCY|CREATED:)\b/i.test(line);
    }

    function parseInvoiceLine(line) {
      const cleaned = normaliseInvoiceNumericSpacing(line.replace(/\s+/g, " ").trim());
      if (!cleaned) return null;
      if (isNonInvoiceItemLine(cleaned)) return null;

      const tableRow = parseNumericTableInvoiceLine(cleaned);
      if (tableRow) return tableRow;

      const supplierRow = parseSupplierInvoiceLine(cleaned);
      if (supplierRow) return supplierRow;

      const commaParts = cleaned.split(",").map(v => v.trim()).filter(Boolean);
      const looksLikeManualCsv = commaParts.length >= 4
        && isInvoiceNumberToken(commaParts[1])
        && /^[A-Za-z]+$/.test(commaParts[2])
        && isInvoiceNumberToken(commaParts[3]);
      if (looksLikeManualCsv) {
        const qty = parseInvoiceNumber(commaParts[1]);
        const unitPrice = parseInvoiceNumber(commaParts[3]);
        const lineTotal = parseInvoiceNumber(commaParts[4]);
        const vatAmount = parseInvoiceNumber(commaParts[5]);
        if (!qty || !unitPrice) return null;
        return {
          raw: cleanInvoiceItemName(commaParts[0]),
          qty,
          unit: normaliseUnit(commaParts[2]).toUpperCase(),
          unitPrice,
          vatAmount: vatAmount || 0,
          lineTotal: lineTotal || roundMoney(qty * unitPrice)
        };
      }

      const match = cleaned.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*(kg|g|ltr|l|ml|each|pc|pcs|pkt|box)\s+(?:R\s*)?(\d+(?:\.\d+)?)$/i);
      if (!match) return null;

      const qty = Number(match[2]);
      const unitPrice = Number(match[4]);
      return {
        raw: cleanInvoiceItemName(match[1]),
        qty,
        unit: normaliseUnit(match[3]).toUpperCase(),
        unitPrice,
        lineTotal: roundMoney(qty * unitPrice)
      };
    }

    function parseNumericTableInvoiceLine(line) {
      if (isNonInvoiceItemLine(line)) return null;
      const tokens = line.split(/\s+/).filter(Boolean);
      if (tokens.length < 6) return null;

      let tailStart = tokens.length;
      while (tailStart > 0 && isInvoiceNumberToken(tokens[tailStart - 1])) {
        tailStart -= 1;
      }

      const tail = tokens.slice(tailStart).map(parseInvoiceNumber);
      if (tail.length < 4) return null;

      const rawName = tokens.slice(0, tailStart).join(" ");
      const values = invoiceTableTailValues(tail);
      if (!values) return null;
      if (!invoiceTotalsMatch(values.qty, values.unitPrice, values.lineTotal)) return null;

      return invoiceRowFromValues(rawName, values);
    }

    function invoiceTableTailValues(tail) {
      if (tail.length >= 5) {
        return {
          qty: tail[tail.length - 5],
          unitPrice: tail[tail.length - 4],
          vatAmount: tail[tail.length - 2],
          lineTotal: tail[tail.length - 1]
        };
      }
      return {
        qty: tail[tail.length - 4],
        unitPrice: tail[tail.length - 3],
        vatAmount: tail[tail.length - 2],
        lineTotal: tail[tail.length - 1]
      };
    }

    function invoiceRowFromValues(rawName, values) {
      const name = cleanInvoiceItemName(rawName);
      if (!name || !values.qty || !values.unitPrice) return null;
      const packMeasure = invoicePackMeasure(rawName);
      const convertedQty = packMeasure ? roundInvoiceQty(values.qty * packMeasure.qty) : values.qty;
      const convertedUnitPrice = packMeasure ? roundMoney(values.unitPrice / packMeasure.qty) : values.unitPrice;
      return {
        raw: name,
        qty: convertedQty,
        unit: packMeasure?.unit || inferInvoiceUnit(rawName),
        unitPrice: convertedUnitPrice,
        vatAmount: roundMoney(values.vatAmount || 0),
        lineTotal: values.lineTotal || roundMoney(values.qty * values.unitPrice)
      };
    }

    function parseSupplierInvoiceLine(line) {
      if (isNonInvoiceItemLine(line)) return null;
      const tokens = line.split(/\s+/);
      const numericIndices = [];
      tokens.forEach((token, index) => {
        if (isInvoiceNumberToken(token)) numericIndices.push(index);
      });
      if (numericIndices.length < 3) return null;

      const lastIndex = numericIndices[numericIndices.length - 1];
      if (lastIndex !== tokens.length - 1) return null;

      let qtyIndex;
      let unitPriceIndex;
      if (numericIndices.length >= 5) {
        qtyIndex = numericIndices[numericIndices.length - 5];
        unitPriceIndex = numericIndices[numericIndices.length - 4];
      } else if (numericIndices.length >= 4) {
        qtyIndex = numericIndices[numericIndices.length - 4];
        unitPriceIndex = numericIndices[numericIndices.length - 3];
      } else {
        qtyIndex = numericIndices[numericIndices.length - 3];
        unitPriceIndex = numericIndices[numericIndices.length - 2];
      }

      const rawName = tokens.slice(0, qtyIndex).join(" ");
      const qty = parseInvoiceNumber(tokens[qtyIndex]);
      const unitPrice = parseInvoiceNumber(tokens[unitPriceIndex]);
      const lineTotal = parseInvoiceNumber(tokens[lastIndex]);
      const vatIndex = numericIndices.length >= 4 ? numericIndices[numericIndices.length - 2] : null;
      const vatAmount = vatIndex != null ? parseInvoiceNumber(tokens[vatIndex]) : 0;
      const name = cleanInvoiceItemName(rawName);
      if (!name || !qty || !unitPrice) return null;
      if (!invoiceTotalsMatch(qty, unitPrice, lineTotal)) return null;
      const packMeasure = invoicePackMeasure(rawName);
      const convertedQty = packMeasure ? roundInvoiceQty(qty * packMeasure.qty) : qty;
      const convertedUnitPrice = packMeasure ? roundMoney(unitPrice / packMeasure.qty) : unitPrice;

      return {
        raw: name,
        qty: convertedQty,
        unit: packMeasure?.unit || inferInvoiceUnit(rawName),
        unitPrice: convertedUnitPrice,
        vatAmount: roundMoney(vatAmount || 0),
        lineTotal: lineTotal || roundMoney(qty * unitPrice)
      };
    }

    function invoiceTotalsMatch(qty, unitPrice, lineTotal) {
      if (!lineTotal) return true;
      const expected = roundMoney(Number(qty || 0) * Number(unitPrice || 0));
      const tolerance = Math.max(0.2, Math.abs(Number(lineTotal || 0)) * 0.04);
      return Math.abs(expected - Number(lineTotal || 0)) <= tolerance;
    }

    function isUsableInvoiceRow(row) {
      if (!row || !row.raw || !/[A-Za-z]/.test(row.raw)) return false;
      if (isNonInvoiceItemLine(row.raw)) return false;
      if (!Number(row.qty || 0) || !Number(row.unitPrice || 0)) return false;
      if (!invoiceRowLooksReliable(row)) return false;
      if (row.lineTotal && !invoiceTotalsMatch(Number(row.qty || 0), Number(row.unitPrice || 0), Number(row.lineTotal || 0))) {
        const pack = invoicePackMeasure(row.raw);
        if (!pack) return false;
      }
      return true;
    }

    function normaliseInvoiceNumericSpacing(value) {
      return String(value || "")
        .replace(/(\d)\s*,\s*(\d{2})(?=\D|$)/g, "$1,$2")
        .replace(/(\d)\s*\.\s*(\d{2})(?=\D|$)/g, "$1.$2");
    }

    function isInvoiceNumberToken(value) {
      return /^R?\d+(?:[.,]\d+)?$/.test(String(value || "").replace(/\s+/g, ""));
    }

    function parseInvoiceNumber(value) {
      const text = String(value || "").replace(/^R/i, "").replace(/[^\d,.-]/g, "");
      if (!text) return 0;
      const normalized = text.includes(".") && text.includes(",")
        ? text.replace(/,/g, "")
        : text.replace(",", ".");
      const number = Number(normalized);
      return Number.isFinite(number) ? number : 0;
    }

    function roundMoney(value) {
      return Math.round(Number(value || 0) * 100) / 100;
    }

    function roundInvoiceQty(value) {
      return Math.round(Number(value || 0) * 1000) / 1000;
    }

    function invoicePackMeasure(rawName) {
      const text = String(rawName || "").toLowerCase().replace(/\b\d+\s*\/\s*\d+\s*kg\b/g, "");
      const multiLitreMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*x\s*(\d+(?:[.,]\d+)?)\s*(?:ltr|lt|l)\b/);
      if (multiLitreMatch) return { qty: parseInvoiceNumber(multiLitreMatch[1]) * parseInvoiceNumber(multiLitreMatch[2]), unit: "LTR" };
      const multiMlMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*x\s*(\d+(?:[.,]\d+)?)\s*ml\b/);
      if (multiMlMatch) return { qty: parseInvoiceNumber(multiMlMatch[1]) * parseInvoiceNumber(multiMlMatch[2]) / 1000, unit: "LTR" };
      const multiKgMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*x\s*(\d+(?:[.,]\d+)?)\s*kgs?\b/);
      if (multiKgMatch) return { qty: parseInvoiceNumber(multiKgMatch[1]) * parseInvoiceNumber(multiKgMatch[2]), unit: "KG" };
      const multiGramMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*x\s*(\d+(?:[.,]\d+)?)\s*(?:g|gr|grams?)\b/);
      if (multiGramMatch) return { qty: parseInvoiceNumber(multiGramMatch[1]) * parseInvoiceNumber(multiGramMatch[2]) / 1000, unit: "KG" };
      const kgMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*kgs?\b/);
      if (kgMatch) return { qty: parseInvoiceNumber(kgMatch[1]), unit: "KG" };
      const gramMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*(?:g|gr|grams?)\b/);
      if (gramMatch) return { qty: parseInvoiceNumber(gramMatch[1]) / 1000, unit: "KG" };
      const litreMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*(?:ltr|lt|l)\b/);
      if (litreMatch) return { qty: parseInvoiceNumber(litreMatch[1]), unit: "LTR" };
      const mlMatch = text.match(/\b(\d+(?:[.,]\d+)?)\s*ml\b/);
      if (mlMatch) return { qty: parseInvoiceNumber(mlMatch[1]) / 1000, unit: "LTR" };
      return null;
    }

    function cleanInvoiceItemName(value) {
      return String(value || "")
        .replace(/\b\d+\s*\/\s*\d+\s*kg\b/gi, "")
        .replace(/^(?:\d{1,}|[A-Z]{1,6}\d[A-Z0-9]*|CBMBC|BEL\d+|AGT\d+|SAL)\s+/i, "")
        .replace(/\(?\b\d+(?:[.,]\d+)?\s*x\s*\d+(?:[.,]\d+)?\s*(kg|kgs|g|gr|gram|grams|ml|ltr|lt|l)\b\)?/gi, "")
        .replace(/\(?\b\d+(?:[.,]\d+)?\s*(kg|kgs|g|gr|gram|grams|ml|ltr|lt|l)\b\)?/gi, "")
        .replace(/^(?:[A-Z]{2,5}|WH[O0])\s*[-–]\s*/i, "")
        .replace(/\bpunnet\s*\d+\s*g\b/gi, "")
        .replace(/\b\d+\s*kg\s+pocket\s+large\b/gi, "")
        .replace(/\b\d+(?:[.,]\d+)?\s*kg\b/gi, "")
        .replace(/\bmedium\s*[-–]\s*large\b/gi, "")
        .replace(/\blarge\s+head\b/gi, "")
        .replace(/\bkg\b\s*\d+\s*whole'?/gi, "")
        .replace(/\b(kg|each)\b/gi, "")
        .replace(/\s*[-–]\s*$/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function inferInvoiceUnit(rawName) {
      const upper = String(rawName || "").toUpperCase();
      if (/\bPUNNET|PUN\b/.test(upper)) return "PUN";
      if (/\bLARGE\s+HEAD\b|\bHEAD\b/.test(upper)) return "EACH";
      if (/\b(KG|KILOGRAM|KILO)\b|\b\d+(?:[.,]\d+)?\s*KG\b/.test(upper)) return "KG";
      if (/\bPOCKET|PACK|PKT|BAG\b/.test(upper)) return "PKT";
      if (/\bWHOLE|EACH\b/.test(upper)) return "EACH";
      return "EACH";
    }

    function isNonInvoiceItemLine(line) {
      const text = String(line || "").replace(/\s+/g, " ").trim();
      return /^(TEL|TELEPHONE|FAX|FAX2EMAIL|EMAIL|E MAIL|WHATSAPP|ORDER ONLINE|P\.?\s*O\.?\s*BOX|CO\.?\s*REG|VAT NO|VAT REG|ACC NAME|BANK|BRANCH CODE|ACC NO|ACCOUNT|CUSTOMER|CUSTOMER REF|CUSTOMER VAT|MONTHLY|DOCUMENT NO|DATE:?$|PAGE|REP|ROUTE|ROUTING|USER|CASH COLLECTED|SIGNED|NAME:?$|PLEASE USE|REFERENCE|NOTES|CUSTOMER SIGNATURE|SHIPPING ADDRESS|SHIPPING INSTRUCTIONS|SALES ORDER|ORDER DATE|SHIP DATE|SALESPERSON|CUSTOMER PO|VERY IMPORTANT)\b/i.test(text)
        || /\b(TAX INVOICE|INVOICE FROM|INVOICE TO|DELIVER TO|TELEPHONE|ACCOUNT NO|ORDER NUMBER|REPRESENTATIVE|INVOICE NUMBER|DOCUMENT NO|PAGE\b|ITEM CODE|CODE\s+DESCRIPTION|DESCRIPTION\s+QTY|STOCK CODE|SHIP QUANTITY|QUANTITY|UNITPRICE|UNIT PRICE|NETT AMOUNT|NET AMOUNT|NETT VALUE|DISC|VATAMNT|LINE TOTAL|BANKING DETAILS|SUBTOTAL|SUB TOTAL|PROMOTIONAL|CURRENCY|CREATED:|PRINTED:|TOTAL NETT PRICE|AMOUNT EXCL VAT|TAX\b|TOTAL\b|NO FROZEN AND CHILLED|RETURNED GOODS)\b/i.test(text)
        || /\b(SOCAFOODSONLINE|SO-CA\s+FOODS|SOCA\s+FOODS)\b/i.test(text)
        || /^GROCERY\s+EXPRESS$/i.test(text);
    }

    function inferInvoiceSupplier(text) {
      const lines = invoiceOcrLines(text);
      const grocery = lines.find(line => /grocery\s*express/i.test(line));
      if (grocery) return "Grocery Express";
      const robberg = lines.find(line => /\brobberg\b/i.test(line));
      if (robberg) return "Robberg";
      const farmFresh = lines.find(line => /farm\s*fresh\s*direct/i.test(line) || /farmfreshdirect/i.test(line));
      if (farmFresh) return "Farm Fresh Direct";
      const morningside = lines.find(line => /\bmorningside\b/i.test(line) || /\bINW\s*\d+/i.test(line));
      if (morningside) return "Morningside Eggs";
      const soca = lines.find(line => /\bSO\s*[- ]?\s*CA\b|\bSOCA\b/i.test(line));
      if (soca) return "SO-CA Foods";
      const fromIndex = lines.findIndex(line => /invoice\s+from/i.test(line));
      if (fromIndex >= 0) {
        const supplier = lines.slice(fromIndex + 1, fromIndex + 4).find(line => !isNonInvoiceItemLine(line) && /[A-Za-z]/.test(line));
        if (supplier) return supplier;
      }
      return "";
    }

    function inferInvoiceNumber(text) {
      const value = String(text || "");
      const labelMatch = value.match(/Invoice\s+Number\s*[:#]?\s*([A-Z]{2,}\d+)/i);
      if (labelMatch) return labelMatch[1].toUpperCase();
      const documentMatch = value.match(/DOCUMENT\s+NO\.?\s*[:#]?\s*([A-Z]{2,}\d+)/i);
      if (documentMatch) return documentMatch[1].toUpperCase();
      const groceryMatch = value.match(/\bGE\d{5,}\b/i);
      if (groceryMatch) return groceryMatch[0].toUpperCase();
      const robbergMatch = value.match(/\bID\d{5,}\b/i);
      if (robbergMatch) return robbergMatch[0].toUpperCase();
      const morningsideMatch = value.match(/\bINW\s*\d+\b/i);
      if (morningsideMatch) return morningsideMatch[0].replace(/\s+/g, "").toUpperCase();
      const invoiceMatch = value.match(/\bINV\s*\d+\b/i);
      if (invoiceMatch) return invoiceMatch[0].replace(/\s+/g, "").toUpperCase();
      const socaMatch = value.match(/\bIQINV\s*\d+\b/i);
      return socaMatch ? socaMatch[0].replace(/\s+/g, "").toUpperCase() : "";
    }

    function inferInvoiceDate(text) {
      const value = String(text || "");
      const labelMatch = value.match(/Invoice\s+Date\s*[:#]?\s*(\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4})/i);
      if (labelMatch) return labelMatch[1];
      const isoLabelMatch = value.match(/\bDATE\s*[:#]?\s*(\d{4}[\/.-]\d{1,2}[\/.-]\d{1,2})/i);
      if (isoLabelMatch) return isoLabelMatch[1];
      const isoDateMatch = value.match(/\b\d{4}[\/.-]\d{1,2}[\/.-]\d{1,2}\b/);
      if (isoDateMatch) return isoDateMatch[0];
      const dateMatch = value.match(/\b\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4}\b/);
      return dateMatch ? dateMatch[0] : "";
    }

    function formatInvoiceImportLine(row) {
      const lineTotal = row.lineTotal != null ? `, ${row.lineTotal}` : "";
      const vatAmount = row.vatAmount != null ? `, ${row.vatAmount}` : "";
      return `${row.raw}, ${row.qty}, ${row.unit}, ${row.unitPrice}${lineTotal}${vatAmount}`;
    }

    function setInvoiceSearch(value) {
      invoiceSearch = value || "";
      const table = document.getElementById("invoiceTableWrap");
      if (table) table.innerHTML = invoiceTable();
      const badge = document.querySelector("#invoices .card:nth-child(2) .card-head .badge");
      if (badge) badge.textContent = `${filteredInvoices().length} of ${state.invoices.length} batches`;
    }

    function filteredInvoices() {
      const q = invoiceSearch.trim().toLowerCase();
      if (!q) return state.invoices;
      return state.invoices.filter(invoice => invoiceMatchesSearch(invoice, q));
    }

    function invoiceMatchesSearch(invoice, query) {
      return invoiceSearchText(invoice).includes(query)
        || stockSearchTokens(query).some(token => invoiceSearchText(invoice).includes(token));
    }

    function invoiceSearchText(invoice) {
      const rowText = invoiceLines(invoice).map(row => {
        const stock = row.stockId ? state.stock.find(item => item.id === row.stockId) : null;
        const suggested = row.suggestedStockId ? state.stock.find(item => item.id === row.suggestedStockId) : null;
        return [
          row.raw,
          row.unit,
          row.stockStatus,
          row.reviewMessage,
          stock?.name,
          suggested?.name
        ].filter(Boolean).join(" ");
      }).join(" ");
      return [
        invoice.name,
        invoice.supplier,
        invoice.date,
        invoice.invoiceNumber,
        rowText
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function invoiceTable(invoices = filteredInvoices()) {
      if (!state.invoices.length) return `<div class="empty">No invoices imported yet.</div>`;
      if (!invoices.length) return `<div class="empty">No invoices match that search.</div>`;
      return `<div class="invoice-history-list">${invoices.map(invoiceRows).join("")}</div>`;
    }

    function invoiceRows(inv) {
      const rows = invoiceLines(inv);
      const totalExclVat = invoiceTotalExclVat(inv);
      const totalInclVat = invoiceTotalInclVat(inv);
      const isOpen = expandedInvoiceId === inv.id;
      const reviewCount = rows.filter(invoiceRowNeedsReview).length;
      const statusLabel = reviewCount ? `${reviewCount} review` : "Confirmed";
      const statusClass = reviewCount ? "amber" : "green";
      return `
        <div class="invoice-history-row ${isOpen ? "open" : ""}">
          <div class="invoice-history-summary" onclick="toggleInvoice('${escapeAttr(inv.id)}')" title="Click to ${isOpen ? "hide" : "show"} invoice items">
            <div class="invoice-status-dot ${reviewCount ? "warning" : ""}">${miniIcon("check")}</div>
            <div>
              <div class="invoice-history-name">${escapeHtml(inv.name)}</div>
              <div class="invoice-history-meta">${rows.length} items · ${escapeHtml(inv.date || "-")} · ${money(totalInclVat)}</div>
            </div>
            <span class="badge ${statusClass}">${statusLabel}</span>
            <button class="btn secondary icon invoice-toggle" onclick="event.stopPropagation(); toggleInvoice('${escapeAttr(inv.id)}')" title="${isOpen ? "Hide items" : "Show items"}">${miniIcon(isOpen ? "chevronDown" : "chevronRight")}</button>
            <button class="btn danger icon" title="Delete invoice" onclick="event.stopPropagation(); deleteInvoice('${escapeAttr(inv.id)}')">${miniIcon("trash")}</button>
          </div>
          ${isOpen ? invoiceDetailRow(inv, rows) : ""}
        </div>
      `;
    }

    function invoiceDetailRow(inv, rows) {

              <tbody>
                ${rows.length ? rows.map((row, rowIndex) => `

                <tr><td colspan="4"><strong>VAT</strong></td><td class="num"><strong>${money(vatTotal)}</strong></td><td></td><td></td><td></td></tr>
                <tr><td colspan="5"><strong>Total incl VAT</strong></td><td class="num"><strong>${money(totalInclVat)}</strong></td><td></td><td></td></tr>

              <div class="field"><label>Unit</label><select id="invoiceAddUnit-${escapeAttr(inv.id)}">${unitOptions("KG")}</select></div>
              <div class="field"><label>Unit price</label><input id="invoiceAddPrice-${escapeAttr(inv.id)}" type="number" step="0.01" placeholder="0.00"></div>
