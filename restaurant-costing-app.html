<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recipe Vault</title>
  <style>
    :root {
      --bg: #1B1B1B;
      --graphite: #2A2A2A;
      --panel: rgba(42, 42, 42, .82);
      --panel-solid: #2A2A2A;
      --panel-soft: #333230;
      --ink: #F5F5F3;
      --muted: #A8A8A3;
      --faint: #7D7D78;
      --line: rgba(245, 245, 243, .10);
      --brand: #3B6EA5;
      --brand-dark: #315E8C;
      --accent: #D4AF37;
      --accent-soft: rgba(212, 175, 55, .14);
      --green: #6FA67A;
      --blue: #3B6EA5;
      --red: #C94F4F;
      --amber: #E6A23C;
      --soft: rgba(245, 245, 243, .06);
      --shadow: 0 18px 46px rgba(0, 0, 0, .28);
      --shadow-soft: 0 10px 24px rgba(0, 0, 0, .20);
      --glow-blue: 0 0 0 1px rgba(59, 110, 165, .26), 0 16px 36px rgba(59, 110, 165, .10);
      --glow-gold: 0 0 0 1px rgba(212, 175, 55, .24), 0 16px 34px rgba(212, 175, 55, .10);
      font-family: Inter, Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: rgba(245, 245, 243, .035); }
    *::-webkit-scrollbar-thumb {
      background: rgba(184, 184, 184, .22);
      border: 2px solid rgba(27, 27, 27, .88);
      border-radius: 999px;
    }
    *::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, .42); }
    ::selection { background: rgba(59, 110, 165, .38); color: var(--ink); }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% -10%, rgba(111, 166, 122, .11), transparent 28rem),
        radial-gradient(circle at 88% 8%, rgba(212, 175, 55, .07), transparent 24rem),
        linear-gradient(180deg, #202020 0%, #1B1B1B 42%, #171717 100%),
        var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 260px 1fr; }
    .sidebar {
      background: rgba(27, 27, 27, .72);
      color: var(--ink);
      padding: 28px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      box-shadow: 18px 0 42px rgba(0, 0, 0, .20);
      backdrop-filter: blur(18px);
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 12px 24px rgba(111, 166, 122, .12);
    }
    .brand h1 { font-size: 18px; margin: 0; letter-spacing: 0; font-weight: 750; }
    .brand p { color: var(--faint); margin: 2px 0 0; font-size: 12px; }
    .nav { display: grid; gap: 8px; }
    .nav button {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      text-align: left;
      width: 100%;
      transition: background .16s ease, color .16s ease, border-color .16s ease;
    }
    .nav button.active, .nav button:hover {
      background: rgba(59, 110, 165, .14);
      border-color: rgba(59, 110, 165, .30);
      box-shadow: var(--glow-blue);
      color: white;
    }
    .nav svg { width: 18px; height: 18px; }
    .usage-card {
      margin-top: 26px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(56, 56, 56, .58);
      backdrop-filter: blur(14px);
    }
    .usage-card p { margin: 0; color: var(--faint); font-size: 12px; }
    .usage-card strong { display: block; color: white; margin-top: 4px; }
    .bar { height: 6px; background: rgba(255,255,255,.12); border-radius: 999px; overflow: hidden; margin-top: 12px; }
    .bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); }
    main { padding: 34px; max-width: 1400px; width: 100%; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; margin-bottom: 28px; }
    .topbar h2 { font-size: 34px; margin: 0 0 8px; letter-spacing: 0; font-family: Inter, Manrope, "SF Pro Display", sans-serif; font-weight: 800; line-height: 1.05; }
    .topbar p { margin: 0; color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 13px;
      background: var(--panel);
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
    }
    .grid { display: grid; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card {
      background: linear-gradient(180deg, rgba(42, 42, 42, .88), rgba(38, 38, 38, .80));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }
    .card:hover { border-color: rgba(245, 245, 243, .15); box-shadow: 0 20px 56px rgba(0, 0, 0, .34); }
    .card-head {
      padding: 17px 19px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(245, 245, 243, .03);
    }
    .card-head h3 { margin: 0; font-size: 16px; font-weight: 760; }
    .card-head select { width: auto; min-width: 140px; min-height: 34px; padding: 7px 9px; }
    .card-body { padding: 19px; }
    .metric { padding: 18px; }
    .metric span { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0; font-weight: 760; }
    .metric strong { display: block; font-size: 28px; margin-top: 8px; font-family: "IBM Plex Sans", "JetBrains Mono", "SF Mono", ui-monospace, monospace; font-weight: 760; }
    .metric small { color: var(--muted); }
    .btn {
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(59, 110, 165, .96), rgba(49, 94, 140, .96));
      color: white;
      padding: 10px 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      min-height: 40px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 10px 22px rgba(59, 110, 165, .12);
      transition: background .16s ease, border-color .16s ease, color .16s ease, transform .16s ease, box-shadow .16s ease;
    }
    .btn:hover { background: var(--brand-dark); border-color: rgba(59, 110, 165, .70); transform: translateY(-1px); box-shadow: var(--glow-blue); }
    .btn.secondary { background: rgba(245, 245, 243, .07); color: var(--ink); border: 1px solid var(--line); }
    .btn.secondary:hover { background: rgba(245, 245, 243, .10); border-color: rgba(245, 245, 243, .17); }
    .btn.danger { background: rgba(201, 79, 79, .12); color: #f0a2a2; border: 1px solid rgba(201, 79, 79, .34); }
    .btn.icon { width: 38px; padding: 0; }
    .btn.compact {
      min-height: 30px;
      padding: 6px 9px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 760;
    }
    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      pointer-events: none;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 700; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 27, 27, .58);
      padding: 10px 11px;
      color: var(--ink);
      min-height: 40px;
      box-shadow: inset 0 1px 0 rgba(245,245,243,.035);
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    input::placeholder, textarea::placeholder { color: var(--faint); }
    input:focus, select:focus, textarea:focus {
      outline: none;
      background: rgba(42, 42, 42, .88);
      border-color: rgba(59, 110, 165, .72);
      box-shadow: 0 0 0 3px rgba(59, 110, 165, .14);
    }
    textarea { min-height: 116px; resize: vertical; }
    input[type="file"] {
      padding: 5px;
      color: var(--muted);
    }
    input[type="file"]::file-selector-button {
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(59, 110, 165, .96), rgba(49, 94, 140, .96));
      color: white;
      padding: 8px 12px;
      margin-right: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease;
    }
    input[type="file"]::file-selector-button:hover {
      background: var(--brand-dark);
      border-color: rgba(59, 110, 165, .70);
    }
    select option { background: var(--graphite); color: var(--ink); }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 27, 27, .20);
      box-shadow: inset 0 1px 0 rgba(245, 245, 243, .025);
    }
    .table-wrap table { overflow: hidden; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    th, td { padding: 12px 11px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0; font-weight: 760; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tr:last-child td { border-bottom: 0; }
    tbody tr { transition: background .16s ease; }
    tbody tr:hover td { background: rgba(245, 245, 243, .032); }
    .invoice-summary-row { cursor: pointer; }
    .invoice-summary-row:hover td { background: rgba(59, 110, 165, .08); }
    .invoice-summary-row.open td { background: var(--accent-soft); }
    .invoice-toggle {
      width: 30px;
      min-height: 30px;
      height: 30px;
      color: var(--muted);
    }
    .invoice-toggle svg {
      width: 14px;
      height: 14px;
    }
    .invoice-detail-cell {
      background: rgba(27, 27, 27, .34);
      padding: 14px;
    }
    .invoice-capture-card .card-body {
      display: grid;
      gap: 14px;
    }
    .invoice-dropzone {
      border: 1px dashed rgba(230, 162, 60, .42);
      border-radius: 8px;
      min-height: 210px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      background: rgba(245, 245, 243, .025);
      transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .invoice-dropzone:hover,
    .invoice-dropzone.dragging {
      border-color: rgba(212, 175, 55, .76);
      background: rgba(212, 175, 55, .06);
      box-shadow: var(--glow-gold);
    }
    .invoice-processing {
      display: none;
      gap: 12px;
      border: 1px solid rgba(212, 175, 55, .24);
      border-radius: 8px;
      padding: 13px;
      background: linear-gradient(180deg, rgba(212, 175, 55, .075), rgba(245, 245, 243, .028));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
    }
    .invoice-processing.active {
      display: grid;
    }
    .invoice-processing-main {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }
    .processing-spinner {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 2px solid rgba(212, 175, 55, .18);
      border-top-color: var(--gold);
      animation: processingSpin .9s linear infinite;
      flex: 0 0 auto;
    }
    .invoice-processing.done .processing-spinner {
      animation: none;
      border-color: rgba(111, 166, 122, .45);
      background: rgba(111, 166, 122, .18);
    }
    .invoice-processing.failed .processing-spinner {
      animation: none;
      border-color: rgba(201, 79, 79, .45);
      background: rgba(201, 79, 79, .15);
    }
    @keyframes processingSpin {
      to { transform: rotate(360deg); }
    }
    .invoice-processing-title {
      display: block;
      color: var(--ink);
      font-weight: 780;
      font-size: 14px;
    }
    .invoice-processing-message {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .invoice-processing-steps {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 6px;
    }
    .invoice-processing-steps span {
      min-width: 0;
      padding: 6px 7px;
      border-radius: 999px;
      border: 1px solid rgba(245, 245, 243, .08);
      background: rgba(27, 27, 27, .38);
      color: var(--muted-2);
      font-size: 11px;
      font-weight: 760;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .invoice-processing-steps span.done {
      color: #dff3e1;
      border-color: rgba(111, 166, 122, .30);
      background: rgba(111, 166, 122, .14);
    }
    .invoice-processing-steps span.active {
      color: #17130a;
      border-color: rgba(212, 175, 55, .58);
      background: rgba(212, 175, 55, .88);
      box-shadow: 0 0 18px rgba(212, 175, 55, .18);
    }
    .drop-icon {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      display: inline-grid;
      place-items: center;
      color: var(--amber);
      background: rgba(230, 162, 60, .10);
      margin-bottom: 14px;
    }
    .drop-icon svg {
      width: 24px;
      height: 24px;
    }
    .drop-title {
      margin: 0;
      color: var(--ink);
      font-weight: 760;
    }
    .drop-subtitle {
      margin: 6px 0 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .invoice-file-input {
      display: none;
    }
    .invoice-capture-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .invoice-preflight-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, .45fr);
      gap: 12px;
    }
    .invoice-capture-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }
    .invoice-capture-meta input {
      width: auto;
      min-width: 220px;
      min-height: 32px;
      padding: 6px 9px;
      font-size: 12px;
      background: rgba(27, 27, 27, .30);
    }
    .invoice-manual-text {
      min-height: 90px;
    }
    .invoice-history-list {
      display: grid;
      gap: 10px;
    }
    .invoice-history-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(42, 42, 42, .72);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }
    .invoice-history-summary {
      display: grid;
      grid-template-columns: 34px 1fr auto auto auto;
      gap: 12px;
      align-items: center;
      padding: 13px 16px;
      cursor: pointer;
    }
    .invoice-history-summary:hover {
      background: rgba(245, 245, 243, .035);
    }
    .invoice-status-dot {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--green);
      background: rgba(111, 166, 122, .17);
      border: 1px solid rgba(111, 166, 122, .28);
    }
    .invoice-status-dot.warning {
      color: var(--amber);
      background: rgba(230, 162, 60, .15);
      border-color: rgba(230, 162, 60, .28);
    }
    .invoice-status-dot svg {
      width: 15px;
      height: 15px;
    }
    .invoice-history-name {
      font-weight: 780;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .invoice-history-meta {
      color: var(--muted);
      font-size: 12px;
    }
    .invoice-history-detail {
      border-top: 1px solid var(--line);
      padding: 14px 16px 16px;
      background: rgba(27, 27, 27, .18);
    }
    .invoice-line-table {
      background: rgba(42, 42, 42, .72);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .invoice-line-table table { min-width: 620px; }
    .stock-edit { min-width: 1180px; }
    .stock-edit input, .stock-edit select { padding: 8px 9px; border-radius: 6px; min-height: 34px; }
    .stock-name-input { min-width: 220px; }
    .stock-unit-input { min-width: 112px; }
    .stock-price-input, .stock-qty-input, .stock-par-input { width: 96px; text-align: right; }
    .stock-category-input { min-width: 150px; }
    .sheet-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
    .sheet-note { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .period-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .period-control select {
      min-height: 32px;
      width: auto;
      min-width: 138px;
      padding: 6px 9px;
    }
    .supplier-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 18px;
      background: rgba(42, 42, 42, .78);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }
    .supplier-title {
      padding: 12px 16px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      background: rgba(245, 245, 243, .03);
      border-bottom: 1px solid var(--line);
    }
    .unit-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
    }
    .stock-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .stock-actions .btn.icon {
      width: 30px;
      min-height: 30px;
      height: 30px;
    }
    .stock-actions svg {
      width: 14px;
      height: 14px;
    }
    .row-action {
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }
    tr:hover .row-action,
    tr:focus-within .row-action {
      opacity: 1;
      pointer-events: auto;
    }
    .stock-focused .row-action {
      opacity: 1;
      pointer-events: auto;
    }
    .btn.edit { background: linear-gradient(180deg, rgba(212, 175, 55, .94), rgba(164, 128, 44, .94)); border-color: rgba(212, 175, 55, .66); color: #17130a; }
    .btn.save { background: linear-gradient(180deg, rgba(111, 166, 122, .96), rgba(82, 130, 92, .96)); border-color: rgba(111, 166, 122, .72); color: #07140a; }
    .btn.return-highlight {
      animation: returnPulse 1.2s ease-in-out 3;
      box-shadow: 0 0 0 3px rgba(182, 138, 76, .20);
    }
    .return-anchor-highlight {
      animation: returnAnchorPulse 1.35s ease-in-out 2;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, .30), 0 0 22px rgba(212, 175, 55, .18);
    }
    @keyframes returnPulse {
      0%, 100% { transform: translateY(0); box-shadow: 0 0 0 3px rgba(182, 138, 76, .18); }
      50% { transform: translateY(-1px); box-shadow: 0 0 0 7px rgba(182, 138, 76, .24); }
    }
    @keyframes returnAnchorPulse {
      0%, 100% { outline: 1px solid rgba(212, 175, 55, .05); }
      50% { outline: 1px solid rgba(212, 175, 55, .70); }
    }
    .stock-focused td {
      background: var(--accent-soft);
      box-shadow: inset 3px 0 0 var(--amber);
    }
    .stock-link {
      border: 1px solid rgba(212, 175, 55, .34);
      cursor: pointer;
      font: inherit;
    }
    .stock-link:hover { background: var(--accent-soft); }
    .stock-focus-note { margin-bottom: 14px; }
    .stock-focus-note .split { margin-top: 10px; }
    .invoice-review-list {
      display: grid;
      gap: 10px;
    }
    .invoice-review-item {
      display: grid;
      grid-template-columns: 1.5fr 1fr .7fr 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(42, 42, 42, .78);
      box-shadow: var(--shadow-soft);
    }
    .invoice-review-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .invoice-review-actions .btn,
    .invoice-line-status .btn {
      min-height: 30px;
      padding: 6px 9px;
      font-size: 12px;
      border-radius: 7px;
    }
    .invoice-line-status {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .upload-dropzone {
      margin-top: 14px;
      min-height: 230px;
      border: 1px dashed rgba(212, 175, 55, .42);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(47, 47, 47, .78), rgba(36, 36, 36, .82));
      display: grid;
      place-items: center;

      link.href = url;

    function restoreBackupFile(input) {
      const file = input.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const restored = JSON.parse(String(reader.result || ""));
          if (!restored || !Array.isArray(restored.recipes) || !restored.restaurant) {
            alert("That file does not look like a Recipe Vault backup.");
            return;
          }
          if (!confirm("Restore this backup? Current local data will be replaced.")) return;
          state = restored;
          ensureStateShape();
          state.backups.lastRestoreAt = new Date().toISOString();
          addImportLog("backup_restored", { fileName: file.name, restaurant: state.restaurant?.name || "" });
          saveState();
          renderNav();
          renderPage();
          alert("Backup restored.");
        } catch (error) {
          alert("Recipe Vault could not read that backup file.");
        } finally {
          input.value = "";
        }
      };
      reader.readAsText(file);
    }

    function currentMonthKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }

    function monthKeyFromDate(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const iso = text.match(/\b(20\d{2})[\/.-](\d{1,2})[\/.-]\d{1,2}\b/);
      if (iso) return `${iso[1]}-${iso[2].padStart(2, "0")}`;
      const local = text.match(/\b(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})\b/);
      if (local) {
        const year = local[3].length === 2 ? `20${local[3]}` : local[3];
        return `${year}-${local[2].padStart(2, "0")}`;
      }
      return "";
    }

    function monthLabel(key) {
      const match = String(key || "").match(/^(\d{4})-(\d{2})$/);
      if (!match) return key || "Unknown month";
      const date = new Date(Number(match[1]), Number(match[2]) - 1, 1);
      return date.toLocaleDateString("en-ZA", { month: "long", year: "numeric" });
    }

    function cloneStockForNewMonth(stock) {
      return (stock || []).map(item => ({
        ...item,
        qty: 0,
        invoiceQty: 0,
        lastInvoice: ""
      }));
    }

    function latestMonthKey() {
      return Object.keys(state.months || {}).sort().at(-1) || currentMonthKey();
    }

    function ensureMonthPeriod(month) {
      const monthKey = month || currentMonthKey();
      if (!state.months) state.months = {};
      if (state.months[monthKey]) return;
      const sourcePeriod = state.months[state.activeMonth] || state.months[latestMonthKey()] || {};
      state.months[monthKey] = {
        stock: cloneStockForNewMonth(sourcePeriod.stock || state.stock || []),
        invoices: []
      };
    }

    function persistActiveMonth() {
      if (!state?.months || !state.activeMonth) return;
      if (!state.months[state.activeMonth]) state.months[state.activeMonth] = { stock: [], invoices: [] };
      state.months[state.activeMonth].stock = state.stock || [];
      state.months[state.activeMonth].invoices = state.invoices || [];
    }

    function ensureMonthlyDatabase() {
      const todayKey = currentMonthKey();
      const startingMonth = state.activeMonth || todayKey;
      if (!state.months || Array.isArray(state.months)) {
        state.months = {
          [startingMonth]: {
            stock: Array.isArray(state.stock) ? state.stock : [],
            invoices: Array.isArray(state.invoices) ? state.invoices : []
          }
        };
      }

      if (!state.months[todayKey]) {
        ensureMonthPeriod(todayKey);
        state.activeMonth = todayKey;
      }

      if (!state.activeMonth || !state.months[state.activeMonth]) state.activeMonth = todayKey;
      const activePeriod = state.months[state.activeMonth] || { stock: [], invoices: [] };
      if (!Array.isArray(activePeriod.stock)) activePeriod.stock = [];
      if (!Array.isArray(activePeriod.invoices)) activePeriod.invoices = [];
      state.stock = activePeriod.stock;
      state.invoices = activePeriod.invoices;
    }

    function parseUnitSize(unit) {
      const raw = String(unit || "").trim().toLowerCase();
      const normalized = raw.replace(/\s+/g, "");
      const match = normalized.match(/^([\d.]+)?(kg|g|ltr|lt|l|ml|each|pkt|box|tin|bttl|tray|tub|pun|bunch|bag|shaker)$/);
      if (!match) return { qty: 1, base: raw };
      const qty = Number(match[1] || 1);
      let base = match[2];
      if (base === "lt" || base === "l") base = "ltr";
      return { qty, base };
    }

    function stockUnitsForRecipeUnit(stockUnit, recipeUnit) {
      const stockSize = parseUnitSize(stockUnit);
      const recipeSize = parseUnitSize(recipeUnit);
      const recipeBase = recipeSize.base;

      if (stockSize.base === "kg" && recipeBase === "g") return stockSize.qty * 1000;
      if (stockSize.base === "g" && recipeBase === "g") return stockSize.qty;
      if (stockSize.base === "ltr" && recipeBase === "ml") return stockSize.qty * 1000;
      if (stockSize.base === "ml" && recipeBase === "ml") return stockSize.qty;
      if (stockSize.base === recipeBase) return stockSize.qty;
      if (!unitsCanConvert(stockSize.base, recipeBase)) return 0;
      return 1;
    }

    function stockUnitsForIngredient(stock, recipeUnit) {
      if (!stock) return 0;
      const directUnits = stockUnitsForRecipeUnit(stock.unit, recipeUnit);
      const packUnits = stockPackUnitsForRecipeUnit(stock, recipeUnit);
      if (packUnits && (!directUnits || shouldPreferExplicitPackSize(stock, directUnits, recipeUnit))) return packUnits;
      if (directUnits) return directUnits;
      return packUnits;
    }

    function shouldPreferExplicitPackSize(stock, directUnits, recipeUnit = "") {
      const text = `${stock?.unit || ""} ${stock?.name || ""}`;
      const recipeSize = parseUnitSize(recipeUnit);
      const explicit = explicitPackSizeFromStock(stock, recipeSize.base);
      const explicitUnits = explicit ? convertPackSizeToRecipeUnits(explicit, recipeSize) : 0;
      if (explicitUnits && Math.abs(Number(explicitUnits) - Number(directUnits || 0)) > 0.001) return true;
      return directUnits === 1 && /\b(?:pkt|pack|packet|box)\s*(?:of)?\s*\d+\b/i.test(text);
    }

    function stockPackUnitsForRecipeUnit(stock, recipeUnit) {
      const recipeSize = parseUnitSize(recipeUnit);
      const packSize = explicitPackSizeFromStock(stock, recipeSize.base);
      if (packSize) return convertPackSizeToRecipeUnits(packSize, recipeSize);

      const unitBase = parseUnitSize(stock?.unit).base;
      if (recipeSize.base === "g" && unitBase === "pun") return 250 / recipeSize.qty;
      if (recipeSize.base === "kg" && unitBase === "pun") return 0.25 / recipeSize.qty;
      return 0;
    }

    function explicitPackSizeFromStock(stock, recipeBase) {
      const text = `${stock?.unit || ""} ${stock?.name || ""}`.toLowerCase();
      if (recipeBase === "g" || recipeBase === "kg") {
        const mass = text.match(/(\d+(?:[.,]\d+)?)\s*(kg|g)\b/i);
        return mass ? { qty: Number(mass[1].replace(",", ".")), base: mass[2].toLowerCase() } : null;
      }
      if (recipeBase === "ml" || recipeBase === "ltr") {
        const volume = text.match(/(\d+(?:[.,]\d+)?)\s*(ltr|lt|l|ml)\b/i);
        if (!volume) return null;
        const base = /^(ltr|lt|l)$/i.test(volume[2]) ? "ltr" : "ml";
        return { qty: Number(volume[1].replace(",", ".")), base };
      }
      if (recipeBase === "each") {
        const packCount = text.match(/\b(?:pkt|pack|packet|box)\s*(?:of)?\s*(\d+)\b/i) || text.match(/\b(\d+)\s*(?:pc|pcs|pieces|sheets|units)\b/i);
        return packCount ? { qty: Number(packCount[1]), base: "each" } : null;
      }
      return null;
    }

    function convertPackSizeToRecipeUnits(packSize, recipeSize) {
      if (!packSize?.qty || !recipeSize?.qty) return 0;
      if (packSize.base === recipeSize.base) return packSize.qty / recipeSize.qty;
      if (packSize.base === "kg" && recipeSize.base === "g") return packSize.qty * 1000 / recipeSize.qty;
      if (packSize.base === "g" && recipeSize.base === "kg") return packSize.qty / 1000 / recipeSize.qty;
      if (packSize.base === "ltr" && recipeSize.base === "ml") return packSize.qty * 1000 / recipeSize.qty;
      if (packSize.base === "ml" && recipeSize.base === "ltr") return packSize.qty / 1000 / recipeSize.qty;
      return 0;
    }

    function stockUnitsForCostingIngredient(stock, recipeUnit, ingredientName = "") {
      const directUnits = stockUnitsForIngredient(stock, recipeUnit);
      if (directUnits) return directUnits;

      const recipeSize = parseUnitSize(recipeUnit);
      const stockBase = parseUnitSize(stock?.unit).base;
      const stockText = `${stock?.name || ""} ${stock?.unit || ""}`;
      const ingredientText = `${ingredientName || ""} ${stock?.name || ""}`;
      const mass = new Set(["kg", "g"]);
      const volume = new Set(["ltr", "ml"]);
      const count = new Set(["each", "pkt", "box", "tin", "bttl", "tray", "tub", "pun", "bunch", "bag", "shaker"]);

      if (isLiquidLikeIngredient(ingredientText) && mass.has(recipeSize.base) && volume.has(stockBase)) {
        const volumeRecipeUnit = recipeSize.base === "kg" ? "ltr" : "ml";
        return stockUnitsForIngredient(stock, volumeRecipeUnit) / Number(recipeSize.qty || 1);
      }

      if (isLiquidLikeIngredient(ingredientText) && volume.has(recipeSize.base) && mass.has(stockBase)) {
        const massRecipeUnit = recipeSize.base === "ltr" ? "kg" : "g";
        return stockUnitsForIngredient(stock, massRecipeUnit) / Number(recipeSize.qty || 1);
      }

      if (mass.has(recipeSize.base) && count.has(stockBase)) {
        const grams = inferredCountItemWeightGrams(ingredientText, stockText);
        if (grams) {
          return recipeSize.base === "kg" ? grams / 1000 / Number(recipeSize.qty || 1) : grams / Number(recipeSize.qty || 1);
        }
      }

      return 0;
    }

    function isLiquidLikeIngredient(value) {
      return /\b(soy|soya|kikkoman|sauce|vinegar|oil|juice|mirin|water|milk|cream|mayo|mayonnaise|dressing|teriyaki|ponzu|syrup|stock|wine|brandy)\b/i.test(String(value || ""));
    }

    function inferredCountItemWeightGrams(ingredientText, stockText = "") {
      const text = `${ingredientText || ""} ${stockText || ""}`;
      const explicit = text.match(/(\d+(?:[.,]\d+)?)\s*(kg|g)\b/i);
      if (explicit) {
        const qty = Number(explicit[1].replace(",", "."));
        return /^kg$/i.test(explicit[2]) ? qty * 1000 : qty;
      }
      if (/\bspring\s+onion\b/i.test(text)) return 100;
      if (/\bavo(?:cado)?\b/i.test(text)) return 180;
      if (/\bcucumber\b/i.test(text)) return 300;
      if (/\blemon\b/i.test(text)) return 90;
      if (/\blime\b/i.test(text)) return 60;
      if (/\begg\b/i.test(text)) return 50;
      if (/\bpineapple\b/i.test(text)) return 900;
      if (/\bmelon|spanspek\b/i.test(text)) return 1200;
      return 0;
    }

    function unitsCanConvert(stockBase, recipeBase) {
      const mass = new Set(["kg", "g"]);
      const volume = new Set(["ltr", "ml"]);
      const count = new Set(["each", "pkt", "box", "tin", "bttl", "tray", "tub", "pun", "bunch", "bag", "shaker"]);
      if (!stockBase || !recipeBase) return true;
      if (mass.has(stockBase) && mass.has(recipeBase)) return true;
      if (volume.has(stockBase) && volume.has(recipeBase)) return true;
      if (count.has(stockBase) && count.has(recipeBase)) return true;
      if ((mass.has(stockBase) || volume.has(stockBase) || count.has(stockBase)) &&
          (mass.has(recipeBase) || volume.has(recipeBase) || count.has(recipeBase))) return false;
      return true;
    }

    function unitCost(ingredient) {
      return ingredientCostWithPrepContext(ingredient, new Set());
    }

    function isNoCostIngredient(name) {
      return /\bwater\b/i.test(String(name || ""));
    }

    function ingredientCostWithPrepContext(ingredient, visitedPrepIds = new Set()) {
      const ingredientUnit = resolveRecipeIngredientUnit(ingredient);
      if (isNoCostIngredient(ingredient?.ingredient)) return 0;
      const stock = findStockForCostingIngredient(ingredient);
      const prep = findPrepForCostingIngredient(ingredient, stock);
      if (prep) {
        if (visitedPrepIds.has(prep.id)) return null;
        const nextVisited = new Set(visitedPrepIds);
        nextVisited.add(prep.id);
        const batchCost = prepItemCost(prep, nextVisited);
        if (batchCost == null) return null;
        const prepQtyForRecipeUnit = prepYieldUnitsForRecipeUnit(prep, ingredientUnit);
        if (!prepQtyForRecipeUnit) return null;
        return (Number(ingredient.qty || 0) / prepQtyForRecipeUnit) * batchCost;
      }

      if (!stock || !Number(stock.unitPrice)) return null;
      const stockQtyForRecipeUnit = stockUnitsForCostingIngredient(stock, ingredientUnit, ingredient?.ingredient);
      if (!stockQtyForRecipeUnit) return null;
      return (Number(ingredient.qty || 0) / stockQtyForRecipeUnit) * stock.unitPrice;
    }

    function recipeCost(recipe) {
      return recipe.ingredients.reduce((sum, ing) => sum + (unitCost(ing) || 0), 0);

    function theoreticalUsage(salesRows) {
      const usage = {};
      salesRows.forEach(row => {
        const recipe = state.recipes.find(r => r.id === row.recipeId);
        if (!recipe) return;
        recipe.ingredients.forEach(ing => {
          expandedUsageForIngredient({
            ingredient: ing.ingredient,
            qty: ing.qty * row.qty,
            unit: ing.unit
          }).forEach(item => {
            const key = item.ingredient + "|" + item.unit;
            if (!usage[key]) usage[key] = { ingredient: item.ingredient, unit: item.unit, qty: 0 };
            usage[key].qty += item.qty;
          });
        });
      });
      return Object.values(usage);
    }

    function expandedUsageForIngredient(ingredient, visitedPrepIds = new Set()) {
      const prep = findPrepForCostingIngredient(ingredient);
      const ingredientUnit = resolveRecipeIngredientUnit(ingredient);
      if (!prep || visitedPrepIds.has(prep.id)) return [{ ...ingredient, unit: ingredientUnit }];
      const yieldQtyForRecipeUnit = prepYieldUnitsForRecipeUnit(prep, ingredientUnit);
      if (!yieldQtyForRecipeUnit) return [{ ...ingredient, unit: ingredientUnit }];

      const factor = Number(ingredient.qty || 0) / yieldQtyForRecipeUnit;
      const nextVisited = new Set(visitedPrepIds);
      nextVisited.add(prep.id);

      return (prep.ingredients || []).flatMap(component => expandedUsageForIngredient({
        ingredient: component.ingredient,
        qty: Number(component.qty || 0) * factor,
        unit: resolvePrepIngredientUnit(component)
      }, nextVisited));
    }

    function operationsDefaultAnswer() {
      const stats = operationsKnowledgeStats();
      return `
        <strong>Operations Manager is ready.</strong>

    function operationsAnswer(query) {
      const q = String(query || "").toLowerCase();
      if (/\binvoice|unknown|link|supplier|capture\b/.test(q)) return operationsInvoiceAnswer();
      if (/\bmissing|no price|stock price|unpriced\b/.test(q)) return operationsMissingPriceAnswer();
      if (/\bfood cost|margin|profit|expensive|high cost\b/.test(q)) return operationsFoodCostAnswer();
      if (/\blow stock|par|order|ordering\b/.test(q)) return operationsLowStockAnswer();
      if (/\brule|procedure|sop|policy|how do we\b/.test(q)) return operationsProcedureAnswer();
      return operationsSearchAnswer(query);
    }

    function operationsInvoiceAnswer() {
      const reviews = invoiceReviewItems();
      if (!reviews.length) return `<strong>Invoice review is clear.</strong><p>No unknown or suggested invoice items are waiting for approval.</p>`;
      return `
        <strong>${reviews.length} invoice item${reviews.length === 1 ? "" : "s"} need review.</strong>
        <ul>
          ${reviews.slice(0, 8).map(({ invoice, row }) => `<li><strong>${escapeHtml(row.raw)}</strong> from ${escapeHtml(invoice.supplier || "Unknown supplier")} - ${escapeHtml(row.reviewMessage || "Choose a stock item.")}</li>`).join("")}

        <p>Open the Stock Sheet and use Invoice Stock Review to link or add these items.</p>

    }

    function operationsMissingPriceAnswer() {
      const missing = missingCostIngredients();
      if (!missing.length) return `<strong>Recipe prices look covered.</strong><p>I did not find recipe or prep ingredients missing a usable stock price.</p>`;
      return `
        <strong>${missing.length} ingredient${missing.length === 1 ? "" : "s"} need price attention.</strong>

    function operationsFoodCostAnswer() {
      const rows = state.recipes.map(recipe => {
        const cost = recipeCost(recipe);
        const pct = recipe.sellingPrice ? cost / recipe.sellingPrice * 100 : 0;
        return { recipe, cost, pct };
      }).sort((a, b) => b.pct - a.pct);
      const high = rows.filter(row => row.pct >= 35 || !row.recipe.sellingPrice).slice(0, 8);
      if (!high.length) return `<strong>Food cost looks healthy.</strong><p>No recipes are currently above 35% food cost based on the stock prices in the app.</p>`;
      return `
        <strong>Highest food-cost recipes:</strong>
        <ul>${high.map(row => `<li><strong>${escapeHtml(row.recipe.name)}</strong> - ${row.pct.toFixed(1)}% food cost, ${money(row.cost)} cost, ${money(row.recipe.sellingPrice)} selling price</li>`).join("")}</ul>
        <p>Check missing stock prices first; then review selling price or expensive ingredients.</p>
      `;
    }

    function operationsLowStockAnswer() {
      const low = state.stock
        .filter(item => Number(item.par || 0) > 0 && Number(item.qty || 0) <= Number(item.par || 0))
        .sort((a, b) => Number(a.qty || 0) - Number(b.qty || 0));
      if (!low.length) return `<strong>No low-stock alerts.</strong><p>No stocked item with a par level is currently at or below par.</p>`;
      return `
        <strong>${low.length} item${low.length === 1 ? "" : "s"} are at or below par.</strong>
        <ul>${low.slice(0, 10).map(item => `<li><strong>${escapeHtml(item.name)}</strong> - ${formatStockQty(item)} on hand, par ${Number(item.par || 0).toFixed(2)} ${escapeHtml(item.unit)}</li>`).join("")}</ul>
      `;
    }

    function operationsProcedureAnswer() {
      const notes = [...state.operationsModel.procedures, ...state.operationsModel.memoryNotes];
      if (!notes.length) return `<strong>No restaurant procedures saved yet.</strong><p>Add SOPs, rules, and supplier language in Teach This Restaurant Copy.</p>`;
      return `
        <strong>Saved restaurant procedures and rules:</strong>
        <ul>${notes.slice(-10).map(note => `<li>${escapeHtml(note)}</li>`).join("")}</ul>
      `;
    }

    function operationsSearchAnswer(query) {
      const tokens = stockMatchTokens(query);
      const recipes = state.recipes.filter(recipe => {
        const haystack = `${recipe.name} ${recipeCategory(recipe)} ${(recipe.ingredients || []).map(item => item.ingredient).join(" ")}`.toLowerCase();
        return tokens.length ? tokens.some(token => haystack.includes(token)) : haystack.includes(String(query).toLowerCase());
      }).slice(0, 8);
      const stock = state.stock.filter(item => {
        const haystack = `${item.name} ${item.category || ""} ${item.unit || ""}`.toLowerCase();
        return tokens.length ? tokens.some(token => haystack.includes(token)) : haystack.includes(String(query).toLowerCase());
      }).slice(0, 8);

      if (!recipes.length && !stock.length) {
        return `${operationsDefaultAnswer()}<p>I did not find a direct match for <strong>${escapeHtml(query)}</strong>. Try asking about invoices, missing prices, low stock, food cost, or a specific ingredient.</p>`;
      }

      return `
        <strong>I found restaurant data for "${escapeHtml(query)}".</strong>
        ${recipes.length ? `<p><strong>Recipes:</strong></p><ul>${recipes.map(recipe => `<li>${escapeHtml(recipe.name)} - ${escapeHtml(recipeCategory(recipe))}</li>`).join("")}</ul>` : ""}
        ${stock.length ? `<p><strong>Stock:</strong></p><ul>${stock.map(item => `<li>${escapeHtml(item.name)} - ${money(item.unitPrice)} / ${escapeHtml(item.unit)} from ${escapeHtml(item.category || "Unsorted")}</li>`).join("")}</ul>` : ""}
      `;
    }

    function missingCostIngredients() {
      const missing = [];
      state.recipes.forEach(recipe => {
        (recipe.ingredients || []).forEach(ingredient => {
          if (unitCost(ingredient) == null) missing.push({ ingredient: ingredient.ingredient, source: recipe.name });
        });
      });
      state.prepItems.forEach(prep => {
        (prep.ingredients || []).forEach(ingredient => {
          const stock = findStockItem(ingredient.ingredient);
          if (!stock || !Number(stock.unitPrice)) missing.push({ ingredient: ingredient.ingredient, source: prep.name });
        });
      });
      const seen = new Set();
      return missing.filter(item => {
        const key = `${item.ingredient.toLowerCase()}|${item.source.toLowerCase()}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function metric(label, value, help) {
      return `<div class="card metric"><span>${label}</span><strong>${value}</strong><small>${help}</small></div>`;
    }

    const FileDetector = {
      allowedExtensions: ["pdf", "png", "jpg", "jpeg", "xlsx", "csv", "txt"],
      detect(file) {
        const name = String(file?.name || "");
        const ext = name.includes(".") ? name.split(".").pop().toLowerCase() : "";
        const type = String(file?.type || "").toLowerCase();
        if (ext === "pdf" || type.includes("pdf")) return "PDF";
        if (["png", "jpg", "jpeg"].includes(ext) || type.startsWith("image/")) return ext === "png" ? "PNG" : "IMAGE";
        if (ext === "xlsx" || type.includes("spreadsheet")) return "XLSX";
        if (ext === "csv" || type.includes("csv")) return "CSV";
        if (ext === "txt" || type.includes("text")) return "TXT";
        return "Unsupported";
      },
      isAllowed(file) {
        return this.detect(file) !== "Unsupported";
      }
    };

    function detect_file_type(file) {
      return FileDetector.detect(file);
    }

    function formatFileSize(bytes = 0) {
      const value = Number(bytes || 0);
      if (value < 1024) return `${value} B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
      return `${(value / 1024 / 1024).toFixed(2)} MB`;
    }

    const FileUploadService = {
      endpoint: "/api/uploads",
      async save(file, uploadRecord) {
        const form = new FormData();
        form.append("file", file);
        form.append("file_id", uploadRecord.file_id);
        form.append("file_type", uploadRecord.file_type);

        if (!response.ok) throw new Error(`Upload failed: ${response.status}`);

      }
    };

    class SupplierMaster {
      constructor(name = "") {
        this.name = String(name || "").trim();
        this.match = matchSupplierName(this.name);
        this.matchedSupplier = this.match?.supplier || this.name || null;
        this.confidence = this.match?.confidence ?? (this.name ? 0.76 : 0.45);
      }
    }

    class IngredientMaster {
      constructor(row = {}, context = {}) {
        const ingredient = String(row.ingredient ?? row.name ?? row.description ?? "").trim() || null;
        const supplierModel = new SupplierMaster(row.supplier ?? row.category ?? context.supplier ?? "");
        const match = ingredientMatchDetails(ingredient);
        this.ingredient = ingredient;
        this.supplier = supplierModel.name || supplierModel.matchedSupplier || null;
        this.quantity = parseReviewNumber(row.quantity);
        this.purchase_unit = String(row.purchase_unit ?? row.unit ?? row.description ?? "").trim() || null;
        this.unit_price = parseReviewNumber(row.unit_price ?? row.unitPrice);
        this.line_total = parseReviewNumber(row.line_total ?? row.lineTotal ?? row.item_cost ?? row.total_cost);
        this.supplier_code = row.supplier_code ?? null;
        this.description = row.description ?? null;
        this.original = row;
        this.match_status = match.status;
        this.match_confidence = match.confidence;
        this.matched_ingredient = match.stock?.name || null;
        this.matched_stock_id = match.stock?.id || null;
        this.supplier_match_status = supplierModel.match?.status || (this.supplier ? "new" : "unknown");
        this.matched_supplier = supplierModel.matchedSupplier;
        this.confidence = makeFieldConfidences(row, this, supplierModel.confidence, match.confidence);
        this.validation = validateIngredientRecord(this);
        this.is_duplicate = false;
      }
    }

    function parseReviewNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      if (typeof value === "number") return Number.isFinite(value) ? value : null;
      const cleaned = String(value)
        .replace(/r/gi, "")
        .replace(/\s+/g, "")
        .replace(/,/g, ".")
        .replace(/[^0-9.-]/g, "");
      if (!cleaned || cleaned === "-" || cleaned === ".") return null;
      const number = Number(cleaned);
      return Number.isFinite(number) ? number : null;
    }

    function formatReviewNumber(value) {
      return value === null || value === undefined || value === "" ? "" : String(value);
    }

    function formatReviewMoney(value) {
      const number = parseReviewNumber(value);
      return number === null ? "Missing" : money(number);
    }

    function coerceConfidence(value, fallback) {
      const number = parseReviewNumber(value);
      if (number === null) return fallback;
      return Math.max(0, Math.min(1, number > 1 ? number / 100 : number));
    }

    function makeFieldConfidences(row, record, supplierConfidence, matchConfidence) {
      const source = row.field_confidence || row.confidence || {};
      return {
        ingredient: coerceConfidence(source.ingredient, record.ingredient ? Math.max(0.5, matchConfidence || 0.62) : 0.35),
        supplier: coerceConfidence(source.supplier, supplierConfidence),
        quantity: coerceConfidence(source.quantity, record.quantity === null ? 0.38 : 0.9),
        purchase_unit: coerceConfidence(source.purchase_unit ?? source.unit, record.purchase_unit ? 0.88 : 0.42),
        unit_price: coerceConfidence(source.unit_price, record.unit_price === null ? 0.4 : 0.9),
        line_total: coerceConfidence(source.line_total ?? source.item_cost, record.line_total === null ? 0.4 : 0.9),
      };
    }

    function validateIngredientRecord(record) {
      if (record.quantity === null) return { status: "missing", message: "Missing quantity", affected_field: "quantity" };
      if (record.unit_price === null) return { status: "missing", message: "Missing unit price", affected_field: "unit_price" };
      if (record.line_total === null) return { status: "missing", message: "Missing line total", affected_field: "line_total" };
      const expected = record.quantity * record.unit_price;
      const tolerance = Math.max(0.05, Math.abs(record.line_total) * 0.02);
      if (Math.abs(expected - record.line_total) <= tolerance) {
        return { status: "ok", message: "Math ok", expected, difference: record.line_total - expected, affected_field: "" };
      }
      return {
        status: "failed",
        message: `${formatReviewMoney(expected)} expected`,
        expected,
        difference: record.line_total - expected,
        affected_field: "line_total",
      };
    }

    function matchSupplierName(name) {
      const value = normalizeName(name);
      if (!value) return null;
      const suppliers = [...new Set((state.stock || []).map(item => item.category).filter(Boolean))];
      const exact = suppliers.find(supplier => normalizeName(supplier) === value);
      if (exact) return { supplier: exact, status: "exact", confidence: 0.98 };
      const scored = suppliers.map(supplier => {
        const targetTokens = stockMatchTokens(name);
        const supplierTokens = stockMatchTokens(supplier);
        const overlap = targetTokens.filter(token => supplierTokens.includes(token)).length;
        return { supplier, score: targetTokens.length ? overlap / targetTokens.length : 0 };
      }).sort((a, b) => b.score - a.score)[0];
      return scored?.score >= 0.75 ? { supplier: scored.supplier, status: "suggested", confidence: 0.86 } : null;
    }

    function ingredientMatchDetails(name) {
      const raw = String(name || "").trim();
      if (!raw) return { status: "unknown", confidence: 0.35, stock: null };
      const linked = linkedStockForIngredient(raw) || linkedStockForInvoiceItem(raw);
      if (linked) return { status: "linked", confidence: 0.98, stock: linked };
      const exact = state.stock.find(item => normalizeName(item.name) === normalizeName(raw));
      if (exact) return { status: "exact", confidence: 0.96, stock: exact };
      const invoiceMatch = findInvoiceStockMatch({ raw });
      if (invoiceMatch?.stock) {
        return {
          status: invoiceMatch.needsReview ? "suggested" : invoiceMatch.type || "matched",
          confidence: invoiceMatch.needsReview ? 0.78 : 0.9,
          stock: invoiceMatch.stock,
        };
      }
      return { status: "unknown", confidence: 0.45, stock: null };
    }

    function extractedRowsForReview(source) {
      const invoiceRows = Array.isArray(source.invoice_rows) && source.invoice_rows.length
        ? source.invoice_rows
        : (Array.isArray(source.lines) ? source.lines : []);
      if (invoiceRows.length) return invoiceRows.map(item => ({
        supplier_code: item?.supplier_code ?? null,
        description: item?.description ?? null,
        ingredient: item?.ingredient ?? item?.description ?? item?.supplier_code ?? null,
        supplier: item?.supplier ?? source.supplier_name ?? null,
        quantity: item?.quantity ?? null,
        purchase_unit: item?.purchase_unit ?? item?.unit ?? item?.description ?? null,
        unit_price: item?.unit_price ?? null,
        line_total: item?.line_total ?? null,
        confidence: item?.confidence ?? null,
        validation: item?.validation ?? null,
        field_confidence: item?.field_confidence ?? null,
        parser_debug: item?.parser_debug ?? null,
      }));
      if (Array.isArray(source.ingredients)) return source.ingredients.map(item => ({
        ingredient: item?.ingredient ?? null,
        supplier: item?.supplier ?? source.supplier_name ?? null,
        quantity: item?.quantity ?? null,
        purchase_unit: item?.purchase_unit ?? item?.unit ?? null,
        unit_price: item?.unit_price ?? null,
        line_total: item?.line_total ?? item?.item_cost ?? null,
        confidence: item?.confidence ?? null,
        field_confidence: item?.field_confidence ?? null,
      }));
      if (Array.isArray(source.items)) return source.items.map(item => ({
        supplier_code: item?.supplier_code ?? null,
        description: item?.description ?? null,
        ingredient: item?.ingredient ?? null,
        supplier: item?.supplier ?? item?.category ?? source.supplier_name ?? null,
        quantity: item?.quantity ?? null,
        purchase_unit: item?.purchase_unit ?? item?.unit ?? null,
        unit_price: item?.unit_price ?? null,
        line_total: item?.line_total ?? item?.item_cost ?? null,
        confidence: item?.confidence ?? null,
        field_confidence: item?.field_confidence ?? null,
      }));
      return [];
    }

    function refreshReviewIntelligence(review) {
      if (!review || !Array.isArray(review.ingredients)) return review;
      review.ingredients = review.ingredients.map(item => {
        const refreshed = new IngredientMaster(item, { supplier: review.supplier_name || review.recipe_name || "" });
        refreshed.is_duplicate = !!item.is_duplicate;
        return refreshed;
      });
      const counts = {};
      review.ingredients.forEach(item => {
        const key = normalizeName(item.ingredient);
        if (key) counts[key] = (counts[key] || 0) + 1;
      });
      review.ingredients.forEach(item => {
        item.is_duplicate = !!normalizeName(item.ingredient) && counts[normalizeName(item.ingredient)] > 1;
        if (item.is_duplicate) item.match_status = item.match_status === "unknown" ? "duplicate" : item.match_status;
      });
      return review;
    }

    function createRecipeReview(recipe) {
      const source = recipe && typeof recipe === "object" ? recipe : {};
      const hasInvoiceRows = (Array.isArray(source.invoice_rows) && source.invoice_rows.length > 0) || (Array.isArray(source.lines) && source.lines.length > 0 && source.document_type === "supplier_invoice");
      const sourceRows = extractedRowsForReview(source);
      const review = {
        status: "draft",
        document_type: source.document_type ?? "recipe",
        review_source: hasInvoiceRows ? "invoice_table_rows" : "ai_ingredients",
        invoice_rows: hasInvoiceRows ? sourceRows.map(item => ({ ...item })) : [],
        recipe_name: source.recipe_name ?? source.prep_item_name ?? source.menu_item_name ?? source.supplier_name ?? null,
        supplier_name: source.supplier_name ?? null,
        ingredients: sourceRows.map(item => new IngredientMaster(item, { supplier: source.supplier_name ?? null })),
        yield: source.yield ?? source.section ?? source.category ?? null,
        total_cost: source.total_cost ?? source.total_incl_vat ?? source.total_excl_vat ?? null,
        cost_per_portion: source.cost_per_portion ?? source.cost_per_unit ?? source.cost_percentage ?? null,
        notes: source.notes ?? null,
        confidence: source.confidence ?? null,
        extraction_source: source.extraction_source ?? null,
        extraction_source_label: source.extraction_source_label ?? null,
        extraction_summary: source.extraction_summary ?? null,
        source_json: source,
        reviewed_at: ""
      };
      return refreshReviewIntelligence(review);
    }

    function ensureRecipeReview(upload) {
      if (!upload?.aiRecipe?.recipe) return null;
      const extractionInvoiceRows = Array.isArray(upload.extraction?.invoice_table_rows) ? upload.extraction.invoice_table_rows : [];
      const recipe = extractionInvoiceRows.length
        ? {
            ...upload.aiRecipe.recipe,
            document_type: "supplier_invoice",
            invoice_rows: extractionInvoiceRows,
            lines: extractionInvoiceRows,
            extraction_source: upload.aiRecipe.extraction_source || upload.aiRecipe.recipe?.extraction_source || upload.extraction?.extraction_engine?.source || "",
            extraction_source_label: upload.aiRecipe.extraction_source_label || upload.aiRecipe.recipe?.extraction_source_label || upload.extraction?.extraction_engine?.source_label || "",
            extraction_summary: upload.aiRecipe.extraction_summary || upload.aiRecipe.recipe?.extraction_summary || upload.extraction?.extraction_engine || {}
          }
        : upload.aiRecipe.recipe;
      const hasInvoiceRows = (Array.isArray(recipe.invoice_rows) && recipe.invoice_rows.length > 0) || (Array.isArray(recipe.lines) && recipe.lines.length > 0 && recipe.document_type === "supplier_invoice");
      if (!upload.aiRecipe.review || (hasInvoiceRows && upload.aiRecipe.review.review_source !== "invoice_table_rows")) {
        upload.aiRecipe.review = createRecipeReview(recipe);
      }
      if (!Array.isArray(upload.aiRecipe.review.ingredients)) upload.aiRecipe.review.ingredients = [];
      if (!upload.aiRecipe.review.review_source) upload.aiRecipe.review.review_source = hasInvoiceRows ? "invoice_table_rows" : "ai_ingredients";
      refreshReviewIntelligence(upload.aiRecipe.review);
      return upload.aiRecipe.review;
    }

    function reviewIssueClass(upload, field, index = null) {
      const review = ensureRecipeReview(upload);
      if (!review) return "";
      const row = review.ingredients[index];
      const confidence = row?.confidence?.[field];
      const validationField = row?.validation?.affected_field === field;
      const missingField = (field === "ingredient" && !row?.ingredient)
        || (field === "supplier" && !row?.supplier)
        || (field === "quantity" && row?.quantity === null)
        || (field === "purchase_unit" && !row?.purchase_unit)
        || (field === "unit_price" && row?.unit_price === null)
        || (field === "line_total" && row?.line_total === null);
      if (validationField) return "border-color:var(--red);box-shadow:0 0 0 1px rgba(201,79,79,.35)";
      if (missingField || (confidence !== undefined && confidence < 0.85)) return "border-color:var(--amber);box-shadow:0 0 0 1px rgba(212,175,55,.25)";
      if (field === "duplicate") {
        return row?.is_duplicate ? "background:rgba(230,162,60,.12)" : "";
      }
      return "";
    }

    function reviewStats(upload) {
      const review = ensureRecipeReview(upload);
      const ingredients = review?.ingredients || [];
      const names = ingredients.map(item => normalizeName(item.ingredient)).filter(Boolean);
      const duplicates = names.filter((name, index) => names.indexOf(name) !== index);
      return {
        missingQuantities: ingredients.filter(item => item.quantity === null || item.quantity === "" || Number.isNaN(Number(item.quantity))).length,
        missingUnits: ingredients.filter(item => !String(item.purchase_unit || "").trim()).length,
        missingCosts: ingredients.filter(item => item.unit_price === null || item.line_total === null).length,
        duplicateCount: new Set(duplicates).size,
        validationFailures: ingredients.filter(item => item.validation?.status === "failed").length,
        unknownIngredients: ingredients.filter(item => item.match_status === "unknown").length,
        lowConfidence: ingredients.filter(item => Object.values(item.confidence || {}).some(value => value < 0.85)).length,
      };
    }

    function normalizeName(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
    }

    function logReviewCorrection(fileId, action, details = {}) {
      const upload = state.uploads.find(item => item.file_id === fileId);
      fetch("/api/review-correction", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          file_id: fileId,
          filename: upload?.filename || "",
          document_type: upload?.aiRecipe?.review?.document_type || upload?.aiRecipe?.document_type || "",
          ai_provider: upload?.aiRecipe?.provider || "",
          model: upload?.aiRecipe?.model || "",
          action,
          details
        })
      }).catch(() => {});
    }

    function setReviewField(fileId, field, value) {
      const upload = state.uploads.find(item => item.file_id === fileId);
      const review = ensureRecipeReview(upload);
      if (!review) return;
      const previous = review[field] ?? null;
      review[field] = value === "" ? null : value;
      review.status = review.status === "approved" ? "draft" : review.status;
      logReviewCorrection(fileId, "field_changed", { field, previous, value: review[field] });
      renderImportCentre();
    }

    function setReviewIngredient(fileId, index, field, value) {
      const upload = state.uploads.find(item => item.file_id === fileId);
      const review = ensureRecipeReview(upload);
      if (!review || !review.ingredients[index]) return;
      const previous = review.ingredients[index][field] ?? null;
      const numericFields = new Set(["quantity", "unit_price", "line_total"]);
      review.ingredients[index][field] = value === "" ? null : (numericFields.has(field) ? parseReviewNumber(value) : value);
      refreshReviewIntelligence(review);
      review.status = review.status === "approved" ? "draft" : review.status;
      logReviewCorrection(fileId, "ingredient_changed", { index, field, previous, value: review.ingredients[index][field] });
      renderImportCentre();
    }

    function approveReview(fileId) {
      const upload = state.uploads.find(item => item.file_id === fileId);
      const review = ensureRecipeReview(upload);
      if (!review) return;
      review.status = "approved";
      review.reviewed_at = new Date().toISOString();
      logReviewCorrection(fileId, "approved", { reviewed_at: review.reviewed_at });
      renderImportCentre();
    }

    function rejectReview(fileId) {
      const upload = state.uploads.find(item => item.file_id === fileId);
      if (!upload?.aiRecipe) return;
      upload.aiRecipe.status = "rejected";
      upload.aiRecipe.review = null;
      upload.aiRecipe.recipe = null;
      upload.aiRecipe.error = "Rejected. Run Extract structured JSON again to retry.";
      logReviewCorrection(fileId, "rejected", { reason: "manager_rejected_extraction" });
      renderImportCentre();
    }

    function exportReviewedRecipeJson(fileId) {
      const upload = state.uploads.find(item => item.file_id === fileId);
      const review = ensureRecipeReview(upload);
      if (!review) return;
      const safeName = String(review.recipe_name || upload.filename || "recipe-review").replace(/[^a-z0-9_-]+/gi, "-").replace(/^-+|-+$/g, "").toLowerCase() || "recipe-review";
      downloadJsonFile(`${safeName}-review.json`, {
        file_id: upload.file_id,
        filename: upload.filename,
        document_type: review.document_type || "recipe",
        ai_provider: upload.aiRecipe?.provider || "ollama",
        model: upload.aiRecipe?.model || "",
        review_status: review.status || "draft",
        reviewed_recipe: review
      });
    }

    function backFromReview() {
      selectedUploadPreviewId = "";
      renderImportCentre();
    }

    function documentReviewLabel(type) {
      const labels = {
        supplier_invoice: "Supplier Invoice Review",
        recipe: "Recipe Review",
        stock_list: "Stock List Review",
        prep_sheet: "Prep Sheet Review",
        menu_costing_sheet: "Menu Costing Review",
      };
      return labels[type] || "Extraction Review";
    }

    function extractionSummaryForUpload(upload) {
      return upload?.aiRecipe?.extraction_summary
        || upload?.aiRecipe?.recipe?.extraction_summary
        || upload?.aiRecipe?.review?.extraction_summary
        || upload?.extraction?.extraction_engine
        || {};
    }

    function extractionSourceLabel(upload, review = null) {
      const summary = extractionSummaryForUpload(upload);
      const source = review?.extraction_source || upload?.aiRecipe?.extraction_source || summary.source || "";
      const label = review?.extraction_source_label || upload?.aiRecipe?.extraction_source_label || summary.source_label || "";
      if (label) return label;
      if (source === "universal_extractor") return "Universal Extractor";
      if (source === "legacy_parser_fallback") return "Legacy Parser Fallback";
      return source || "AI Ingredients";
    }

    function extractionSourceBadge(upload, review = null) {
      const label = extractionSourceLabel(upload, review);
      const cls = /legacy/i.test(label) ? "amber" : /universal/i.test(label) ? "green" : "blue";
      return `<span class="badge ${cls}">${escapeHtml(label)}</span>`;
    }

    function extractionSummaryMetrics(upload) {
      const summary = extractionSummaryForUpload(upload);
      if (!summary || !Object.keys(summary).length) return "";
      const passRate = summary.validation_pass_rate == null ? "n/a" : `${Math.round(Number(summary.validation_pass_rate || 0) * 100)}%`;
      const confidence = summary.overall_confidence == null ? "n/a" : `${Math.round(Number(summary.overall_confidence || 0) * 100)}%`;
      return `
        <div class="grid grid-3" style="margin-top:12px">
          ${metric("Rows Found", summary.rows_found ?? 0, "Before cleanup")}
          ${metric("Rows Accepted", summary.rows_accepted ?? 0, "Review rows")}
          ${metric("Rows Discarded", summary.rows_discarded ?? 0, "Hidden by default")}
          ${metric("Validation Pass Rate", passRate, "Invoice math")}
          ${metric("Overall Confidence", confidence, "Extractor score")}
          ${metric("Fallback", summary.fallback_reason ? "Used" : "No", summary.fallback_reason || "Primary path")}
        </div>
      `;
    }

    function toggleDeveloperMode() {
      state.developerMode = !state.developerMode;
      saveState();
      renderImportCentre();
    }

    function toggleDiscardedRows() {
      state.showDiscardedRows = !state.showDiscardedRows;
      saveState();
      renderImportCentre();
    }

    function DiscardedRowsPanel(upload) {
      const discarded = Array.isArray(upload?.extraction?.line_item_extraction?.discarded_rows)
        ? upload.extraction.line_item_extraction.discarded_rows
        : [];
      if (!discarded.length) return "";
      return `
        <div class="row-actions" style="margin-top:12px">
          <button class="btn secondary compact" onclick="toggleDiscardedRows()">${state.showDiscardedRows ? "Hide discarded rows" : "Show discarded rows"}</button>
          <span class="badge amber">${discarded.length} discarded</span>
        </div>
        ${state.showDiscardedRows ? `
          <div class="table-wrap" style="margin-top:12px">
            <table>
              <thead><tr><th>Reason</th><th>Raw Text</th></tr></thead>
              <tbody>
                ${discarded.slice(0, 80).map(row => `
                  <tr>
                    <td><span class="badge amber">${escapeHtml(row.reason || "discarded")}</span></td>
                    <td>${escapeHtml(row.raw_text || "")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
            ${discarded.length > 80 ? `<p class="muted">+${discarded.length - 80} more discarded rows.</p>` : ""}
          </div>
        ` : ""}
      `;
    }

    function validationBadge(row) {
      const status = row?.validation?.status || "missing";
      const cls = status === "ok" ? "green" : status === "failed" ? "red" : "amber";
      const expected = row?.validation?.expected ?? row?.validation?.expected_total;
      const actual = row?.validation?.actual ?? row?.validation?.actual_total ?? row?.line_total;
      const detail = status === "failed" && expected !== undefined
        ? ` title="Expected ${escapeAttr(formatReviewMoney(expected))}; actual ${escapeAttr(formatReviewMoney(actual))}"`
        : "";
      return `<span class="badge ${cls}"${detail}>${escapeHtml(row?.validation?.message || status)}</span>`;
    }

    function matchStatusBadge(row) {
      const status = row?.match_status || "unknown";
      const cls = ["exact", "linked", "matched"].includes(status) ? "green" : status === "suggested" ? "amber" : "red";
      const label = status === "unknown" ? "Unknown" : status === "suggested" ? `Suggest: ${row.matched_ingredient || "review"}` : row.matched_ingredient || status;
      return `<span class="badge ${cls}" title="${escapeAttr(row?.matched_ingredient || "")}">${escapeHtml(label)}</span>`;
    }

    function confidenceSummary(row) {
      const values = Object.entries(row?.confidence || {});
      if (!values.length) return `<span class="badge amber">No confidence</span>`;
      const low = values.filter(([, value]) => Number(value) < 0.85).map(([key]) => key.replace(/_/g, " "));
      const avg = values.reduce((sum, [, value]) => sum + Number(value || 0), 0) / values.length;
      const label = `${Math.round(avg * 100)}%`;
      return `${low.length ? `<span class="badge amber" title="${escapeAttr(low.join(", "))}">${label} review</span>` : `<span class="badge green">${label}</span>`}`;
    }

      event.preventDefault();

        ? `<span class="badge ${aiStatus === "failed" ? "red" : aiStatus === "completed" ? "blue" : "amber"}">${escapeHtml(aiStatus === "completed" ? "Recipe JSON" : aiStatus === "extracting" ? "AI extracting" : "AI failed")}</span>`

    function ExtractedTextPreview(upload) {
      if (!upload) {
        return `<div class="empty">Extracted text and tables will appear here after you click Extract content.</div>`;

      if (status === "extracting") {
        return `<div class="notice amber">Reading ${escapeHtml(upload.filename)}. This may take a moment for scanned PDFs or images.</div>`;
      }
      if (status === "failed") {
        const friendlyError = (extraction.errors || []).join(" ") || "Try opening Recipe Vault through the local launcher.";
        return `
          <div class="notice red">Could not extract this file. ${escapeHtml(friendlyError)}</div>
          <p class="muted" style="margin-top:10px">Detected type: ${escapeHtml(extraction.file_type || upload.file_type || "Unknown")}</p>
        `;
      }
      if (!status) {
        return `<div class="empty">No extracted content for ${escapeHtml(upload.filename)} yet.</div>`;
      }
      return `
        <div class="notice green">
          <strong>${escapeHtml(upload.filename)}</strong> read as ${escapeHtml(extraction.file_type || upload.file_type || "Unknown")} with ${escapeHtml(extraction.engine || "content extractor")}${extraction.fallback_used ? " using fallback" : ""}.
          <br>${extractionSourceBadge(upload)}

        ${extractionSummaryMetrics(upload)}
        <div class="field" style="margin-top:12px">
          <label>Extracted text</label>
          <textarea readonly style="min-height:220px">${escapeHtml(extraction.extracted_text || "")}</textarea>
        </div>
        ${extractedTablesPreview(extraction.extracted_tables || [])}
        ${DiscardedRowsPanel(upload)}
        ${state.developerMode ? ParserDebugViewer(extraction.line_item_extraction || {}) : ""}
      `;
    }
