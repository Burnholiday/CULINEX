    function invoiceAttachmentMarkup(inv) {
      const attachment = inv?.attachment;
      if (!attachment?.fileName) return "";
      const sizeLabel = attachment.fileSize ? `${Math.round(attachment.fileSize / 1024)} KB` : "Saved with invoice";
      const typeLabel = attachment.fileType || attachment.kind || "file";
      if (attachment.previewUrl) {
        return `
          <div class="invoice-attachment">
            <img src="${escapeAttr(attachment.previewUrl)}" alt="${escapeAttr(attachment.fileName)}">
            <div>
              <strong>Invoice image</strong>
              <span>${escapeHtml(attachment.fileName)} · ${escapeHtml(typeLabel)} · ${escapeHtml(sizeLabel)}</span>
            </div>
            <a class="btn secondary compact" href="${escapeAttr(attachment.previewUrl)}" target="_blank" rel="noopener">Open image</a>
          </div>
        `;
      }
      return `
        <div class="invoice-attachment">
          <div class="drop-icon">${miniIcon("file")}</div>
          <div>
            <strong>Invoice file recorded</strong>
            <span>${escapeHtml(attachment.fileName)} · ${escapeHtml(typeLabel)} · ${escapeHtml(sizeLabel)}</span>
          </div>
        </div>
      `;
    }

    function invoiceStockStatus(inv, row, rowIndex) {
      const stock = row.stockId ? state.stock.find(s => s.id === row.stockId) : null;
      if (row.applied) {
        return `
          <span class="invoice-line-status">
            <span class="badge green">${escapeHtml(stock?.name || row.matchedStockName || "Stock updated")}</span>
            <button class="btn secondary" onclick="event.stopPropagation(); openStockForInvoiceReview('${inv.id}', ${rowIndex})">Relink</button>
          </span>
        `;
      }
      if (row.suggestedStockId) {
        const suggested = state.stock.find(s => s.id === row.suggestedStockId);
        return `
          <span class="invoice-line-status">
            <span class="badge amber">${escapeHtml(suggested?.name || "Possible match")}</span>
            <button class="btn secondary" onclick="event.stopPropagation(); openStockForInvoiceReview('${inv.id}', ${rowIndex})">Review</button>
          </span>
        `;
      }
      return `
        <span class="invoice-line-status">
          <span class="badge amber">No stock</span>
          <button class="btn secondary compact" onclick="event.stopPropagation(); openStockForInvoiceReview('${inv.id}', ${rowIndex})">Review</button>
        </span>
      `;
    }

    function addInvoiceLine(invoiceId) {
      const invoice = state.invoices.find(item => item.id === invoiceId);
      if (!invoice) return;
      const raw = document.getElementById(`invoiceAddRaw-${invoiceId}`)?.value.trim() || "";
      const qty = Number(document.getElementById(`invoiceAddQty-${invoiceId}`)?.value || 0);
      const unit = document.getElementById(`invoiceAddUnit-${invoiceId}`)?.value || "EACH";
      const unitPrice = Number(document.getElementById(`invoiceAddPrice-${invoiceId}`)?.value || 0);
      const vatAmount = Number(document.getElementById(`invoiceAddVat-${invoiceId}`)?.value || 0);
      const lineTotalInput = Number(document.getElementById(`invoiceAddTotal-${invoiceId}`)?.value || 0);
      if (!raw || !qty || !unitPrice) return alert("Add the item name, quantity, and unit price.");
      const row = {
        raw,
        qty,
        unit,
        unitPrice,
        lineTotal: lineTotalInput || roundMoney(qty * unitPrice),
        vatAmount,
        applied: false,
        needsReview: true,
        reviewType: "unknown",
        stockStatus: "unknown",
        suggestedStockId: "",
        reviewMessage: "No stock."
      };
      const match = findInvoiceStockMatch(row);
      invoice.rows.push(row);
      if (match?.stock && !match.needsReview) {
        applyInvoiceRowToStock(invoice, row, match.stock, match.type);
      } else {
        row.reviewType = match?.stock ? "suggested" : "unknown";
        row.stockStatus = row.reviewType;
        row.suggestedStockId = match?.stock?.id || "";
        row.reviewMessage = match?.stock ? "Possible match." : "No stock.";
      }
      expandedInvoiceId = invoice.id;
      saveState();
      renderInvoices();
    }

    function deleteInvoiceLine(invoiceId, rowIndex) {
      const invoice = state.invoices.find(item => item.id === invoiceId);
      const row = invoice?.rows?.[rowIndex];
      if (!invoice || !row) return;
      if (!confirm(`Remove "${row.raw}" from this invoice?`)) return;
      rollbackInvoiceRowStock(row);
      invoice.rows.splice(rowIndex, 1);
      if (pendingInvoiceReview?.invoiceId === invoiceId) pendingInvoiceReview = null;
      expandedInvoiceId = invoice.id;
      saveState();
      renderInvoices();
    }

    function toggleInvoice(id) {
      expandedInvoiceId = expandedInvoiceId === id ? "" : id;
      const container = document.getElementById("invoiceTableWrap");
      if (container) container.innerHTML = invoiceTable();
    }

    function invoiceLines(inv) {
      return Array.isArray(inv?.rows) ? inv.rows : [];
    }

    function invoiceLineTotal(row) {
      return invoiceLineExclVat(row);
    }

    function invoiceLineExclVat(row) {
      return Number(row?.lineTotal || 0) || Number(row?.qty || 0) * Number(row?.unitPrice || 0);
    }

    function invoiceVatAmount(row) {
      return Number(row?.vatAmount || 0);
    }

    function invoiceLineInclVat(row) {
      return invoiceLineExclVat(row) + invoiceVatAmount(row);
    }

    function invoiceTotal(inv) {
      return invoiceTotalExclVat(inv);
    }

    function invoiceTotalExclVat(inv) {
      return invoiceLines(inv).reduce((sum, row) => sum + invoiceLineExclVat(row), 0);
    }

    function invoiceVatTotal(inv) {
      return invoiceLines(inv).reduce((sum, row) => sum + invoiceVatAmount(row), 0);
    }

    function invoiceTotalInclVat(inv) {
      return invoiceLines(inv).reduce((sum, row) => sum + invoiceLineInclVat(row), 0);
    }

    function formatInvoiceQty(row) {
      const qty = Number(row?.qty || 0);
      const displayQty = Number.isInteger(qty) ? String(qty) : qty.toFixed(2);
      return `${displayQty} ${escapeHtml(row?.unit || "")}`.trim();
    }

              <div class="mini-card">
                <h4>Support Package</h4>
                <p class="muted">${successful} successful captures, ${failed} failed captures, ${state.aiDecisions.length} extraction decisions saved.</p>
                <button class="btn secondary" onclick="exportSupportPackage()">Create support package</button>
              </div>
            </div>
            <div class="table-wrap" style="margin-top:16px">
              <table>
                <thead><tr><th>Recent Event</th><th>Detail</th><th class="num">When</th></tr></thead>
                <tbody>
                  ${state.importLogs.slice(0, 6).map(log => `<tr><td><strong>${escapeHtml(log.type)}</strong></td><td>${escapeHtml([log.fileName, log.supplier, log.invoiceNumber].filter(Boolean).join(" - ") || log.restaurant || log.activeMonth || "System event")}</td><td class="num">${escapeHtml(formatDateTime(log.createdAt))}</td></tr>`).join("") || `<tr><td colspan="3" class="muted">No client safety events yet.</td></tr>`}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function resetDemo() {
      if (!confirm("Reset all demo data?")) return;
      state = structuredClone(defaultState);
      saveState();
      renderNav();
      renderPage();
    }

    renderNav();
    renderPage();
  </script>
</body>
</html>
